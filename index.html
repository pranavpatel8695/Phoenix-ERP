let _storePhotoData = null; // Store photo data in memory, not DOM dataset

function handleStorePhotoUpload(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    compressPhoto(e.target.result, 200).then(src => {  // 200KB for clear store photos
      _storePhotoData = src; // Keep in memory
      const prev = document.getElementById('si-photo-prev');
      if (!prev) return;
      prev.querySelectorAll('.photo-thumb').forEach(el=>el.remove());
      const wrap = document.createElement('div');
      wrap.className = 'photo-thumb'; wrap.id = 'si-new-photo';
      const img = document.createElement('img');
      img.src = src; img.style.cssText = 'width:72px;height:72px;object-fit:cover;border-radius:8px';
      const btn = document.createElement('button');
      btn.className = 'rm'; btn.textContent = '✕';
      btn.onclick = () => { wrap.remove(); _storePhotoData = null; };
      wrap.appendChild(img); wrap.appendChild(btn);
      prev.appendChild(wrap);
    });
  };
  reader.readAsDataURL(file);
  input.value = '';
}

function saveStoreItem(editId, txnType) {
  const name = document.getElementById('si-name')?.value?.trim();
  const proj = document.getElementById('si-proj')?.value;
  if (!name||!proj) { showToast('⚠️ Name and site required'); return; }
  const qty = parseFloat(document.getElementById('si-qty')?.value)||0;
  const items = getStoreItems();

  if (editId) {
    // EDIT: find strictly by ID, update in place — never create duplicate
    const idx = items.findIndex(x=>x.id===editId);
    if (idx < 0) { showToast('⚠️ Item not found'); return; }
    const photoSrc = _storePhotoData
        || document.getElementById('si-existing-photo')?.querySelector('img')?.src
        || items[idx].photo || localStorage.getItem('phx_si_photo_'+editId) || '';
    items[idx] = { ...items[idx], name, project:proj,
      category: document.getElementById('si-cat')?.value||items[idx].category,
      qty, unit: document.getElementById('si-unit')?.value||items[idx].unit,
      minQty: parseFloat(document.getElementById('si-min')?.value)||0,
      location: document.getElementById('si-loc')?.value||'',
      description: document.getElementById('si-desc')?.value||'',
      condition: document.getElementById('si-condition')?.value||'working',
      status: document.getElementById('si-status')?.value||'idle',
      photo: photoSrc,
      updatedBy: currentUser, timestamp: new Date().toISOString()
    };
    // Save photo separately so it survives sync (not stripped in push)
    if (photoSrc) { try { localStorage.setItem('phx_si_photo_'+items[idx].id, photoSrc); } catch(e) {} }
    saveStoreItems(items); pushConfig();
    showToast('✅ Updated'); closeFormModal(); renderCurrentTab();
    return;
  }

  // ADD NEW or PURCHASE
  const existingIdx = txnType==='purchase' ? items.findIndex(i=>i.name===name&&i.project===proj) : -1;
  const newPhotoSrc = _storePhotoData
      || (existingIdx>-1 ? items[existingIdx].photo || localStorage.getItem('phx_si_photo_'+items[existingIdx]?.id) || '' : '');
  _storePhotoData = null; // clear after reading
  const obj = {
    id: existingIdx>-1 ? items[existingIdx].id : 'SI_'+Date.now(),
    name, project:proj,
    category: document.getElementById('si-cat')?.value||'Material',
    qty: existingIdx>-1 ? (parseFloat(items[existingIdx].qty)||0)+qty : qty,
    unit: document.getElementById('si-unit')?.value||'pcs',
    minQty: parseFloat(document.getElementById('si-min')?.value)||0,
    location: document.getElementById('si-loc')?.value||'',
    description: document.getElementById('si-desc')?.value||'',
    condition: document.getElementById('si-condition')?.value||'working',
    status: document.getElementById('si-status')?.value||'idle',
    photo: newPhotoSrc,
    updatedBy: currentUser, timestamp: new Date().toISOString()
  };
  // Save photo separately so it survives sync (photos stripped in push to save space)
  if (newPhotoSrc) { try { localStorage.setItem('phx_si_photo_'+obj.id, newPhotoSrc); } catch(e) {} }
  if (existingIdx>-1) { items[existingIdx]=obj; } else items.push(obj);
  saveStoreItems(items);

  // Log transaction for any addition (purchase = site, addition = central)
  if (qty>0 && (txnType==='purchase' || !editId)) {
    const txns = getStoreTxns();
    const txnType2 = txnType==='purchase' ? 'purchase' : (proj==='central' ? 'addition' : 'purchase');
    txns.push({ id:'STX_'+Date.now(), type:txnType2, itemId:obj.id, itemName:name,
      project:proj, date:localToday(), qty,
      remarks: document.getElementById('si-desc')?.value||'',
      by:currentUser, byName:getUsers()[currentUser]?.name||currentUser,
      timestamp:new Date().toISOString() });
    saveStoreTxns(txns);
  }
  pushConfig();
  showToast(txnType==='purchase'?'✅ Purchase saved': editId?'✅ Updated':'✅ Item added');
  closeFormModal(); renderCurrentTab();
}

function deleteStoreItem(id) {
  if (!confirm('Delete this item?')) return;
  // Update deleted list FIRST (same pattern as deleteUserUM)
  const deletedItems = LS.get('phx_deleted_store_items', []);
  if (!deletedItems.includes(id)) { deletedItems.push(id); LS.set('phx_deleted_store_items', deletedItems); }
  saveStoreItems(getStoreItems().filter(i=>i.id!==id));
  pushConfig();
  showToast('🗑️ Deleted'); closeFormModal(); renderCurrentTab();
}

function openStoreTxn(type, itemId='') {
  const vp = getVisibleProjects();
  // For issue: only central store items; for receive: project items
  const items = type==='issue'
    ? getStoreItems().filter(i=>i.project==='central')
    : getStoreItems().filter(i=>vp.includes(i.project));
  if (!items.length) { showToast(type==='issue'?'⚠️ No items in central store':'⚠️ No items found'); return; }
  const label = type==='issue'?'→ Issue from Central Store':'+ Receive Stock';
  document.getElementById('formModalContent').innerHTML = `
    <div class="flex justify-between items-center mb-4">
      <div class="section-title">${label}</div>
      <button class="btn btn-secondary btn-sm" onclick="closeFormModal()">✕</button>
    </div>
    <div class="field-group"><label>Item *</label>
      <select id="txn-item">
        ${items.map(i=>`<option value="${i.id}"${i.id===itemId?' selected':''}>${i.name} (${i.project}) — ${i.qty} ${i.unit||'pcs'}</option>`).join('')}
      </select>
    </div>
    <div class="form-row">
      <div class="field-group"><label>Quantity *</label><input type="number" id="txn-qty" placeholder="0" min="1"></div>
      <div class="field-group"><label>Date</label><input type="date" id="txn-date" value="${localToday()}"></div>
    </div>
    ${type==='issue'?`<div class="field-group"><label>Issue To (Site) *</label>
      <select id="txn-to">
        <option value="">— Select Site —</option>
        ${getProjects().map(p=>`<option value="${p}">${p}</option>`).join('')}
      </select>
    </div>`:''}
    <div class="field-group"><label>Remarks</label><input type="text" id="txn-remarks" placeholder="Optional reason"></div>
    <button class="btn btn-primary w-full mt-2" onclick="saveStoreTxn('${type}')">Save</button>`;
  document.getElementById('formModal').classList.remove('hidden');
}

function saveStoreTxn(type) {
  const itemId  = document.getElementById('txn-item')?.value;
  const qty     = parseFloat(document.getElementById('txn-qty')?.value)||0;
  const date    = document.getElementById('txn-date')?.value||localToday();
  const issuedTo = document.getElementById('txn-to')?.value||'';
  const remarks = document.getElementById('txn-remarks')?.value||'';

  if (!itemId||!qty) { showToast('⚠️ Select item and quantity'); return; }
  if (type==='issue' && !issuedTo) { showToast('⚠️ Select site to issue to'); return; }

  const items = getStoreItems();
  const src = items.find(i=>i.id===itemId);
  if (!src) return;

  if (type==='issue') {
    if (qty > (parseFloat(src.qty)||0)) {
      showToast('⚠️ Not enough stock. Available: '+src.qty+' '+src.unit); return;
    }
    // Deduct from central
    src.qty = (parseFloat(src.qty)||0) - qty;
    // Add to destination project
    const dest = items.find(i=>i.name===src.name && i.project===issuedTo);
    if (dest) {
      dest.qty = (parseFloat(dest.qty)||0) + qty;
    } else {
      items.push({...src, id:'SI_'+Date.now(), project:issuedTo, qty});
    }
    // Remove central item if qty is now zero
    const finalItems = items.filter(i=>!(i.id===src.id && (parseFloat(i.qty)||0)<=0));
    saveStoreItems(finalItems);
  } else {
    src.qty = (parseFloat(src.qty)||0) + qty;
    saveStoreItems(items);
  }

  const txns = getStoreTxns();
  txns.push({
    id: 'STX_'+Date.now(), type, itemId, itemName: src.name,
    project: type==='issue' ? issuedTo : src.project, // use dest project for issue
    fromProject: type==='issue' ? src.project : '',
    date, qty, issuedTo, remarks,
    by: currentUser, byName: getUsers()[currentUser]?.name||currentUser,
    timestamp: new Date().toISOString()
  });
  saveStoreTxns(txns);
  pushConfig();
  showToast('✅ '+(type==='issue'?'Issued to '+issuedTo:'Received'));
  closeFormModal(); renderCurrentTab();
}

function openReturnToCentral(itemId) {
  const item = getStoreItems().find(i=>i.id===itemId);
  if (!item) return;
  document.getElementById('formModalContent').innerHTML = `
    <div class="flex justify-between items-center mb-4">
      <div class="section-title">↑ Return to Central Store</div>
      <button class="btn btn-secondary btn-sm" onclick="closeFormModal()">✕</button>
    </div>
    <div style="background:rgba(10,132,255,0.08);border-radius:8px;padding:8px 12px;margin-bottom:12px;font-size:12px">
      <strong>${item.name}</strong> — Available: ${item.qty} ${item.unit||'pcs'}<br>
      <span style="color:var(--muted)">From: ${item.project}</span>
    </div>
    <div class="form-row">
      <div class="field-group"><label>Quantity to Return *</label>
        <input type="number" id="ret-qty" placeholder="0" min="1" max="${item.qty}">
      </div>
      <div class="field-group"><label>Date</label>
        <input type="date" id="ret-date" value="${localToday()}">
      </div>
    </div>
    <div class="field-group"><label>Reason</label>
      <input type="text" id="ret-remarks" placeholder="e.g. Site completed, surplus stock">
    </div>
    <button class="btn btn-primary w-full mt-3" onclick="doReturnToCentral('${item.id}')">↑ Return to Central Store</button>`;
  document.getElementById('formModal').classList.remove('hidden');
}

function doReturnToCentral(itemId) {
  const qty = parseFloat(document.getElementById('ret-qty')?.value)||0;
  const date = document.getElementById('ret-date')?.value||localToday();
  const remarks = document.getElementById('ret-remarks')?.value||'';
  if (!qty) { showToast('⚠️ Enter quantity'); return; }

  const items = getStoreItems();
  const src = items.find(i=>i.id===itemId);
  if (!src || qty > parseFloat(src.qty)) { showToast('⚠️ Not enough stock'); return; }

  // Deduct from site
  src.qty = (parseFloat(src.qty)||0) - qty;
  // Add back to central store
  const central = items.find(i=>i.name===src.name && i.project==='central');
  if (central) { central.qty = (parseFloat(central.qty)||0) + qty; }
  else { items.push({...src, id:'SI_'+Date.now(), project:'central', qty}); }
  // Remove site item if qty now zero
  saveStoreItems(items.filter(i=>!(i.id===src.id && (parseFloat(i.qty)||0)<=0)));

  // Log transaction
  const txns = getStoreTxns();
  txns.push({ id:'STX_'+Date.now(), type:'return', itemId, itemName:src.name,
    project:'central', fromProject:src.project, date, qty, remarks,
    by:currentUser, byName:getUsers()[currentUser]?.name||currentUser,
    timestamp:new Date().toISOString() });
  saveStoreTxns(txns);
  pushConfig();
  showToast('✅ Returned to Central Store');
  closeFormModal(); renderCurrentTab();
}

function openSiteTransfer(itemId) {
  const item = getStoreItems().find(i=>i.id===itemId);
  if (!item) return;
  const allProj = getProjects().filter(p=>p!==item.project);
  document.getElementById('formModalContent').innerHTML = `
    <div class="flex justify-between items-center mb-4">
      <div class="section-title">⇄ Transfer to Another Site</div>
      <button class="btn btn-secondary btn-sm" onclick="closeFormModal()">✕</button>
    </div>
    <div style="background:rgba(255,159,10,0.08);border-radius:8px;padding:8px 12px;margin-bottom:12px;font-size:12px">
      <strong>${item.name}</strong> — Available: ${item.qty} ${item.unit||'pcs'}<br>
      <span style="color:var(--muted)">From: ${item.project}</span>
    </div>
    <div class="field-group"><label>Transfer To (Site) *</label>
      <select id="tr-dest">
        <option value="">— Select Site —</option>
        ${allProj.map(p=>`<option value="${p}">${p}</option>`).join('')}
      </select>
    </div>
    <div class="form-row">
      <div class="field-group"><label>Quantity *</label>
        <input type="number" id="tr-qty2" placeholder="0" min="1" max="${item.qty}">
      </div>
      <div class="field-group"><label>Date</label>
        <input type="date" id="tr-date2" value="${localToday()}">
      </div>
    </div>
    <div class="field-group"><label>Remarks</label>
      <input type="text" id="tr-remarks2" placeholder="Reason for transfer">
    </div>
    <button class="btn btn-primary w-full mt-3" onclick="doSiteTransfer('${item.id}')">⇄ Transfer</button>`;
  document.getElementById('formModal').classList.remove('hidden');
}

function doSiteTransfer(itemId) {
  const destProj = document.getElementById('tr-dest')?.value;
  const qty = parseFloat(document.getElementById('tr-qty2')?.value)||0;
  const date = document.getElementById('tr-date2')?.value||localToday();
  const remarks = document.getElementById('tr-remarks2')?.value||'';
  if (!destProj||!qty) { showToast('⚠️ Select destination and quantity'); return; }

  const items = getStoreItems();
  const src = items.find(i=>i.id===itemId);
  if (!src || qty > parseFloat(src.qty)) { showToast('⚠️ Not enough stock'); return; }

  src.qty = (parseFloat(src.qty)||0) - qty;
  const dest2 = items.find(i=>i.name===src.name && i.project===destProj);
  if (dest2) { dest2.qty = (parseFloat(dest2.qty)||0) + qty; }
  else { items.push({...src, id:'SI_'+Date.now(), project:destProj, qty}); }
  saveStoreItems(items.filter(i=>!(i.id===src.id && (parseFloat(i.qty)||0)<=0)));

  const txns = getStoreTxns();
  txns.push({ id:'STX_'+Date.now(), type:'transfer', itemId, itemName:src.name,
    project:destProj, fromProject:src.project, date, qty, remarks,
    by:currentUser, byName:getUsers()[currentUser]?.name||currentUser,
    timestamp:new Date().toISOString() });
  saveStoreTxns(txns);
  pushConfig();
  showToast('✅ Transferred to '+destProj);
  closeFormModal(); renderCurrentTab();
}

// ── END STORE MODULE ──────────────────────────────────────────

// Safety net: always hide loader after 1s regardless of errors
setTimeout(() => {
  const loader = document.getElementById('loader');
  const login  = document.getElementById('loginScreen');
  const app    = document.getElementById('app');
  if (loader && loader.style.display !== 'none') {
    loader.style.display = 'none';
    if (app && !app.classList.contains('hidden')) return;
    if (login) login.classList.remove('hidden');
  }
}, 1000);

init();
</script>
