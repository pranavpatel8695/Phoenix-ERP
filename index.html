// Returns all gap segments in [0, len] where prereqReps cover but targetReps don't
function findAllGaps(prereqReps, targetReps, len) {
  const gaps = [];
  if (!prereqReps.length) return gaps;
  const prereqSegs = prereqReps
    .map(r=>({f:parseFloat(r.from)||0, t:parseFloat(r.to)||0}))
    .filter(s=>s.t>s.f).sort((a,b)=>a.f-b.f);
  const merged = [];
  for (const s of prereqSegs) {
    if (!merged.length || s.f > merged[merged.length-1].t + 0.001) merged.push({...s});
    else merged[merged.length-1].t = Math.max(merged[merged.length-1].t, s.t);
  }
  for (const seg of merged) {
    const gap = findUncoveredRange(seg.f, seg.t, targetReps);
    if (gap) gaps.push({from: Math.round(gap.from), to: Math.round(gap.to)});
  }
  return gaps;
}

// Gaps across full route [0, len] regardless of prereq
function findAllGapsFullRoute(targetReps, len) {
  const gaps = [];
  const segs = targetReps
    .map(r=>({f:parseFloat(r.from)||0, t:parseFloat(r.to)||0}))
    .filter(s=>s.t>s.f).sort((a,b)=>a.f-b.f);
  const merged = [];
  for (const s of segs) {
    if (!merged.length || s.f > merged[merged.length-1].t + 0.001) merged.push({...s});
    else merged[merged.length-1].t = Math.max(merged[merged.length-1].t, s.t);
  }
  let cursor = 0;
  for (const s of merged) {
    if (s.f > cursor + 0.001) gaps.push({from: Math.round(cursor), to: Math.round(s.f)});
    cursor = s.t;
  }
  if (cursor < len - 0.001) gaps.push({from: Math.round(cursor), to: Math.round(len)});
  return gaps;
}

function deleteProject(name) {
  const reports    = getReports().filter(r => r.project === name);
  const routes     = (getRoutes()[name] || []).length;
  const machines   = getMachinery().filter(m => m.project === name).length;
  const storeItems = getStoreItems().filter(i => i.project === name).length;
  const storeTxns  = getStoreTxns().filter(t => t.project === name || t.fromProject === name).length;
  const attendance = getAttendance().filter(a => a.project === name).length;
  const users      = Object.values(getUsers()).filter(u => (u.projects||[]).includes(name)).length;

  const msg = `⚠️ Permanently delete "${name}"?\n\nThe following will be deleted:\n`
    + `• ${routes} Route(s)\n`
    + `• ${reports.length} Report(s) (Pipeline + Civil)\n`
    + `• ${machines} Machine(s)\n`
    + `• ${storeItems} Store Item(s)\n`
    + `• ${storeTxns} Store Transaction(s)\n`
    + `• ${attendance} Attendance Record(s)\n`
    + `• Removed from ${users} User Assignment(s)\n\nThis cannot be undone.`;

  showConfirm('Delete Project', msg, () => {
    // 1. Remove project from list
    saveProjects(getProjects().filter(x => x !== name));

    // 2. Remove routes
    const r = getRoutes(); delete r[name]; saveRoutes(r);

    // 3. Remove reports
    saveReports(getReports().filter(r => r.project !== name));

    // 4. Remove machinery assigned to this project
    const remainingMachIds = new Set(getMachinery().filter(m => m.project !== name).map(m => m.id));
    saveMachinery(getMachinery().filter(m => m.project !== name));
    saveMachLogs(getMachLogs().filter(l => remainingMachIds.has(l.machineId)));
    saveMachService(getMachService().filter(l => remainingMachIds.has(l.machineId)));
    saveMachIssues(getMachIssues().filter(l => remainingMachIds.has(l.machineId)));

    // 5. Remove store items & transactions
    saveStoreItems(getStoreItems().filter(i => i.project !== name));
    saveStoreTxns(getStoreTxns().filter(t => t.project !== name && t.fromProject !== name));

    // 6. Remove attendance records for this project
    saveAttendance(getAttendance().filter(a => a.project !== name));

    // 7. Remove project from user assignments
    const allUsers = getUsers();
    Object.keys(allUsers).forEach(u => {
      if (allUsers[u].projects) {
        allUsers[u].projects = allUsers[u].projects.filter(p => p !== name);
      }
    });
    saveUsers(allUsers);

    // 8. Remove assignments
    const asgn = getAssignments();
    delete asgn[name];
    saveAssignments(asgn);

    pushConfig();
    document.getElementById('settingsContent').innerHTML = renderSettingsProjects();
    showToast('🗑️ Project and all related data deleted');
  });
}

function addRoute(proj) {
  const name = document.getElementById('rt-name').value.trim();
  const len  = parseFloat(document.getElementById('rt-len').value) || 0;
  if (!name || !len) { showToast('Enter route name and length'); return; }

  // Collect all pipe spec rows
  const list = document.getElementById('rt-pipes-list');
  const pipes = list ? Array.from(list.querySelectorAll('[id^="rt-pipe-row-"]')).map(row => {
    const idx = row.id.replace('rt-pipe-row-','');
    const dia = document.getElementById('rt-dia-'+idx)?.value.trim() || '';
    const mat = document.getElementById('rt-mat-'+idx)?.value || '';
    return dia ? { dia, material: mat } : null;
  }).filter(Boolean) : [];

  // Backward-compatible: also set pipe as first spec string
  const pipe = pipes.length ? `${pipes[0].dia} ${pipes[0].material}` : '';

  const routes = getRoutes();
  if (!routes[proj]) routes[proj] = [];
  routes[proj].push({ id: 'R' + Date.now(), name, length: len, pipe, pipes });
  saveRoutes(routes);
  pushConfig();
  manageRoutes(proj);
  showToast('✅ Route added');
}

function deleteRoute(proj, idx) {
  const routes = getRoutes();
  routes[proj].splice(idx, 1);
  saveRoutes(routes);
  pushConfig();
  manageRoutes(proj);
}

function addProjectToUser(username) {
  const sel = document.getElementById('addProjSel_' + username);
  const proj = sel ? sel.value : '';
  if (!proj) { showToast('Select a project first'); return; }
  const users = getUsers();
  if (!users[username]) return;

  // If assigning a PM, check no other PM already assigned to this project
  if (users[username].role === 'pm') {
    const existingPM = Object.entries(users).find(([u, v]) =>
      u !== username && v.role === 'pm' && (v.projects || []).includes(proj)
    );
    if (existingPM) {
      showToast(`⚠️ ${existingPM[1].name || existingPM[0]} is already PM for "${proj}"`);
      return;
    }
  }

  if (!users[username].projects) users[username].projects = [];
  if (users[username].projects.includes(proj)) { showToast('Already assigned'); return; }
  users[username].projects.push(proj);
  saveUsers(users);
  pushConfig();
  showToast('✅ ' + proj + ' assigned to @' + username);
  document.getElementById('main').innerHTML = renderUsersTab();
}

function removeProjectFromUser(username, proj) {
  const users = getUsers();
  if (!users[username]) return;
  users[username].projects = (users[username].projects || []).filter(function(p){return p !== proj;});
  saveUsers(users);
  pushConfig();
  showToast('🗑️ Removed ' + proj + ' from @' + username);
  document.getElementById('main').innerHTML = renderUsersTab();
}

async function saveUserUM() {
  const name = (document.getElementById('um-name')||{}).value || '';
  const user = ((document.getElementById('um-user')||{}).value || '').trim().toLowerCase().replace(/\s+/g,'');
  const pass = (document.getElementById('um-pass')||{}).value || '';
  const role = (document.getElementById('um-role')||{}).value || 'junior_engineer';
  const projs = window._umProjects || [];

  if (!name.trim()) { showToast('⚠️ Enter full name'); return; }
  if (!user) { showToast('⚠️ Enter username'); return; }
  if (!pass) { showToast('⚠️ Enter password'); return; }

  const users = getUsers();
  if (users[user]) { showToast('⚠️ Username already exists'); return; }

  // If PM role, check no other PM already assigned to any selected project
  if (role === 'pm') {
    for (const proj of projs) {
      const existingPM = Object.entries(users).find(([, v]) =>
        v.role === 'pm' && (v.projects || []).includes(proj)
      );
      if (existingPM) {
        showToast(`⚠️ ${existingPM[1].name || existingPM[0]} is already PM for "${proj}"`);
        return;
      }
    }
  }
  // Remove from deleted list if re-creating a previously deleted username
  const deletedList = LS.get('phx_deleted_users', []);
  LS.set('phx_deleted_users', deletedList.filter(u => u !== user));
  users[user] = { role, pass, name: name.trim(), projects: projs, createdAt: new Date().toISOString() };
  saveUsers(users);
  // Track as pending push so sync never removes it
  const pending = LS.get('phx_pending_users', []);
  if (!pending.includes(user)) { pending.push(user); LS.set('phx_pending_users', pending); }

  // Push to Appwrite and confirm
  showToast('⏳ Saving user…');
  try {
    await pushConfig();
    showToast('✅ User created and synced');
  } catch(e) {
    showToast('⚠️ Saved locally, sync failed — try again');
  }

  const roleLabel = getUserLabel({role, name: name.trim()});
  window._credsToCopy = 'Phoenix ERP\nApp: ' + location.origin + '\nUsername: ' + user + '\nPassword: ' + pass + '\nRole: ' + roleLabel;
  document.getElementById('formModalContent').innerHTML = `
    <div class="flex justify-between items-center mb-4">

async function updateUserUM(username) {
  const name = ((document.getElementById('eu-name')||{}).value || '').trim();
  const pass = (document.getElementById('eu-pass')||{}).value || '';
  const role = (document.getElementById('eu-role')||{}).value || 'junior_engineer';
  if (!name) { showToast('⚠️ Name cannot be empty'); return; }
  const users = getUsers();
  if (!users[username]) return;

  // If changing to PM role, check no other PM already on their projects
  if (role === 'pm' && users[username].role !== 'pm') {
    const myProjects = users[username].projects || [];
    for (const proj of myProjects) {
      const existingPM = Object.entries(users).find(([u, v]) =>
        u !== username && v.role === 'pm' && (v.projects || []).includes(proj)
      );
      if (existingPM) {
        showToast(`⚠️ ${existingPM[1].name || existingPM[0]} is already PM for "${proj}"`);
        return;
      }
    }
  }
  users[username].name = name;
  users[username].role = role;
  delete users[username].designation;
  if (pass) users[username].pass = pass;
  saveUsers(users);
  closeFormModal();
  document.getElementById('main').innerHTML = renderUsersTab();
  try {
    await pushConfig();
    showToast('✅ @' + username + ' updated & synced');
  } catch(e) {
    showToast('✅ @' + username + ' updated (sync pending)');
  }
}

function deleteUserUM(username) {
  showConfirm('Delete User', 'Delete account "@' + username + '"? This cannot be undone.', async function() {
    // Update deleted list FIRST so saveUsers guard doesn't restore the user
    const deleted = LS.get('phx_deleted_users', []);
    if (!deleted.includes(username)) { deleted.push(username); LS.set('phx_deleted_users', deleted); }

    const users = getUsers();
    delete users[username];
    saveUsers(users);
    saveAttendance(getAttendance().filter(a=>a.user!==username));
    document.getElementById('main').innerHTML = renderUsersTab();
    try {
      await pushConfig();
      showToast('🗑️ User deleted & synced');
    } catch(e) {
      showToast('🗑️ Deleted locally (sync pending)');
    }
  });
}

async function init() {
  // Migrate old data keys if any
  const oldReports = localStorage.getItem('aquatrack_reports');
  if (oldReports && !localStorage.getItem('phx_reports')) {
    LS.set('phx_reports', JSON.parse(oldReports));
  }
  const oldUsers = localStorage.getItem('aquatrack_users');
  if (oldUsers && !localStorage.getItem('phx_users')) {
    const u = JSON.parse(oldUsers);
    if (!u.admin) u.admin = { role:'admin', pass:'admin', name:'Admin' };
    LS.set('phx_users', u);
  }
  ['aquatrack_projects','aquatrack_routes','aquatrack_assignments','aquatrack_specials'].forEach(k => {
    const newMap = {'aquatrack_projects':'phx_projects','aquatrack_routes':'phx_routes','aquatrack_assignments':'phx_assignments','aquatrack_specials':'phx_specials'};
    if (localStorage.getItem(k) && !localStorage.getItem(newMap[k])) {
      localStorage.setItem(newMap[k], localStorage.getItem(k));
    }
  });

  // Migrate inline photos to separate photo store
  try {
    const allR = LS.get('phx_reports', []);
    let migrated = false;
    allR.forEach(r => {
      if (!r.id) return;
      const hasInline = r.photosStart?.length || r.photosEnd?.length || r.photos?.length;
      if (hasInline) {
        savePhotosForReport(r.id, r.photosStart||[], r.photosEnd||[], r.photos||[]);
        r.photosStart = []; r.photosEnd = []; r.photos = [];
        migrated = true;
      }
    });
    if (migrated) LS.set('phx_reports', allR);
  } catch(e) {}

  hideLoader();
  document.getElementById('loginScreen').classList.remove('hidden');
}

function renderAttendanceEngineer() {

  let html = `<div class="section-title mb-4">🕐 My Attendance & Leave</div>`;

  // Today's attendance
  html += `<div class="card mb-3">
    <div class="card-title">📅 Today — ${today}</div>`;
  if (todayRec) {
    html += `<div style="margin-top:8px">
      <span style="font-size:13px;font-weight:700">${todayRec.status==='present'?'🟢 Present':'🔴 Absent'}</span>
      <span style="margin-left:12px;font-size:11px;color:${statColor(todayRec.pmStatus)}">${statLabel(todayRec.pmStatus)} (PM)</span>

    </div>`;
  } else {
    html += `<div class="flex gap-2 mt-2">
      <button class="btn btn-primary flex-1" onclick="markAttendance('present')">🟢 Present</button>
      <button class="btn btn-ghost flex-1" onclick="markAttendance('absent')">🔴 Absent</button>
    </div>`;
  }
  html += `</div>`;

  // Missed past dates - only show info, not action buttons (only PM/Admin can backdate)
  const missedDays = [];
  for (let i = 1; i <= 3; i++) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const dateStr = d.toISOString().slice(0,10);
    if (!all.find(a => a.date === dateStr && a.atype === 'attendance')) {
      missedDays.push({ date: dateStr, label: i===1 ? 'Yesterday' : d.toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short'}) });
    }
  }
  if (missedDays.length) {
    html += `<div class="card mb-3" style="border-left:3px solid var(--orange)">
      <div class="card-title" style="color:var(--orange)">⚠️ Missed Attendance</div>
      <div style="font-size:11px;color:var(--muted);margin:4px 0 10px">Contact your PM or Admin to mark attendance for missed days.</div>
      ${missedDays.map(d=>`
        <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)">
          <div style="font-size:12px;font-weight:600">${d.label} <span style="color:var(--muted);font-weight:400">${d.date}</span></div>
          <span style="font-size:10px;font-weight:700;color:var(--red)">Not Marked</span>
        </div>`).join('')}
    </div>`;
  }

  // Monthly report
  const now = new Date();
  const monthStart = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().slice(0,10);
  const monthEnd   = new Date(now.getFullYear(), now.getMonth()+1, 0).toISOString().slice(0,10);
  const monthRecs  = all.filter(a => a.atype==='attendance' && a.date >= monthStart && a.date <= monthEnd);
  const present = monthRecs.filter(a=>a.status==='present').length;
  const absent  = monthRecs.filter(a=>a.status==='absent').length;
  const half    = monthRecs.filter(a=>a.status==='half').length;
  const monthLeaves = all.filter(a => a.atype==='leave' && a.leaveFrom >= monthStart && a.leaveFrom <= monthEnd).length;
  const monthName = now.toLocaleString('en-IN',{month:'long',year:'numeric'});

  html += `<div class="card mb-3">
    <div class="card-title">📊 Monthly Report — ${monthName}</div>
    <div class="stat-grid mt-2">
      <div class="stat-card"><div class="val text-green">${present}</div><div class="lbl">Present</div></div>
      <div class="stat-card"><div class="val text-red">${absent}</div><div class="lbl">Absent</div></div>
      <div class="stat-card"><div class="val text-blue">${monthLeaves}</div><div class="lbl">Leaves</div></div>
    </div>
    <div style="margin-top:10px;padding-top:8px;border-top:1px solid var(--border);font-size:12px;color:var(--muted)">
      Effective days: <strong style="color:var(--text)">${(present + half*0.5).toFixed(1)}</strong> of ${monthRecs.length} marked
    </div>
    <button class="btn btn-ghost btn-sm w-full mt-2" onclick="exportMonthlyAttendance()">📄 Export Month Report</button>
  </div>`;
  html += `<div class="card mb-3">
    <div class="card-title">🏖️ Apply Leave</div>
    <div class="form-row mt-2">
      <div class="field-group"><label>From Date</label><input type="date" id="lv-from"></div>

    </div>
<div class="field-group"><label>Reason</label><input type="text" id="lv-reason" placeholder="Brief reason"></div>
    <button class="btn btn-primary w-full mt-2" onclick="applyLeave()">Apply Leave</button>
  </div>`;

  // History
  const history = all.sort((a,b)=>b.date.localeCompare(a.date)).slice(0,30);
  if (history.length) {
    html += `<div class="card-title mb-2">📋 History</div>`;
    html += history.map(a => renderAttendanceHistoryCard(a)).join('');
  }
  return html;
}

function localToday() {
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function markAttendanceFor(status, date, targetUser) {
  const all = getAttendance();
  if (all.find(a=>a.user===targetUser&&a.date===date&&a.atype==='attendance')) {
    showToast('Already marked for ' + date); return;
  }
  const users = getUsers();
  const targetUserData = users[targetUser];
  const myProj = (targetUserData?.projects||[])[0] || getVisibleProjects()[0] || '';

  // Find PM for this project
  const pmEntry = Object.entries(users).find(([,u])=>u.role==='pm'&&(u.projects||[]).includes(myProj));
  const pmUser = pmEntry?.[0]||'';
  const pmName = pmEntry?.[1]?.name||pmUser;

  let pmStatus, adminStatus;
  if (currentRole === 'pm') {
    // PM marks → PM approved, needs admin approval
    pmStatus = 'approved';
    adminStatus = 'pending';
  } else if (currentRole === 'admin') {
    if (pmEntry) {
      // Admin marks but PM exists → PM approved (admin acting on behalf), admin approved
      pmStatus = 'approved';
      adminStatus = 'approved';
    } else {
      // No PM for this project → admin auto-approves both
      pmStatus = 'approved';
      adminStatus = 'approved';
    }
  }

  all.push({
    id: 'ATT_'+Date.now(), user: targetUser,
    userName: targetUserData?.name||targetUser,
    project: myProj, atype: 'attendance', date, status,
    pmUser, pmName, isBackfill: true,
    pmStatus, adminStatus,
    markedBy: currentUser, markedByName: users[currentUser]?.name||currentUser,
    timestamp: new Date().toISOString()
  });
  saveAttendance(all); pushConfig();
  showToast(`✅ ${status==='present'?'Present':'Absent'} marked for ${targetUserData?.name||targetUser} on ${date}`);
  renderCurrentTab();
}

function localYearMonth() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
}

function monthlyAttendanceSummary(user, records) {
  const now = new Date();
  const selMonth = document.getElementById('att-month-sel')?.value || localYearMonth();
  const [yr, mo] = selMonth.split('-').map(Number);
  const daysInMonth = new Date(yr, mo, 0).getDate();

  const monthRecs = records.filter(a => a.user===user && a.date?.startsWith(selMonth) && a.atype==='attendance');
  const leaveRecs = records.filter(a => a.user===user && a.atype==='leave' && a.leaveFrom?.startsWith(selMonth));

  const present = monthRecs.filter(a=>a.status==='present').length;
  const absent  = monthRecs.filter(a=>a.status==='absent').length;
  const half    = monthRecs.filter(a=>a.status==='half').length;
  const leaves  = leaveRecs.length;

  // Build calendar
  const firstDay = new Date(yr, mo-1, 1).getDay();
  const dayMap = {};
  monthRecs.forEach(a=>{ dayMap[a.date]=a.status; });
  leaveRecs.forEach(a=>{ dayMap[a.leaveFrom]='leave'; });

  let cal = '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-top:8px">';
  ['S','M','T','W','T','F','S'].forEach(d=>{ cal+=`<div style="text-align:center;font-size:9px;font-weight:700;color:var(--muted);padding:2px">${d}</div>`; });
  for(let i=0;i<firstDay;i++) cal+='<div></div>';
  for(let d=1;d<=daysInMonth;d++){
    const dateStr=`${selMonth}-${String(d).padStart(2,'0')}`;
    const st=dayMap[dateStr];
    const bg=st==='present'?'rgba(48,209,88,0.2)':st==='absent'?'rgba(255,69,58,0.2)':st==='half'?'rgba(255,214,10,0.2)':st==='leave'?'rgba(90,200,250,0.2)':'var(--surface2)';
    const col=st==='present'?'var(--green)':st==='absent'?'var(--red)':st==='half'?'var(--yellow)':st==='leave'?'var(--cyan)':'var(--muted)';
    cal+=`<div style="text-align:center;padding:4px 2px;border-radius:6px;background:${bg};font-size:10px;font-weight:${st?'700':'400'};color:${col}">${d}</div>`;
  }
  cal+='</div>';

  // Last 12 months using local time
  const months=[];
  for(let i=11;i>=0;i--){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    months.push(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'));
  }

  return `
    <div class="card mt-3">
      <div class="flex justify-between items-center mb-2">
        <div class="card-title">📅 Monthly Report</div>

// ── PM VIEW ──
function renderAttendancePM() {
  const today = localToday();
  const myRecs = getAttendance().filter(a => a.user === currentUser);
  const todayRec = myRecs.find(a => a.date === today && a.atype === 'attendance');
  const statColor = s => s==='approved'?'var(--green)':s==='rejected'?'var(--red)':'var(--orange)';
  const statLabel = s => s==='approved'?'✅ Approved':s==='rejected'?'❌ Rejected':'⏳ Pending';

  let html = `<div class="section-title mb-3">🕐 My Attendance</div>`;

  // Own today status
  html += `<div class="card mb-3" style="padding:12px">
    <div style="font-size:12px;color:var(--muted);margin-bottom:8px">Today — ${today}</div>
    ${todayRec
      ? `<div style="font-size:14px;font-weight:700">${todayRec.status==='present'?'🟢 Present':todayRec.status==='absent'?'🔴 Absent':'🟡 Half Day'}</div>
         <span style="font-size:11px;color:${statColor(todayRec.pmStatus)}">${statLabel(todayRec.pmStatus)} (PM)</span>`
      : `<div class="flex gap-2">
          <button class="btn btn-primary flex-1" onclick="markAttendance('present')">🟢 Present</button>
          <button class="btn btn-ghost flex-1" onclick="markAttendance('absent')">🔴 Absent</button>
         </div>`}
  </div>`;

  // Own history
  const myHistory = myRecs.sort((a,b)=>b.date.localeCompare(a.date)).slice(0,10);
  if (myHistory.length) {
    html += `<div class="card-title mb-2">📋 My History</div>`;
    html += myHistory.map(a => renderAttendanceHistoryCard(a)).join('');
  }

  // Team section
  const users = getUsers();
  const deleted = LS.get('phx_deleted_users', []);
  const myEngineers = Object.entries(users).filter(([u,v])=>isEngineer(v.role)&&!deleted.includes(u)&&(v.projects||[]).some(p=>getVisibleProjects().includes(p))).map(([u])=>u);
  const teamAll = getAttendance().filter(a=>myEngineers.includes(a.user));
  const pending = teamAll.filter(a=>a.pmStatus==='pending');
  const done    = teamAll.filter(a=>a.pmStatus!=='pending').sort((a,b)=>b.date.localeCompare(a.date)).slice(0,20);

  html += `<div class="section-title mt-4 mb-3">👥 Team Attendance</div>`;

  // Backdate marking for team (PM privilege)
  if (myEngineers.length) {
    const allAtt = getAttendance();
    const backdateMissed = [];
    myEngineers.forEach(u => {
      for (let i = 1; i <= 7; i++) {
        const d = new Date(); d.setDate(d.getDate() - i);
        const dateStr = d.toISOString().slice(0,10);
        if (!allAtt.find(a => a.user===u && a.date===dateStr && a.atype==='attendance')) {
          backdateMissed.push({ user:u, name:users[u]?.name||u, date:dateStr,
            label: i===1?'Yesterday':d.toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short'}) });
        }
      }
    });
    if (backdateMissed.length) {
      html += `<div class="card mb-3" style="border-left:3px solid var(--orange)">
        <div class="card-title" style="color:var(--orange)">📝 Mark Missed Attendance</div>
        <div style="font-size:11px;color:var(--muted);margin:4px 0 10px">Mark backdated attendance for your team members</div>
        ${backdateMissed.map(d=>`
          <div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border)">
            <div>
              <div style="font-size:12px;font-weight:600">${d.name}</div>
              <div style="font-size:10px;color:var(--muted)">${d.label} · ${d.date}</div>
            </div>
            <div class="flex gap-2">
              <button class="btn btn-primary btn-sm" onclick="markAttendanceFor('present','${d.date}','${d.user}')">🟢</button>
              <button class="btn btn-ghost btn-sm" onclick="markAttendanceFor('absent','${d.date}','${d.user}')">🔴</button>
            </div>
          </div>`).join('')}
      </div>`;
    }
  }

  const selEng = document.getElementById('pm-eng-sel')?.value || myEngineers[0] || '';
  if (myEngineers.length) {
    html += `<div class="flex justify-between items-center mb-2">
      <div class="card-title">📅 Monthly Report</div>
      <select id="pm-eng-sel" onchange="renderCurrentTab()" style="padding:5px 8px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:inherit;font-size:12px">
        ${myEngineers.map(u=>`<option value="${u}"${u===selEng?' selected':''}>${users[u]?.name||u}</option>`).join('')}
      </select>
    </div>`;
    html += monthlyAttendanceSummary(selEng, getAttendance());
  }
  if (pending.length) {
    html += `<div class="card-title mb-2" style="color:var(--orange)">⏳ Pending Approval (${pending.length})</div>`;
    html += pending.map(a => attendanceCard(a, 'pm')).join('');
  }
  if (done.length) {
    html += `<div class="card-title mb-2 mt-3">✅ Reviewed</div>`;
    html += done.map(a => attendanceCard(a, 'pm')).join('');
  }
  if (!teamAll.length) html += `<div class="empty-state"><div class="icon">📋</div><p>No attendance records from your team yet.</p></div>`;
  return html;
}

// ── ADMIN VIEW ──
function renderAttendanceAdmin() {
  const today = localToday();

          <div>
            <div style="font-size:12px;font-weight:600">${d.name}</div>
            <div style="font-size:10px;color:var(--muted)">${d.label} · ${d.date}</div>

function renderAttendanceHistoryCard(a) {
  const statColor = s => s==='approved'?'var(--green)':s==='rejected'?'var(--red)':'var(--orange)';
  const statLabel = s => s==='approved'?'✅ Approved':s==='rejected'?'❌ Rejected':'⏳ Pending';
  const users = getUsers();
  const adminName = Object.entries(users).find(([,u])=>u.role==='admin')?.[1]?.name || 'Admin';
  const pmDisplay = a.pmName || (() => {
    const e = Object.entries(users).find(([,u])=>u.role==='pm'&&(u.projects||[]).includes(a.project));
    return e?.[1]?.name || e?.[0] || '—';
  })();
  const markedByAdmin = (a.markedBy && users[a.markedBy]?.role==='admin')
    || (!a.markedBy && a.isBackfill && a.pmStatus==='approved' && a.adminStatus==='approved');
  const markedByPM = (a.markedBy && users[a.markedBy]?.role==='pm')
    || (!a.markedBy && a.isBackfill && a.pmStatus==='approved' && a.adminStatus==='pending');

  const statusBadge = markedByAdmin
    ? `<div style="font-size:10px;color:var(--green);font-weight:700;text-align:right">✅ Admin Approved</div>`
    : markedByPM
      ? `<div style="font-size:10px;text-align:right"><div style="color:var(--green);font-weight:700">✅ PM Approved</div><div style="color:var(--orange)">⏳ Admin Pending</div></div>`
      : `<div style="font-size:10px;text-align:right">
           <div style="color:${statColor(a.pmStatus)}">${statLabel(a.pmStatus)} PM</div>
           ${a.pmStatus==='approved'?`<div style="color:${statColor(a.adminStatus)}">${statLabel(a.adminStatus)} Admin</div>`:''}
         </div>`;

  return `<div class="card mb-2" style="padding:10px 12px">
    <div class="flex justify-between items-center">
      <div>
        <div style="font-size:12px;font-weight:700">${a.atype==='leave'?'🏖️ Leave':a.status==='present'?'🟢 Present':a.status==='absent'?'🔴 Absent':'🟡 Half Day'} <span style="font-weight:400;color:var(--muted)">${a.atype==='leave'?(a.leaveFrom+' to '+a.leaveTo):a.date}</span>${a.isBackfill?` <span style="font-size:9px;background:rgba(255,159,10,0.2);color:var(--orange);padding:1px 5px;border-radius:4px;font-weight:700">BACKDATED</span>`:''}</div>
        ${a.atype==='leave'?`<div style="font-size:11px;color:var(--muted)">${a.leaveType||''} — ${a.reason||''}</div>`:''}
        ${a.markedByName?`<div style="font-size:10px;color:var(--muted)">Marked by: ${a.markedByName}</div>`:''}
      </div>
      ${statusBadge}
    </div>
  </div>`;
}

function attendanceCard(a, role) {
  const statColor = s => s==='approved'?'var(--green)':s==='rejected'?'var(--red)':'var(--orange)';
  const statLabel = s => s==='approved'?'✅ Approved':s==='rejected'?'❌ Rejected':'⏳ Pending';
  const canAct = (role==='pm' && a.pmStatus==='pending') || (role==='admin' && a.pmStatus==='approved' && a.adminStatus==='pending');

  const users = getUsers();
  const adminName = Object.entries(users).find(([,u])=>u.role==='admin')?.[1]?.name || 'Admin';
  const pmDisplay = a.pmName || (() => {
    const e = Object.entries(users).find(([,u])=>u.role==='pm'&&(u.projects||[]).includes(a.project));
    return e?.[1]?.name || e?.[0] || '—';
  })();

  // Detect if directly marked by admin or PM (not self-submitted)
  const markedByAdmin = (a.markedBy && users[a.markedBy]?.role==='admin')
    || (!a.markedBy && a.isBackfill && a.pmStatus==='approved' && a.adminStatus==='approved');
  const markedByPM = (a.markedBy && users[a.markedBy]?.role==='pm')
    || (!a.markedBy && a.isBackfill && a.pmStatus==='approved' && a.adminStatus==='pending');

  const approvalChain = markedByAdmin
    ? `<div style="background:var(--surface2);border-radius:8px;padding:8px 10px;font-size:11px;color:var(--green);font-weight:700">
        ✅ Marked & approved by ${a.markedByName||adminName}
       </div>`
    : markedByPM
      ? `<div style="background:var(--surface2);border-radius:8px;padding:8px 10px;font-size:11px">
          <div style="color:var(--green);font-weight:700">✅ Marked by ${a.markedByName||pmDisplay}</div>
          <div style="color:var(--orange);margin-top:4px">⏳ Awaiting Admin approval</div>
         </div>`
      : `<div style="background:var(--surface2);border-radius:8px;padding:8px 10px">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
            <div style="width:6px;height:6px;border-radius:50%;background:var(--blue);flex-shrink:0"></div>
            <div style="font-size:11px;color:var(--muted)">Submitted by</div>
            <div style="font-size:11px;font-weight:700;color:var(--text)">${a.userName||a.user}</div>
          </div>
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
            <div style="width:6px;height:6px;border-radius:50%;background:${statColor(a.pmStatus)};flex-shrink:0"></div>
            <div style="font-size:11px;color:var(--muted)">PM</div>
            <div style="font-size:11px;font-weight:700;color:var(--text)">${pmDisplay}</div>
            <div style="font-size:10px;font-weight:700;color:${statColor(a.pmStatus)};margin-left:auto">${statLabel(a.pmStatus)}</div>
          </div>
          <div style="display:flex;align-items:center;gap:6px">
            <div style="width:6px;height:6px;border-radius:50%;background:${a.pmStatus==='approved'?statColor(a.adminStatus):'var(--border)'};flex-shrink:0"></div>
            <div style="font-size:11px;color:${a.pmStatus==='approved'?'var(--muted)':'var(--border)'}">Admin</div>
            <div style="font-size:11px;font-weight:700;color:${a.pmStatus==='approved'?'var(--text)':'var(--border)'}"> ${adminName}</div>
            <div style="font-size:10px;font-weight:700;color:${a.pmStatus==='approved'?statColor(a.adminStatus):'var(--border)'};margin-left:auto">${a.pmStatus==='approved'?statLabel(a.adminStatus):'Waiting for PM'}</div>
          </div>
         </div>`;

  return `<div class="card mb-2" style="padding:10px 12px">
    <div class="flex justify-between items-center mb-1">
      <div style="font-size:13px;font-weight:700">${a.userName||a.user}</div>
      <div style="font-size:10px;color:var(--muted)">${a.date||''}</div>
    </div>
    <div style="font-size:12px;font-weight:600;margin-bottom:6px">
      ${a.atype==='leave'?'🏖️ Leave Application':a.status==='present'?'🟢 Present':'🔴 Absent'}
      ${a.atype==='leave'?`<span style="font-size:11px;font-weight:400;color:var(--muted)"> · ${a.leaveFrom} to ${a.leaveTo}${a.reason?' — '+a.reason:''}</span>`:''}
      ${a.isBackfill?` <span style="font-size:9px;background:rgba(255,159,10,0.2);color:var(--orange);padding:1px 5px;border-radius:4px;font-weight:700">BACKDATED</span>`:''}
    </div>
    <div style="font-size:10px;color:var(--muted);margin-bottom:8px">📁 ${a.project||'—'}</div>
    ${approvalChain}
    ${canAct ? `<div class="flex gap-2 mt-2">
      <button class="btn btn-primary btn-sm flex-1" onclick="reviewAttendance('${a.id}','${role}','approved')">✅ Approve</button>
      <button class="btn btn-danger btn-sm flex-1" onclick="reviewAttendance('${a.id}','${role}','rejected')">❌ Reject</button>
    </div>` : ''}
  </div>`;
}

function reviewAttendance(id, role, decision) {
  const all = getAttendance();
  const rec = all.find(a=>a.id===id);
  if (!rec) return;
  if (role==='pm') rec.pmStatus = decision;
  else rec.adminStatus = decision;
  saveAttendance(all); pushConfig();
  showToast(decision==='approved'?'✅ Approved':'❌ Rejected');
  renderCurrentTab();
}

function exportMonthlyAttendance(targetUser) {
  const now = new Date();
  const monthStart = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().slice(0,10);
  const monthEnd   = new Date(now.getFullYear(), now.getMonth()+1, 0).toISOString().slice(0,10);
  const monthName  = now.toLocaleString('en-IN',{month:'long',year:'numeric'});

  let all = getAttendance();
  const deleted = LS.get('phx_deleted_users', []);
  all = all.filter(a=>!deleted.includes(a.user));
  if (targetUser) all = all.filter(a=>a.user===targetUser);
  else if (isEngineer(currentRole)) all = all.filter(a=>a.user===currentUser);
  // admin with no targetUser = export all staff

  // Group by user
  const users = {};
  all.forEach(a => {
    if (!users[a.user]) users[a.user] = {name:a.userName||a.user, att:[], leaves:[]};
    if (a.atype==='attendance' && a.date>=monthStart && a.date<=monthEnd) users[a.user].att.push(a);
    if (a.atype==='leave' && a.leaveFrom>=monthStart) users[a.user].leaves.push(a);
  });

  const thS = 'padding:7px 10px;background:#1e1e28;color:#fff;font-size:11px;border:1px solid #333;text-align:left';
  const tdS = 'padding:6px 10px;font-size:11px;border:1px solid #e8e8e8';

  let rows = Object.values(users).map(u => {
    const present = u.att.filter(a=>a.status==='present').length;
    const absent  = u.att.filter(a=>a.status==='absent').length;
    const half    = 0;
    const leaves  = u.leaves.length;
    const eff     = (present + half*0.5).toFixed(1);
    return `<tr><td style="${tdS}">${u.name}</td><td style="${tdS};color:#30D158;font-weight:700">${present}</td><td style="${tdS};color:#FF453A;font-weight:700">${absent}</td><td style="${tdS};color:#FF9F0A;font-weight:700">${half}</td><td style="${tdS};color:#0A84FF;font-weight:700">${leaves}</td><td style="${tdS};font-weight:700">${eff}</td></tr>`;
  }).join('');

  const html = `<!DOCTYPE html><html><head><meta charset="utf-8"><title>Attendance Report ${monthName}</title>

let _machTab = 'logbook'; // 'logbook' | 'service' | 'issues' | 'report'

function renderMachineryTab() {
  const canManage = currentRole === 'admin' || currentRole === 'pm';
  const tabs = [
    ['logbook','📋 Logbook'],
    ['service','🔧 Servicing'],
    ['issues','⚠️ Issues'],
    ['report','📊 Report'],
  ];
  const tabBar = tabs.map(([k,l])=>`<div class="tab-item${_machTab===k?' active':''}" onclick="_machTab='${k}';renderCurrentTab()" style="font-size:12px">${l}</div>`).join('');

  let html = `<div class="section-header"><div class="section-title">🚜 Machinery</div>
    ${_machTab==='logbook'?`<button class="btn btn-primary btn-sm" onclick="openAddMachLog()">+ Log</button>`:''}
    ${_machTab==='service'&&canManage?`<button class="btn btn-primary btn-sm" onclick="openAddService()">+ Service</button>`:''}
    ${_machTab==='issues'?`<button class="btn btn-primary btn-sm" onclick="openAddIssue()">+ Issue</button>`:''}

  <div class="tab-bar mb-3">${tabBar}</div>`;

  if (_machTab === 'logbook') html += renderMachLogbook();
  if (_machTab === 'service') html += renderMachService();
  if (_machTab === 'issues')  html += renderMachIssues();
  if (_machTab === 'report')  html += renderMachReport();
  return html;
}

function deleteMachine(id) {
  if (!confirm('Delete this machine? All logs and service records will remain.')) return;

  document.getElementById('settingsContent').innerHTML = renderSettingsMachinery();
}

// ── MONTHLY REPORT ──
function renderMachReport() {
  const vp = getVisibleProjects();
  const allMach = getMachinery().filter(m=>!m.project||vp.includes(m.project));
  if (!allMach.length) return `<div class="empty-state"><div class="icon">📊</div><p>No machines found for your sites.</p></div>`;

  const now = new Date();
  const selMonth = document.getElementById('mach-month-sel')?.value || now.toISOString().slice(0,7);
  const selProj  = document.getElementById('mach-proj-sel')?.value  || '';
  const [yr, mo] = selMonth.split('-').map(Number);
  const monthStart = `${selMonth}-01`;
  const monthEnd   = new Date(yr, mo, 0).toISOString().slice(0,10);
  const monthName  = new Date(yr, mo-1, 1).toLocaleString('en-IN',{month:'long',year:'numeric'});

  const months = Array.from({length:6},(_,i)=>{const d=new Date(now.getFullYear(),now.getMonth()-i,1);return d.toISOString().slice(0,7);});
  const projects = [...new Set(allMach.map(m=>m.project).filter(Boolean))];

  const filteredMach = selProj ? allMach.filter(m=>m.project===selProj) : allMach;
  const machIds = new Set(filteredMach.map(m=>m.id));
  const logs = getMachLogs().filter(l=>machIds.has(l.machineId)&&l.date>=monthStart&&l.date<=monthEnd);
  const services = getMachService().filter(s=>machIds.has(s.machineId)&&s.date>=monthStart&&s.date<=monthEnd);
  const issues = getMachIssues().filter(i=>machIds.has(i.machineId));

  // Totals
  const totalHours = logs.reduce((s,l)=>s+(parseFloat(l.hours)||0),0);
  const totalFuel  = logs.reduce((s,l)=>s+(parseFloat(l.fuel)||0),0);
  const activeDays = new Set(logs.map(l=>l.date)).size;
  const avgFuelPerHour = totalHours>0 ? (totalFuel/totalHours).toFixed(2) : '—';
  const totalSvcCost = services.reduce((s,sv)=>s+(parseFloat(sv.cost)||0),0);
  const openIssues = issues.filter(i=>i.status==='open').length;

  const projOpts = projects.map(p=>'<option value="'+p+'"'+(p===selProj?' selected':'')+'>'+p+'</option>').join('');
  const projSel = projects.length>1 ? '<select id="mach-proj-sel" onchange="renderCurrentTab()" style="flex:1;padding:7px 10px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:inherit;font-size:12px"><option value="">All Sites</option>'+projOpts+'</select>' : '';
  const monthOpts = months.map(m=>'<option value="'+m+'"'+(m===selMonth?' selected':'')+'>'+m+'</option>').join('');

  let html = `
    <div class="flex gap-2 mb-3" style="flex-wrap:wrap">
      <select id="mach-month-sel" onchange="renderCurrentTab()" style="flex:1;padding:7px 10px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:inherit;font-size:12px">${monthOpts}</select>
      ${projSel}
    </div>
    <div class="card-title mb-2">📊 ${monthName} Summary</div>
    <div class="stat-grid mb-3">
      <div class="stat-card"><div class="val text-blue">${totalHours.toFixed(1)}</div><div class="lbl">Total Hours</div></div>
      <div class="stat-card"><div class="val text-orange">${totalFuel.toFixed(0)}</div><div class="lbl">Total Fuel (L)</div></div>
      <div class="stat-card"><div class="val text-green">${avgFuelPerHour}</div><div class="lbl">L / Hour</div></div>
      <div class="stat-card"><div class="val text-cyan">${activeDays}</div><div class="lbl">Active Days</div></div>
      <div class="stat-card"><div class="val text-purple">${logs.length}</div><div class="lbl">Log Entries</div></div>
      <div class="stat-card"><div class="val text-green">${totalSvcCost>0?'₹'+totalSvcCost.toLocaleString('en-IN'):'—'}</div><div class="lbl">Service Cost</div></div>
    </div>`;

  // Per-machine breakdown
  if (filteredMach.length) {
    html += `<div class="card-title mb-2">🚜 Per Machine Breakdown</div>`;
    html += filteredMach.map(m => {
      const mLogs = logs.filter(l=>l.machineId===m.id);
      const mHours = mLogs.reduce((s,l)=>s+(parseFloat(l.hours)||0),0);
      const mFuel  = mLogs.reduce((s,l)=>s+(parseFloat(l.fuel)||0),0);
      const mDays  = new Set(mLogs.map(l=>l.date)).size;
      const mFPH   = mHours>0?(mFuel/mHours).toFixed(2):'—';
      const mSvc   = services.filter(s=>s.machineId===m.id);
      const mCost  = mSvc.reduce((s,sv)=>s+(parseFloat(sv.cost)||0),0);
      const mIssues= issues.filter(i=>i.machineId===m.id&&i.status==='open').length;
      if (!mLogs.length && !mSvc.length) return '';
      return `<div class="card mb-2" style="padding:10px 12px">
        <div class="flex justify-between items-center mb-2">
          <div>
            <div style="font-size:13px;font-weight:700">${m.name}</div>
            <div style="font-size:10px;color:var(--muted)">${m.type}${m.project?' · '+m.project:''}</div>
          </div>
          ${mIssues?`<span style="font-size:10px;font-weight:700;color:var(--red)">⚠️ ${mIssues} open issue${mIssues>1?'s':''}</span>`:''}
        </div>
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:4px">
          ${[['Hours',mHours.toFixed(1),'var(--blue)'],['Fuel(L)',mFuel.toFixed(0),'var(--orange)'],['L/hr',mFPH,'var(--green)'],['Days',mDays,'var(--cyan)']].map(([l,v,c])=>`
            <div style="padding:4px 6px;background:var(--surface2);border-radius:5px;text-align:center">
              <div style="font-size:9px;color:var(--muted)">${l}</div>
              <div style="font-size:12px;font-weight:700;color:${c}">${v}</div>
            </div>`).join('')}
        </div>
        ${mCost?`<div style="font-size:11px;color:var(--muted);margin-top:6px">💰 Service cost: <strong style="color:var(--text)">₹${mCost.toLocaleString('en-IN')}</strong></div>`:''}
      </div>`;
    }).join('');
  }

  // Issues summary
  if (openIssues) {
    html += `<div style="background:rgba(255,69,58,0.1);border:1px solid rgba(255,69,58,0.3);border-radius:10px;padding:10px 12px;margin-top:8px">
      <div style="font-size:11px;font-weight:700;color:var(--red);margin-bottom:4px">⚠️ ${openIssues} Open Issue${openIssues>1?'s':''}</div>
      ${issues.filter(i=>i.status==='open'&&machIds.has(i.machineId)).map(i=>{
        const m=filteredMach.find(x=>x.id===i.machineId);
        const mname = m ? m.name : 'Unknown';
        return '<div style="font-size:11px">🚜 ' + mname + ' — ' + i.description + '</div>';
      }).join('')}
    </div>`;
  }

  html += `<button class="btn btn-ghost w-full mt-3" onclick="exportMachReport(document.getElementById('mach-month-sel')?.value||'',document.getElementById('mach-proj-sel')?.value||'')">📄 Export PDF Report</button>`;
  return html;
}

  }).join('');

  const _machHtml=`<!DOCTYPE html><html><head><meta charset="utf-8"><title>Machinery Report ${monthName}</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700&display=swap" rel="stylesheet">
  <style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Noto Serif',serif;background:#f0f2f5}.page{max-width:960px;margin:0 auto;background:#fff}
  @media print{body{background:#fff}.no-print{display:none}}</style></head><body>

    <button onclick="window.close()" style="padding:8px 20px;background:#666;color:#fff;border:none;border-radius:8px;cursor:pointer">✕ Close</button>
  </div>
  <div class="page">
    <div style="background:#1e1e28;padding:16px 24px;display:flex;justify-content:space-between;align-items:center">
      <div><div style="color:#E8192C;font-size:18px;font-weight:700">Phoenix ERP</div><div style="color:#aaa;font-size:11px">Machinery Module</div></div>
      <div style="text-align:right"><div style="color:#fff;font-size:14px;font-weight:700">Monthly Machinery Report</div><div style="color:#aaa;font-size:11px">${monthName}${selProj?' · '+selProj:''}</div></div>
    </div>
    <div style="padding:20px">
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px">
        ${[['Total Hours',totalHours.toFixed(1)+'','#0A84FF'],['Total Fuel',totalFuel.toFixed(0)+' L','#FF9F0A'],['Avg L/Hr',totalHours>0?(totalFuel/totalHours).toFixed(2):'—','#30D158'],['Service Cost',totalCost?'₹'+totalCost.toLocaleString('en-IN'):'—','#BF5AF2']].map(([l,v,c])=>`
          <div style="background:#f8f9fc;border-radius:8px;padding:12px;text-align:center">

function renderMachLogbook() {

  const machIds = new Set(machines.map(m=>m.id));
  const logs = getMachLogs().filter(l=>machIds.has(l.machineId)).sort((a,b)=>b.date.localeCompare(a.date));
  const today = localToday();

  // Filter by machine
  const selMach = document.getElementById('log-mach-sel')?.value || '';
  const filtered = selMach ? logs.filter(l=>l.machineId===selMach) : logs;

  let html = `<div class="flex gap-2 mb-3">
    <select id="log-mach-sel" onchange="renderCurrentTab()" style="flex:1;padding:8px 10px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:inherit;font-size:13px">
      <option value="">All Machines</option>
      ${machines.map(m=>`<option value="${m.id}"${m.id===selMach?' selected':''}>${m.name}${m.regNo||m.chassisNo?' · '+(m.regNo||m.chassisNo):''}${m.project?' — '+m.project:''}</option>`).join('')}

  if (!filtered.length) return html + `<div class="empty-state"><div class="icon">📋</div><p>No log entries yet.</p></div>`;

  html += filtered.slice(0,30).map(l => {
    const mach = machines.find(m=>m.id===l.machineId);
    return `<div class="card mb-2" style="padding:10px 12px">
      <div class="flex justify-between items-center mb-1">
        <div><div style="font-size:13px;font-weight:700">${mach?.name||'Unknown'}</div><div style="font-size:10px;color:var(--muted)">${mach?.project||''}</div></div>
        <div style="font-size:11px;color:var(--muted)">${l.date}${l.date===today?' 🟢':''}</div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-bottom:6px">
        <div style="padding:4px 6px;background:var(--surface2);border-radius:5px;text-align:center">
          <div style="font-size:9px;color:var(--muted)">HOURS</div>
          <div style="font-size:12px;font-weight:700;color:var(--blue)">${l.hours||0}</div>
        </div>
        <div style="padding:4px 6px;background:var(--surface2);border-radius:5px;text-align:center">
          <div style="font-size:9px;color:var(--muted)">FUEL (L)</div>
          <div style="font-size:12px;font-weight:700;color:var(--orange)">${l.fuel||0}</div>
        </div>
        <div style="padding:4px 6px;background:var(--surface2);border-radius:5px;text-align:center">
          <div style="font-size:9px;color:var(--muted)">OPERATOR</div>
          <div style="font-size:11px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${l.operator||'—'}</div>
        </div>
      </div>
      <div style="font-size:11px;color:var(--text)">${l.workDone||''}</div>
      ${l.chainage?`<div style="font-size:10px;color:var(--muted);margin-top:2px">📍 ${l.chainage}</div>`:''}
    </div>`;
  }).join('');
  return html;

// ── SERVICE HISTORY ──
function renderMachService() {
  const vp = getVisibleProjects();
  const machines = getMachinery().filter(m => !m.project || vp.includes(m.project));
  const machIds = new Set(machines.map(m=>m.id));
  const services = getMachService().filter(s=>machIds.has(s.machineId)).sort((a,b)=>b.date.localeCompare(a.date));
  const today = localToday();

  // Upcoming due
  const due = services.filter(s=>s.nextDue&&s.nextDue<=new Date(Date.now()+30*24*60*60*1000).toISOString().slice(0,10));
  let html = '';
  if (due.length) {
    html += `<div style="background:rgba(255,159,10,0.1);border:1px solid rgba(255,159,10,0.3);border-radius:10px;padding:10px 12px;margin-bottom:12px">
      <div style="font-size:11px;font-weight:700;color:var(--orange);margin-bottom:6px">⏰ SERVICE DUE SOON</div>
      ${due.map(s=>{const m=machines.find(x=>x.id===s.machineId);return `<div style="font-size:12px">🚜 ${m?.name||'?'} — Next due: <strong>${s.nextDue}</strong></div>`;}).join('')}
    </div>`;
  }

  if (!services.length) return html + `<div class="empty-state"><div class="icon">🔧</div><p>No service records yet.</p></div>`;

  const typeColor = t=>t==='breakdown'?'var(--red)':t==='major'?'var(--orange)':'var(--green)';
  html += services.slice(0,30).map(s=>{
    const mach = machines.find(m=>m.id===s.machineId);
    return `<div class="card mb-2" style="padding:10px 12px">
      <div class="flex justify-between items-center mb-1">
        <div>
          <div style="font-size:13px;font-weight:700">${mach?.name||'Unknown'}</div>
          <div style="font-size:10px;color:var(--muted)">${s.date} · ${s.provider||'—'}</div>
        </div>
        <span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;background:rgba(0,0,0,0.3);color:${typeColor(s.type)};text-transform:uppercase">${s.type||'regular'}</span>
      </div>
      <div style="font-size:12px;margin:4px 0">${s.workDone||''}</div>
      <div style="display:flex;gap:12px;font-size:11px;color:var(--muted)">
        ${s.cost?`<span>💰 ₹${s.cost}</span>`:''}
        ${s.nextDue?`<span>📅 Next: ${s.nextDue}</span>`:''}
        ${s.odometerKm?`<span>🔢 ${s.odometerKm} hrs</span>`:''}
      </div>
    </div>`;
  }).join('');
  return html;
}

// ── ISSUES ──
function renderMachIssues() {
  const vp = getVisibleProjects();
  const machines = getMachinery().filter(m => !m.project || vp.includes(m.project));
  const machIds = new Set(machines.map(m=>m.id));
  const issues = getMachIssues().filter(i=>machIds.has(i.machineId)).sort((a,b)=>b.date.localeCompare(a.date));
  const canManage = currentRole==='admin'||currentRole==='pm';

  if (!issues.length) return `<div class="empty-state"><div class="icon">⚠️</div><p>No issues reported.</p></div>`;

  const stColor = s=>s==='open'?'var(--red)':s==='in_progress'?'var(--orange)':'var(--green)';
  const stLabel = s=>s==='open'?'🔴 Open':s==='in_progress'?'🟡 In Progress':'🟢 Resolved';

  return issues.map(i=>{
    const mach = machines.find(m=>m.id===i.machineId);
    return `<div class="card mb-2" style="padding:10px 12px;${i.status==='open'?'border-left:3px solid var(--red)':''}">
      <div class="flex justify-between items-center mb-1">
        <div style="font-size:13px;font-weight:700">${mach?.name||'Unknown'}</div>
        <span style="font-size:10px;font-weight:700;color:${stColor(i.status)}">${stLabel(i.status)}</span>
      </div>
      <div style="font-size:12px;margin-bottom:4px">${i.description}</div>
      <div style="font-size:10px;color:var(--muted)">${i.date} · Reported by ${i.reportedBy||'—'}</div>
      ${i.resolution?`<div style="font-size:11px;color:var(--green);margin-top:4px">✅ ${i.resolution}</div>`:''}
      ${canManage&&i.status!=='resolved'?`<div class="flex gap-2 mt-2">
        ${i.status==='open'?`<button class="btn btn-ghost btn-sm" onclick="updateIssueStatus('${i.id}','in_progress')">→ In Progress</button>`:''}
        <button class="btn btn-primary btn-sm" onclick="resolveIssue('${i.id}')">✅ Resolve</button>
      </div>`:''}
    </div>`;
  }).join('');
}

// ── PHOTO LIGHTBOX ───────────────────────────────────────────
let _lbSrcs = [], _lbIdx = 0;

function openPhotoLightbox(gid, idx) {
  _lbSrcs = window['_ps_'+gid] || []; _lbIdx = idx || 0;
  const lb = document.getElementById('photoLightbox');
  lb.style.display = 'flex';
  lightboxShow();
  // Swipe support
  lb._tx = null;
  lb.ontouchstart = e => { lb._tx = e.touches[0].clientX; };
  lb.ontouchend = e => {
    if (lb._tx === null) return;
    const dx = e.changedTouches[0].clientX - lb._tx;
    if (Math.abs(dx) > 50) lightboxNav(dx < 0 ? 1 : -1);
    lb._tx = null;
  };
}

function lightboxShow() {
  document.getElementById('lightbox-img').src = _lbSrcs[_lbIdx] || '';
  document.getElementById('lightbox-counter').textContent = (_lbSrcs.length > 1) ? (_lbIdx+1) + ' / ' + _lbSrcs.length : '';
  document.getElementById('lightbox-prev').style.visibility = _lbIdx > 0 ? 'visible' : 'hidden';
  document.getElementById('lightbox-next').style.visibility = _lbIdx < _lbSrcs.length-1 ? 'visible' : 'hidden';
}

function lightboxNav(dir) {
  _lbIdx = Math.max(0, Math.min(_lbSrcs.length-1, _lbIdx + dir));
  lightboxShow();
}

function closePhotoLightbox() {
  document.getElementById('photoLightbox').style.display = 'none';
  document.getElementById('lightbox-img').src = '';
  _lbSrcs = []; _lbIdx = 0;
}

// Close on Escape key
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closePhotoLightbox();
  if (e.key === 'ArrowLeft')  lightboxNav(-1);
  if (e.key === 'ArrowRight') lightboxNav(1);
});

let _storeTab = 'inventory';
const canManageStore = () => currentRole === 'admin' || currentRole === 'store_manager';
const isAdmin = () => currentRole === 'admin';

function renderStoreTab() {
  const tabs = [
    ['inventory','📦 Inventory'],
    ['transactions','📋 Transactions'],
  ];
  const tabBar = tabs.map(([k,l])=>`<div class="tab-item${_storeTab===k?' active':''}" onclick="_storeTab='${k}';renderCurrentTab()" style="font-size:12px">${l}</div>`).join('');

  // Buttons differ by role
  let actionBtns = '';
  if (_storeTab==='inventory') {
    if (isAdmin()) {
      actionBtns = `<button class="btn btn-primary btn-sm" onclick="openAddStoreItem('central')">+ Add to Central</button>`;
    } else if (canManageStore()) {
      // Site store manager: purchase → direct issue to their site
      actionBtns = `<button class="btn btn-primary btn-sm" onclick="openSitePurchase()">+ Purchase</button>`;
    }
  }
  if (_storeTab==='transactions' && isAdmin()) {
    actionBtns = `<button class="btn btn-primary btn-sm" onclick="openStoreTxn('issue')">Issue to Site</button>`;
  }

  let html = `<div class="section-header"><div class="section-title">🏪 Store</div>
    <div class="flex gap-2">
      ${actionBtns}
    </div>
  </div>
  <div class="tab-bar mb-3">${tabBar}</div>`;

  if (_storeTab==='inventory')    html += renderStoreInventory();
  if (_storeTab==='transactions') html += renderStoreTxns();
  return html;
}

function renderStoreInventory() {
  const allItems = getStoreItems();
  const centralItems = allItems.filter(i=>i.project==='central');
  const siteItems    = allItems.filter(i=>i.project!=='central');

  if (!centralItems.length && !siteItems.length) {
    return '<div class="empty-state"><div class="icon">📦</div><p>No items yet.</p></div>';
  }

  function itemCard(item, showIssueBtn) {
    const qty = parseFloat(item.qty)||0;
    const minQty = parseFloat(item.minQty)||0;
    const low = qty <= minQty && minQty > 0;
    const pid = 'store_' + item.id;
    // Restore photo from separate localStorage key if not in item object
    const photo = item.photo || localStorage.getItem('phx_si_photo_'+item.id) || '';
    if (photo) window['_ps_'+pid] = [photo];
    let card = '<div class="card mb-2" style="padding:10px 12px' + (low ? ';border-left:3px solid var(--red)' : '') + '">';
    if (photo) card += '<img loading="lazy" src="' + photo + '" onclick="openPhotoLightbox(\'' + pid + '\',0)" style="width:100%;max-height:120px;object-fit:cover;border-radius:8px;margin-bottom:8px;cursor:pointer">';
    card += '<div class="flex justify-between items-center">';
    card += '<div><div style="font-size:13px;font-weight:700">' + item.name + (low ? ' <span style="font-size:10px;color:var(--red)">⚠️ Low Stock</span>' : '') + '</div>';
    card += '<div style="font-size:11px;color:var(--muted)">' + (item.category||'General') + '</div></div>';
    card += '<div style="text-align:right"><div style="font-size:18px;font-weight:700;color:' + (low?'var(--red)':'var(--green)') + '">' + qty + '</div>';
    card += '<div style="font-size:10px;color:var(--muted)">' + (item.unit||'pcs') + '</div></div></div>';
    const condColor = item.condition==='not_working'?'var(--red)':item.condition==='under_repair'?'var(--orange)':'var(--green)';
    const condBg = item.condition==='not_working'?'rgba(255,69,58,0.15)':item.condition==='under_repair'?'rgba(255,159,10,0.15)':'rgba(48,209,88,0.15)';
    const condLabel = item.condition==='not_working'?'❌ Not Working':item.condition==='under_repair'?'🔧 Under Repair':'✅ Working';
    card += '<div style="display:flex;gap:6px;margin-top:6px;flex-wrap:wrap">';
    card += '<span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;background:' + condBg + ';color:' + condColor + '">' + condLabel + '</span>';
    const statColor = item.status==='in_use'?'var(--blue)':'var(--muted)';
    const statBg = item.status==='in_use'?'rgba(10,132,255,0.15)':'rgba(142,142,147,0.15)';
    card += '<span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;background:' + statBg + ';color:' + statColor + '">' + (item.status==='in_use'?'⚡ In Use':'💤 Idle') + '</span></div>';
    if (item.location) card += '<div style="font-size:10px;color:var(--muted);margin-top:4px">📍 ' + item.location + '</div>';
    if (item.description) card += '<div style="font-size:11px;color:var(--muted);margin-top:2px">' + item.description + '</div>';
    if (canManageStore()) {
      card += '<div class="flex gap-2 mt-2">';
      card += '<button class="btn btn-ghost btn-sm" onclick="openEditStoreItem(\'' + item.id + '\')">✏️</button>';
      if (showIssueBtn) {
        card += '<button class="btn btn-primary btn-sm flex-1" onclick="openStoreTxn(\'issue\',\'' + item.id + '\')">→ Issue to Site</button>';
        card += '<button class="btn btn-ghost btn-sm" onclick="openStoreTxn(\'receive\',\'' + item.id + '\')">+ Receive</button>';
      } else {
        card += '<button class="btn btn-ghost btn-sm flex-1" onclick="openSiteTransfer(\'' + item.id + '\')">⇄ Transfer</button>';
        card += '<button class="btn btn-secondary btn-sm flex-1" onclick="openReturnToCentral(\'' + item.id + '\')">↑ Return</button>';
        card += '<button class="btn btn-danger btn-sm" onclick="deleteStoreItem(\'' + item.id + '\')">🗑️</button>';
      }
      card += '</div>';
    }
    card += '</div>';
    return card;
  }

  let html = '';
  // Central Store — hide zero-qty items unless admin
  const visibleCentral = isAdmin() ? centralItems : centralItems.filter(i=>parseFloat(i.qty)>0);
  html += '<div style="font-size:11px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:0.5px;margin:8px 0 6px">🏛️ Central Store</div>';
  if (!visibleCentral.length) {
    html += '<div class="card mb-2" style="padding:10px;text-align:center;color:var(--muted);font-size:12px">No items in central store yet.</div>';
  } else {
    visibleCentral.forEach(i=>{ html += itemCard(i, true); });
  }
  // Site sections
  const projs = [...new Set(siteItems.map(i=>i.project))];
  projs.forEach(proj => {
    html += '<div style="font-size:11px;font-weight:700;color:var(--orange);text-transform:uppercase;letter-spacing:0.5px;margin:12px 0 6px">📁 '+proj+'</div>';
    siteItems.filter(i=>i.project===proj).forEach(i=>{ html += itemCard(i, false); });
  });
  return html;
}

function renderStoreTxns() {
  const vp = getVisibleProjects();
  const items = getStoreItems();
  // Show txns for visible projects AND central store (admin) AND issue-from-central
  const allTxns = getStoreTxns().sort((a,b)=>b.timestamp.localeCompare(a.timestamp));
  if (!allTxns.length) return `<div class="empty-state"><div class="icon">📋</div><p>No transactions yet.</p></div>`;

  const selProj = document.getElementById('stxn-proj')?.value||'';
  const selType = document.getElementById('stxn-type')?.value||'';
  const projOpts = ['',...vp,'central'].map(p=>`<option value="${p}"${p===selProj?' selected':''}>${p||'All Sites'}</option>`).join('');
  let filtered = allTxns;
  if (selProj) filtered = filtered.filter(t=>t.project===selProj||t.fromProject===selProj);
  if (selType) filtered = filtered.filter(t=>t.type===selType);

  let html = `<div class="flex gap-2 mb-3" style="flex-wrap:wrap">
    <select id="stxn-proj" onchange="renderCurrentTab()" style="flex:1;padding:7px 10px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:inherit;font-size:12px">${projOpts}</select>
    <select id="stxn-type" onchange="renderCurrentTab()" style="flex:1;padding:7px 10px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:inherit;font-size:12px">
      <option value="">All Types</option>
      <option value="issue"${selType==='issue'?' selected':''}>Issue</option>
      <option value="receive"${selType==='receive'?' selected':''}>Receive</option>
      <option value="purchase"${selType==='purchase'?' selected':''}>Purchase</option>
      <option value="addition"${selType==='addition'?' selected':''}>Added to Central</option>
      <option value="transfer"${selType==='transfer'?' selected':''}>Transfer</option>
      <option value="return"${selType==='return'?' selected':''}>Return</option>
    </select>
  </div>`;

  html += filtered.slice(0,50).map(t=>{
    const item = items.find(i=>i.id===t.itemId);
    const isIssue = t.type==='issue';
    const isTransfer = t.type==='transfer';
    const isPurchase = t.type==='purchase';
    const isReturn   = t.type==='return';
    const isAddition = t.type==='addition';
    const txnColor = isIssue?'var(--red)':isPurchase||isAddition?'var(--green)':isReturn?'var(--purple)':isTransfer?'var(--cyan)':'var(--blue)';
    const txnSign = isIssue?'−':'+';
    const txnLabel = isIssue?'ISSUE':isPurchase?'PURCHASE':isAddition?'ADDED TO CENTRAL':isReturn?'RETURN':isTransfer?'TRANSFER':'RECEIVE';
    return `<div class="card mb-2" style="padding:10px 12px">
      <div class="flex justify-between items-center">
        <div>
          <div style="font-size:13px;font-weight:700">${item?.name||t.itemName||'Unknown'}</div>
          <div style="font-size:10px;color:var(--muted)">${t.date} · ${t.project} · by ${t.byName||t.by}</div>
          ${t.issuedTo?`<div style="font-size:11px;color:var(--muted)">To Site: <strong style="color:var(--text)">${t.issuedTo}</strong></div>`:''}
          ${t.fromProject?`<div style="font-size:11px;color:var(--muted)">From: <strong style="color:var(--cyan)">${t.fromProject}</strong></div>`:''}
          ${t.toProject?`<div style="font-size:11px;color:var(--cyan)">→ ${t.toProject}</div>`:''}
          ${t.remarks?`<div style="font-size:11px;color:var(--muted)">${t.remarks}</div>`:''}
        </div>
        <div style="text-align:right">
          <div style="font-size:16px;font-weight:700;color:${txnColor}">${txnSign}${t.qty} ${item?.unit||''}</div>
          <div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase">${txnLabel}</div>
        </div>
      </div>
    </div>`;
  }).join('');
  return html;
}

function renderStoreTransfer() {
  if (!canManageStore()) return `<div class="empty-state"><div class="icon">🔒</div><p>Only Store Manager or Admin can transfer items.</p></div>`;
  const vp = getVisibleProjects();
  const items = getStoreItems().filter(i=>vp.includes(i.project));
  if (!items.length) return `<div class="empty-state"><div class="icon">🔄</div><p>No items to transfer.</p></div>`;
  const allProj = getProjects();

  return `<div class="card">
    <div class="card-title mb-3">🔄 Transfer Item Between Sites</div>
    <div class="field-group"><label>Item *</label>
      <select id="tr-item" onchange="onTransferItemChange()">
        <option value="">— Select Item —</option>
        ${items.map(i=>`<option value="${i.id}">${i.name} (${i.project}) — ${i.qty} ${i.unit||'pcs'}</option>`).join('')}
      </select>
    </div>
    <div class="form-row">
      <div class="field-group"><label>From Site</label><input type="text" id="tr-from" readonly style="color:var(--muted)"></div>
      <div class="field-group"><label>To Site *</label>
        <select id="tr-to">
          <option value="">— Select Site —</option>
          ${allProj.map(p=>`<option value="${p}">${p}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="field-group"><label>Quantity *</label><input type="number" id="tr-qty" placeholder="0" min="1"></div>
      <div class="field-group"><label>Date</label><input type="date" id="tr-date" value="${localToday()}"></div>
    </div>
    <div class="field-group"><label>Remarks</label><input type="text" id="tr-remarks" placeholder="Reason for transfer"></div>
    <button class="btn btn-primary w-full mt-3" onclick="doTransfer()">🔄 Transfer</button>
  </div>`;
}

function onTransferItemChange() {
  const sel = document.getElementById('tr-item')?.value;
  const item = getStoreItems().find(i=>i.id===sel);
  const fromEl = document.getElementById('tr-from');
  if (fromEl) fromEl.value = item?.project||'';
  const toSel = document.getElementById('tr-to');
  if (toSel && item) {
    Array.from(toSel.options).forEach(o=>{ o.disabled = o.value===item.project; });
  }
}

function doTransfer() {
  const itemId = document.getElementById('tr-item')?.value;
  const toProj = document.getElementById('tr-to')?.value;
  const qty    = parseFloat(document.getElementById('tr-qty')?.value)||0;
  const date   = document.getElementById('tr-date')?.value||localToday();
  const remarks= document.getElementById('tr-remarks')?.value||'';

  if (!itemId||!toProj||!qty) { showToast('⚠️ Fill all required fields'); return; }
  const items = getStoreItems();
  const item  = items.find(i=>i.id===itemId);
  if (!item) return;
  if (qty > parseFloat(item.qty)) { showToast('⚠️ Not enough stock'); return; }
  if (toProj === item.project) { showToast('⚠️ Same site'); return; }

  // Deduct from source
  item.qty = (parseFloat(item.qty)||0) - qty;

  // Add/update in destination
  const destItem = items.find(i=>i.name===item.name&&i.project===toProj);
  if (destItem) {
    destItem.qty = (parseFloat(destItem.qty)||0) + qty;
  } else {
    items.push({...item, id:'SI_'+Date.now(), project:toProj, qty});
  }
  saveStoreItems(items);

  // Log transaction
  const txns = getStoreTxns();
  const base = {itemId, itemName:item.name, project:item.project, date, by:currentUser, byName:getUsers()[currentUser]?.name||currentUser, timestamp:new Date().toISOString(), qty, remarks};
  txns.push({...base, id:'STX_'+Date.now(), type:'transfer', toProject:toProj});
  saveStoreTxns(txns);
  pushConfig();
  showToast('✅ Transferred successfully');
  renderCurrentTab();
}
