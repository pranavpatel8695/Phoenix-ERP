<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Phoenix ERP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f14;
  --surface: #1a1a24;
  --surface2: #22222e;
  --border: rgba(255,255,255,0.08);
  --text: #f0f0f5;
  --muted: #888899;
  --red: #FF453A;
  --orange: #FF9F0A;
  --green: #30D158;
  --blue: #0A84FF;
  --purple: #BF5AF2;
  --yellow: #FFD60A;
  --cyan: #5AC8FA;
  --accent: #E8192C;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Serif',Georgia,serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
/* ── UTILS ── */
.hidden{display:none!important;}
.flex{display:flex;} .flex-col{flex-direction:column;} .gap-2{gap:8px;} .gap-3{gap:12px;} .gap-4{gap:16px;}
.items-center{align-items:center;} .justify-between{justify-content:space-between;} .flex-1{flex:1;}
.w-full{width:100%;} .text-center{text-align:center;}
.rounded{border-radius:8px;} .rounded-lg{border-radius:12px;} .rounded-xl{border-radius:16px;}
.p-2{padding:8px;} .p-3{padding:12px;} .p-4{padding:16px;}
.mt-2{margin-top:8px;} .mt-3{margin-top:12px;} .mt-4{margin-top:16px;}
.mb-2{margin-bottom:8px;} .mb-3{margin-bottom:12px;}
.text-sm{font-size:12px;} .text-xs{font-size:11px;} .font-bold{font-weight:700;}
.text-muted{color:var(--muted);}
.text-green{color:var(--green);} .text-red{color:var(--red);} .text-blue{color:var(--blue);}
.text-orange{color:var(--orange);} .text-purple{color:var(--purple);}
/* ── CARD ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;}
.card-title{font-size:14px;font-weight:700;margin-bottom:12px;color:var(--text);}
/* ── BUTTONS ── */
.btn{padding:10px 16px;border-radius:10px;border:none;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:opacity 0.15s;}
.btn:hover{opacity:0.85;}
.btn-primary{background:var(--blue);color:#fff;}
.btn-danger{background:var(--red);color:#fff;}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
.btn-ghost{background:transparent;color:var(--blue);border:1px solid rgba(10,132,255,0.3);}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:8px;}
/* ── FORM ── */
.field-group{margin-bottom:14px;}
.field-group label{display:block;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;}
.field-group input,.field-group select,.field-group textarea{width:100%;padding:11px 14px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:inherit;font-size:13px;}
.field-group input:focus,.field-group select:focus,.field-group textarea:focus{outline:none;border-color:var(--blue);}
.field-group select option{background:var(--surface2);}
.radio-group{display:flex;gap:8px;flex-wrap:wrap;}
.radio-opt{padding:8px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;transition:all 0.15s;}
.radio-opt.selected,.radio-opt:hover{border-color:var(--blue);color:var(--blue);background:rgba(10,132,255,0.1);}
.form-row{display:flex;gap:10px;}
.form-row .field-group{flex:1;}
.req{color:var(--red);}
/* ── TOPBAR ── */
#topbar{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--surface);border-bottom:1px solid var(--border);height:56px;display:flex;align-items:center;padding:0 16px;gap:10px;}
.topbar-logo{font-size:16px;font-weight:700;color:var(--text);}
.topbar-logo span{color:var(--accent);}
.topbar-sub{font-size:9px;color:var(--muted);font-weight:400;line-height:1.2;}
.role-badge{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;}
.role-badge.admin{background:rgba(255,214,10,0.15);color:var(--yellow);border:1px solid rgba(255,214,10,0.3);}
.role-badge.pm{background:rgba(48,209,88,0.15);color:var(--green);border:1px solid rgba(48,209,88,0.3);}
.role-badge.supervisor{background:rgba(10,132,255,0.15);color:var(--blue);border:1px solid rgba(10,132,255,0.3);}
#syncStatus{font-size:10px;padding:3px 8px;border-radius:6px;cursor:pointer;border:1px solid transparent;}
#syncStatus.synced{color:var(--green);background:rgba(48,209,88,0.1);border-color:rgba(48,209,88,0.2);}
#syncStatus.syncing{color:var(--orange);background:rgba(255,159,10,0.1);border-color:rgba(255,159,10,0.2);}
#syncStatus.offline{color:var(--red);background:rgba(255,69,58,0.1);border-color:rgba(255,69,58,0.2);}
.avatar-btn{width:32px;height:32px;border-radius:50%;background:var(--blue);color:#fff;font-size:12px;font-weight:700;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;}
/* ── BOTTOM NAV ── */
#bottomNav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--surface);border-top:1px solid var(--border);display:flex;padding:8px 0 max(8px,env(safe-area-inset-bottom));}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px;cursor:pointer;color:var(--muted);font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:0.3px;transition:color 0.15s;}
.nav-item .nav-icon{font-size:20px;line-height:1;}
.nav-item.active{color:var(--blue);}
/* ── MAIN CONTENT ── */
#main{margin-top:56px;margin-bottom:72px;padding:16px;max-width:600px;margin-left:auto;margin-right:auto;}
/* ── LOGIN ── */
#loginScreen{position:fixed;inset:0;background:var(--bg);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;}
.login-card{width:100%;max-width:380px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:32px 24px;}
.login-logo{text-align:center;margin-bottom:28px;}
.login-logo h1{font-size:28px;font-weight:700;color:var(--text);}
.login-logo h1 span{color:var(--accent);}
.login-logo p{font-size:12px;color:var(--muted);margin-top:4px;}
/* ── MODULE CARDS ── */
.module-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.module-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;cursor:pointer;transition:border-color 0.2s,transform 0.1s;}
.module-card:hover{border-color:var(--blue);transform:translateY(-1px);}
.module-card .icon{font-size:28px;margin-bottom:8px;}
.module-card .name{font-size:13px;font-weight:700;color:var(--text);}
.module-card .count{font-size:11px;color:var(--muted);margin-top:2px;}
/* ── STAT CARDS ── */
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px;}
.stat-card{background:var(--surface2);border-radius:12px;padding:12px;text-align:center;}
.stat-card .val{font-size:22px;font-weight:800;line-height:1;}
.stat-card .lbl{font-size:10px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:0.3px;}
/* ── REPORT LIST ── */
.report-item{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;}
.report-item-header{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.type-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.report-type-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;}
.report-info{font-size:12px;color:var(--muted);}
.report-date{font-size:11px;color:var(--muted);}
.report-actions{display:flex;gap:6px;margin-top:10px;}
/* ── SECTION HEADER ── */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.section-title{font-size:16px;font-weight:700;}
/* ── TOAST ── */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:#333;color:#fff;padding:10px 18px;border-radius:20px;font-size:13px;opacity:0;transition:all 0.3s;z-index:999;white-space:nowrap;pointer-events:none;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:300;display:flex;align-items:flex-end;justify-content:center;}
#confirmModal{z-index:500;}
.modal-sheet{background:var(--surface);border-radius:20px 20px 0 0;padding:24px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 20px;}
/* ── TABS ── */
.tab-bar{display:flex;background:var(--surface2);border-radius:10px;padding:3px;margin-bottom:16px;}
.tab-item{flex:1;padding:7px;text-align:center;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;color:var(--muted);transition:all 0.2s;}
.tab-item.active{background:var(--surface);color:var(--text);}
/* ── BADGE ── */
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;}
.badge-green{background:rgba(48,209,88,0.15);color:var(--green);}
.badge-orange{background:rgba(255,159,10,0.15);color:var(--orange);}
.badge-red{background:rgba(255,69,58,0.15);color:var(--red);}
.badge-blue{background:rgba(10,132,255,0.15);color:var(--blue);}
.badge-purple{background:rgba(191,90,242,0.15);color:var(--purple);}
/* ── PROGRESS BAR ── */
.progress-bar{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;margin-top:6px;}
.progress-fill{height:100%;border-radius:3px;transition:width 0.5s;}
/* ── PHOTO ── */
.photo-zone{border:2px dashed var(--border);border-radius:12px;padding:20px;text-align:center;cursor:pointer;color:var(--muted);font-size:13px;transition:border-color 0.2s;}
.photo-zone:hover{border-color:var(--blue);color:var(--blue);}
.photo-zone .pi{font-size:28px;margin-bottom:6px;}
.photo-prev-grid{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
.photo-thumb{position:relative;width:72px;height:72px;border-radius:8px;overflow:hidden;}
.photo-thumb img{width:100%;height:100%;object-fit:cover;}
.photo-thumb .rm{position:absolute;top:2px;right:2px;background:rgba(0,0,0,0.6);color:#fff;border:none;border-radius:50%;width:18px;height:18px;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
/* ── CHAINAGE BAR ── */
.ch-bar-wrap{margin-bottom:16px;}
.ch-bar-label{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:4px;}
.ch-bar{height:10px;background:var(--surface2);border-radius:5px;position:relative;overflow:hidden;}
.ch-seg{position:absolute;height:100%;}
/* ── LOADER ── */
#loader{position:fixed;inset:0;background:var(--bg);z-index:400;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
.loader-spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loader-text{font-size:13px;color:var(--muted);}
/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
/* ── EMPTY STATE ── */
.empty-state{text-align:center;padding:40px 20px;color:var(--muted);}
.empty-state .icon{font-size:48px;margin-bottom:12px;}
.empty-state p{font-size:13px;}
/* ── SETTINGS ── */
.settings-section{margin-bottom:20px;}
.settings-section-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px;}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border);}
.settings-row:last-child{border-bottom:none;}
.settings-row-label{font-size:13px;font-weight:600;}
.settings-row-sub{font-size:11px;color:var(--muted);}
/* ── ACCOUNT CARD ── */
.account-card{background:var(--surface2);border-radius:12px;padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:12px;}
.account-avatar{width:40px;height:40px;border-radius:50%;background:var(--blue);color:#fff;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.account-info{flex:1;}
.account-name{font-size:13px;font-weight:700;}
.account-user{font-size:11px;color:var(--muted);}
/* ── MISC ── */
.divider{height:1px;background:var(--border);margin:16px 0;}
.chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;background:var(--surface2);color:var(--muted);border:1px solid var(--border);}
.chip.active{background:rgba(10,132,255,0.1);color:var(--blue);border-color:rgba(10,132,255,0.3);}
</style>
</head>
<body>

<!-- LOADER -->
<div id="loader">
  <div class="loader-spinner"></div>
  <div class="loader-text">Loading Phoenix ERP…</div>
</div>

<!-- LOGIN -->
<div id="loginScreen" class="hidden">
  <div class="login-card">
    <div class="login-logo">
      <h1>Phoenix<span> ERP</span></h1>
      <p>Site Reporting System</p>
    </div>
    <div class="field-group">
      <label>Username</label>
      <input type="text" id="loginUser" placeholder="Enter username" autocomplete="username">
    </div>
    <div class="field-group">
      <label>Password</label>
      <input type="password" id="loginPass" placeholder="Enter password" autocomplete="current-password"
        onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn btn-primary w-full" onclick="doLogin()">Sign In</button>
    <div id="loginError" class="hidden text-sm text-red text-center mt-3"></div>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <!-- TOPBAR -->
  <div id="topbar">
    <div style="flex:1">
      <div class="topbar-logo">Phoenix<span> ERP</span></div>
      <div class="topbar-sub" id="topbarSub">Site Reporting System</div>
    </div>
    <span id="roleBadgeEl" class="role-badge"></span>
    <span id="syncStatus" class="synced" onclick="doSync()">☁️ Synced</span>
    <button class="avatar-btn" id="avatarBtn" onclick="showUserMenu()">A</button>
  </div>

  <!-- MAIN CONTENT -->
  <div id="main">
    <!-- Each tab content injected here -->
  </div>

  <!-- BOTTOM NAV -->
  <div id="bottomNav">
    <div class="nav-item active" data-tab="home" onclick="switchTab('home')">
      <div class="nav-icon">📊</div>Dashboard
    </div>
    <div class="nav-item" data-tab="submit" onclick="switchTab('submit')" id="navSubmit">
      <div class="nav-icon">📝</div>Submit
    </div>
    <div class="nav-item" data-tab="reports" onclick="switchTab('reports')">
      <div class="nav-icon">📋</div>Reports
    </div>
    <div class="nav-item" data-tab="tracker" onclick="switchTab('tracker')" id="navTracker">
      <div class="nav-icon">📏</div>Tracker
    </div>
    <div class="nav-item" data-tab="settings" onclick="switchTab('settings')" id="navSettings">
      <div class="nav-icon">⚙️</div>Settings
    </div>
    <div class="nav-item" data-tab="users" onclick="switchTab('users')" id="navUsers">
      <div class="nav-icon">👥</div>Users
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- USER MENU MODAL -->
<div id="userMenuModal" class="modal-overlay hidden" onclick="if(event.target===this)this.classList.add('hidden')">
  <div class="modal-sheet" style="max-height:50vh">
    <div class="modal-handle"></div>
    <div id="userMenuContent"></div>
  </div>
</div>

<!-- CONFIRM MODAL -->
<div id="confirmModal" class="modal-overlay hidden">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div id="confirmTitle" class="section-title mb-3"></div>
    <div id="confirmMsg" class="text-sm text-muted mb-4"></div>
    <div class="flex gap-3">
      <button class="btn btn-secondary flex-1" onclick="document.getElementById('confirmModal').classList.add('hidden')">Cancel</button>
      <button class="btn btn-danger flex-1" id="confirmYesBtn">Delete</button>
    </div>
  </div>
</div>

<!-- FORM MODAL -->
<div id="formModal" class="modal-overlay hidden" onclick="if(event.target===this)closeFormModal()">
  <div class="modal-sheet" id="formModalSheet">
    <div class="modal-handle"></div>
    <div id="formModalContent"></div>
  </div>
</div>

<script>
// ============================================================
// PHOENIX ERP — Clean Architecture
// Appwrite backend, GitHub Pages frontend
// ============================================================

// ── CONFIG ──────────────────────────────────────────────────
const AW = {
  endpoint: 'https://phoenixsite.duckdns.org/v1',
  project:  '69bf775300049155a9d9',
  database: '69bf7846002d6b0b65f6',
  collections: {
    reports: 'reports',
    config:  'config'
  }
};
const APP_VERSION = '3.0';

// ── STATE ───────────────────────────────────────────────────
let currentUser = null;
let currentRole = null; // 'admin' | 'pm' | 'supervisor'
let currentModule = 'pipeline'; // 'pipeline' | 'civil'
let activeTab = 'home';
let _syncing = false;
let _editId = null;

// ── LOCAL STORAGE HELPERS ───────────────────────────────────
const LS = {
  get: (k, def=[]) => { try { return JSON.parse(localStorage.getItem(k)) ?? def; } catch(e) { return def; } },
  set: (k, v) => localStorage.setItem(k, JSON.stringify(v)),
  del: (k) => localStorage.removeItem(k)
};

const getUsers       = () => LS.get('phx_users', { admin: { role:'admin', pass:'admin', name:'Admin' } });
const saveUsers      = v => LS.set('phx_users', v);
const getProjects    = () => LS.get('phx_projects', []);
const saveProjects   = v => LS.set('phx_projects', v);
const getRoutes      = () => LS.get('phx_routes', {});
const saveRoutes     = v => LS.set('phx_routes', v);
const getAssignments = () => LS.get('phx_assignments', {});
const saveAssignments= v => LS.set('phx_assignments', v);
const getSpecials    = () => LS.get('phx_specials', {});
const saveSpecials   = v => LS.set('phx_specials', v);

function getReports() {
  return LS.get('phx_reports', []);
}
function saveReports(r) {
  LS.set('phx_reports', r);
}

function getVisibleProjects() {
  const all = getProjects();
  if (currentRole === 'admin') return all;
  const users = getUsers();
  const u = users[currentUser];
  const assignments = getAssignments();
  const assigned = all.filter(p => (assignments[p] || []).includes(currentUser));
  const fromRecord = (u && Array.isArray(u.projects)) ? u.projects : [];
  const union = [...new Set([...fromRecord, ...assigned])];
  return union.length ? union : all;
}

// ── APPWRITE API ─────────────────────────────────────────────
async function aw(method, path, data) {
  const url = AW.endpoint + path;
  const opts = {
    method,
    headers: {
      'X-Appwrite-Project': AW.project,
      'Content-Type': 'application/json'
    }
  };
  if (data) opts.body = JSON.stringify(data);
  try {
    const res = await fetch(url, opts);
    if (res.status === 204) return true;
    const json = await res.json();
    if (!res.ok) return null;
    return json;
  } catch(e) {
    return null;
  }
}

// ── SYNC ─────────────────────────────────────────────────────
setSyncStatus('synced');

async function doSync() {
  if (_syncing) return;
  _syncing = true;
  setSyncStatus('syncing');

  try {
    // 1. Pull config
    await pullConfig();

    // 2. Fetch all reports from Appwrite
    let docs = [], offset = 0;
    while (true) {
      const res = await aw('GET', `/databases/${AW.database}/collections/${AW.collections.reports}/documents?limit=100&offset=${offset}`);
      if (!res?.documents) break;
      docs = docs.concat(res.documents);
      if (res.documents.length < 100) break;
      offset += 100;
    }

    // 3. Parse docs
    const remote = docs.map(d => {
      try {
        const base = d.data_json ? JSON.parse(d.data_json) : {};
        // Fill from individual fields
        ['type','project','route','date','supervisor','timestamp'].forEach(f => {
          if (d[f]) base[f] = d[f];
        });
        if (d.from_ch !== undefined) base.from = d.from_ch;
        if (d.to_ch   !== undefined) base.to   = d.to_ch;
        ['meters','volume','width','depth','qty','chainage','estConc','actualConc','netVol'].forEach(f => {
          if (d[f] !== undefined) base[f] = d[f];
        });
        ['soil','size','material','encasing','road','valType','chamberReq',
         'chamType','chamStatus','slab','slabKept','fitType','thrustBlock',
         'special','strType','remarks'].forEach(f => {
          if (d[f]) base[f] = d[f];
        });
        ['encasings','valves','connections'].forEach(f => {
          if (d[f]) try { base[f] = JSON.parse(d[f]); } catch(e) {}
        });
        if (!base.id) base.id = d.$id;
        base._awId = d.$id;
        return base;
      } catch(e) { return null; }
    }).filter(r => r && r.type);

    // 4. Merge: remote + local (never delete local)
    const local = getReports();
    const remoteIds = new Set(remote.map(r => String(r.id)));
    const localOnly = local.filter(r => r.id && !remoteIds.has(String(r.id)));
    const merged = Object.values(
      [...remote, ...localOnly].reduce((m, r) => { m[String(r.id)] = r; return m; }, {})
    );
    saveReports(merged);

    // 5. Upload local-only
    for (const r of localOnly) {
      try { await saveReportToAW(r); } catch(e) {}
    }

    setSyncStatus('synced');
    renderCurrentTab();

  } catch(e) {
    console.warn('Sync failed:', e);
    setSyncStatus('offline');
  } finally {
    _syncing = false;
  }
}

async function pullConfig() {
  const res = await aw('GET', `/databases/${AW.database}/collections/${AW.collections.config}/documents/adminData`);
  if (!res?.value) return;
  try {
    const d = JSON.parse(res.value);
    if (d.projects?.length)                 saveProjects(d.projects);
    if (d.routes && Object.keys(d.routes).length) saveRoutes(d.routes);
    if (d.assignments)                       saveAssignments(d.assignments);
    if (d.specials)                          saveSpecials(d.specials);
    if (d.users) {
      const local = getUsers();
      const adminPass = local.admin?.pass || 'admin';
      Object.keys(d.users).forEach(u => {
        if (d.users[u].role !== 'admin') {
          const localProjects = local[u]?.projects;
          local[u] = d.users[u];
          if (localProjects?.length && !local[u].projects?.length) local[u].projects = localProjects;
        }
      });
      local.admin = { ...local.admin, pass: adminPass };
      saveUsers(local);
    }
  } catch(e) {}
}

async function pushConfig() {
  const data = {
    projects:    getProjects(),
    routes:      getRoutes(),
    assignments: getAssignments(),
    specials:    getSpecials(),
    users:       getUsers(),
    updatedAt:   Date.now()
  };
  const val = JSON.stringify(data).slice(0, 65000);
  let res = await aw('PATCH', `/databases/${AW.database}/collections/${AW.collections.config}/documents/adminData`, { data: { key: 'adminData', value: val } });
  if (!res) await aw('POST', `/databases/${AW.database}/collections/${AW.collections.config}/documents`, {
    documentId: 'adminData',
    data: { key: 'adminData', value: val },
    permissions: ['read("any")','update("any")','delete("any")']
  });
}

async function saveReportToAW(r) {
  const noPhotos = Object.assign({}, r, { photos: [], photosStart: [], photosEnd: [] });
  const doc = {
    type:       String(r.type||''),
    project:    String(r.project||''),
    route:      String(r.route||''),
    date:       String(r.date||''),
    supervisor: String(r.supervisor||''),
    timestamp:  String(r.timestamp||''),
    from_ch:    parseFloat(r.from)||0,
    to_ch:      parseFloat(r.to)||0,
    meters:     parseFloat(r.meters)||0,
    volume:     parseFloat(r.volume)||0,
    width:      parseFloat(r.width)||0,
    depth:      parseFloat(r.depth)||0,
    soil:       String(r.soil||''),
    size:       String(r.size||''),
    material:   String(r.material||''),
    encasing:   String(r.encasing||''),
    road:       String(r.road||''),
    chainage:   parseFloat(r.chainage)||0,
    valType:    String(r.valType||''),
    chamberReq: String(r.chamberReq||''),
    chamType:   String(r.chamType||''),
    chamStatus: String(r.chamStatus||''),
    slab:       String(r.slab||''),
    slabKept:   String(r.slabKept||''),
    fitType:    String(r.fitType||''),
    thrustBlock:String(r.thrustBlock||''),
    qty:        parseFloat(r.qty)||1,
    special:    String(r.special||''),
    strType:    String(r.strType||''),
    remarks:    String(r.remarks||''),
    estConc:    parseFloat(r.estConc)||0,
    actualConc: parseFloat(r.actualConc)||0,
    netVol:     parseFloat(r.netVol)||0,
    encasings:  JSON.stringify(r.encasings||[]),
    valves:     JSON.stringify(r.valves||[]),
    connections:JSON.stringify(r.connections||[]),
    data_json:  JSON.stringify(noPhotos).slice(0, 65000)
  };
  const docId = 'r' + String(r.id).replace(/[^a-zA-Z0-9]/g,'').replace(/^r+/,'').slice(0,30);
  let res = await aw('PATCH', `/databases/${AW.database}/collections/${AW.collections.reports}/documents/${docId}`, { data: doc });
  if (!res) res = await aw('POST', `/databases/${AW.database}/collections/${AW.collections.reports}/documents`, {
    documentId: docId, data: doc, permissions: ['read("any")','update("any")','delete("any")']
  });
  if (res) { r._awId = res.$id || docId; }
  return !!res;
}

async function deleteReportFromAW(r) {
  const awId = r._awId || ('r' + String(r.id).replace(/[^a-zA-Z0-9]/g,'').replace(/^r+/,'').slice(0,30));
  let res = await aw('DELETE', `/databases/${AW.database}/collections/${AW.collections.reports}/documents/${awId}`);
  if (res !== null) return true;
  // Scan for matching doc
  const list = await aw('GET', `/databases/${AW.database}/collections/${AW.collections.reports}/documents?limit=100`);
  if (list?.documents) {
    const match = list.documents.find(d => {
      try { return String(JSON.parse(d.data_json||'{}').id) === String(r.id); } catch(e){ return false; }
    });
    if (match) return (await aw('DELETE', `/databases/${AW.database}/collections/${AW.collections.reports}/documents/${match.$id}`)) !== null;
  }
  return false;
}

}

// ── AUTH ─────────────────────────────────────────────────────
async function doLogin() {
  const user = document.getElementById('loginUser').value.trim().toLowerCase();
  const pass = document.getElementById('loginPass').value;
  const errEl = document.getElementById('loginError');
  errEl.classList.add('hidden');

  if (!user || !pass) { showLoginError('Enter username and password'); return; }

  let users = getUsers();

  // Check local first
  if (users[user] && users[user].pass === pass) {
    await loginSuccess(user, users[user]);
    return;
  }

  // Try pulling from Appwrite
  showLoader('Checking credentials…');
  await pullConfig();
  users = getUsers();
  if (users[user] && users[user].pass === pass) {
    await loginSuccess(user, users[user]);
  } else {
    hideLoader();
    showLoginError('Incorrect username or password');
  }
}

function showLoginError(msg) {
  const el = document.getElementById('loginError');
  el.textContent = msg;
  el.classList.remove('hidden');
}

async function loginSuccess(user, userRecord) {
  currentUser = user;
  currentRole = userRecord.role;
  showLoader('Loading your data…');

  // Sync on login
  await doSync();

  hideLoader();
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');

  // Update UI
  document.getElementById('roleBadgeEl').textContent = 
    currentRole === 'admin' ? 'Admin' : currentRole === 'pm' ? 'Project Manager' : 'Supervisor/Eng.';
  document.getElementById('roleBadgeEl').className = `role-badge ${currentRole}`;
  document.getElementById('avatarBtn').textContent = userRecord.name?.[0]?.toUpperCase() || user[0].toUpperCase();
  document.getElementById('topbarSub').textContent = userRecord.name || user;

  // Show/hide nav items
  document.getElementById('navSubmit').classList.toggle('hidden', false);
  document.getElementById('navTracker').classList.toggle('hidden', currentRole === 'supervisor');
  document.getElementById('navSettings').classList.toggle('hidden', currentRole === 'supervisor');
  document.getElementById('navUsers').classList.toggle('hidden', currentRole !== 'admin');

  // If admin, push config
  if (currentRole === 'admin') {
    setTimeout(pushConfig, 2000);
  }

  switchTab('home');
}

function doLogout() {
  currentUser = null; currentRole = null;
  document.getElementById('userMenuModal').classList.add('hidden');
  document.getElementById('app').classList.add('hidden');
  document.getElementById('loginScreen').classList.remove('hidden');
  document.getElementById('loginUser').value = '';

}

function renderHome() {
  const vp = getVisibleProjects();
  const allReports = getReports().filter(r => vp.includes(r.project));
  const today = new Date().toISOString().slice(0,10);
  const todayR = allReports.filter(r => r.date === today);

  const excM = allReports.filter(r=>r.type==='excavation').reduce((s,r)=>s+(r.meters||0),0);
  const pipeM= allReports.filter(r=>r.type==='pipe').reduce((s,r)=>s+(r.meters||0),0);
  const refM = allReports.filter(r=>r.type==='refill').reduce((s,r)=>s+(r.meters||0),0);
  const valC = allReports.filter(r=>r.type==='valve').length;

  const dateStr = new Date().toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

  let html = `
    <div class="card mb-3" style="background:linear-gradient(135deg,#1a1a2e,#16213e);border-color:rgba(10,132,255,0.2)">
      <div class="text-xs text-muted mb-1">TODAY</div>
      <div style="font-size:15px;font-weight:700">${dateStr}</div>
      <div class="text-xs text-muted mt-1">${todayR.length} report${todayR.length!==1?'s':''} submitted today</div>
    </div>`;

  // Module selector
  html += `
    <div class="section-header">
      <div class="section-title">Modules</div>
    </div>
    <div class="module-grid mb-4">
      <div class="module-card${currentModule==='pipeline'?' selected':''}" onclick="currentModule='pipeline';renderCurrentTab()" style="${currentModule==='pipeline'?'border-color:var(--blue);background:rgba(10,132,255,0.05)':''}">
        <div class="icon">🔩</div>
        <div class="name">Pipeline Work</div>
        <div class="count">${allReports.filter(r=>!r.module||r.module==='pipeline').length} reports</div>
      </div>
      <div class="module-card${currentModule==='civil'?' selected':''}" onclick="currentModule='civil';renderCurrentTab()" style="${currentModule==='civil'?'border-color:var(--orange);background:rgba(255,159,10,0.05)':''}">
        <div class="icon">🏗️</div>
        <div class="name">Civil Work</div>
        <div class="count">${allReports.filter(r=>r.module==='civil').length} reports</div>
      </div>
    </div>`;

  // Pipeline stats
  if (currentModule === 'pipeline') {
    html += `
      <div class="section-header"><div class="section-title">Pipeline Overview</div></div>
      <div class="stat-grid">
        <div class="stat-card"><div class="val text-orange">${fmtM(excM)}</div><div class="lbl">Excavation</div></div>
        <div class="stat-card"><div class="val text-blue">${fmtM(pipeM)}</div><div class="lbl">Pipe Laying</div></div>
        <div class="stat-card"><div class="val text-green">${fmtM(refM)}</div><div class="lbl">Refilling</div></div>
        <div class="stat-card"><div class="val text-red">${valC}</div><div class="lbl">Valves</div></div>
      </div>`;

    // Project progress
    if (vp.length) {
      html += `<div class="section-header mt-2"><div class="section-title">Project Progress</div></div>`;
      vp.forEach(proj => {
        const routes = (getRoutes()[proj] || []);
        const projR = allReports.filter(r => r.project === proj && (!r.module || r.module === 'pipeline'));
        const pipeTotal = routes.reduce((s,r) => s+(r.length||0), 0);
        const pipeDone  = projR.filter(r=>r.type==='pipe').reduce((s,r) => s+(r.meters||0), 0);
        const pct = pipeTotal > 0 ? Math.min(100, Math.round(pipeDone/pipeTotal*100)) : 0;
        const color = pct >= 75 ? 'var(--green)' : pct >= 40 ? 'var(--orange)' : 'var(--blue)';
        html += `
          <div class="card mb-2">
            <div class="flex justify-between items-center">
              <div class="font-bold" style="font-size:13px">${proj}</div>
              <div class="badge badge-blue">${pct}%</div>
            </div>
            <div class="progress-bar mt-2"><div class="progress-fill" style="width:${pct}%;background:${color}"></div></div>
            <div class="text-xs text-muted mt-2">${fmtM(pipeDone)} of ${fmtM(pipeTotal)} pipe laid · ${projR.length} reports</div>
          </div>`;
      });
    }
  } else {
    // Civil Work
    const civilR = allReports.filter(r => r.module === 'civil' && vp.includes(r.project));
    html += `
      <div class="section-header"><div class="section-title">Civil Work Overview</div></div>
      <div class="stat-grid">
        <div class="stat-card"><div class="val text-orange">${civilR.length}</div><div class="lbl">Total Reports</div></div>
        <div class="stat-card"><div class="val text-blue">${civilR.filter(r=>r.type==='civil_dpr').length}</div><div class="lbl">DPR</div></div>
        <div class="stat-card"><div class="val text-green">${civilR.filter(r=>r.type==='civil_drawing').length}</div><div class="lbl">Drawings</div></div>
        <div class="stat-card"><div class="val text-purple">${civilR.filter(r=>r.type==='civil_quality').length}</div><div class="lbl">Quality</div></div>
      </div>`;
  }

  // Recent activity
  const recent = [...allReports].sort((a,b) => (b.timestamp||'').localeCompare(a.timestamp||'')).slice(0,5);
  if (recent.length) {
    html += `<div class="section-header mt-2"><div class="section-title">Recent Activity</div></div>`;
    recent.forEach(r => { html += reportItemHTML(r, false); });
  }

  return html;
}

function fmtM(m) {
  if (!m) return '0m';
  if (m >= 1000) return (m/1000).toFixed(2) + 'km';
  return Math.round(m) + 'm';
}

    updateFormRoutes(prefill.route);
    if (type === 'excavation') {
      if (prefill.photosStart?.length) prefill.photosStart.forEach(p => addExcavPhotoPreview(p.src||p, 'start'));
      if (prefill.photosEnd?.length)   prefill.photosEnd.forEach(p => addExcavPhotoPreview(p.src||p, 'end'));

      if (prefill.photosStart?.length) prefill.photosStart.forEach(p => addExcavPhotoPreview(p.src||p, 'start'));
      if (prefill.photosEnd?.length)   prefill.photosEnd.forEach(p => addExcavPhotoPreview(p.src||p, 'end'));

      if (prefill.photosStart?.length) prefill.photosStart.forEach(p => addExcavPhotoPreview(p.src||p, 'start'));

      prefill.photos.forEach(p => addPhotoPreview(p.src||p));

  }, 50);

  return html;

function buildTypeFields(type, p={}) {
  // guard against null
  if (!p) p = {};
  let html = '';

  // ── 1. EXCAVATION ──────────────────────────────────────────
  if (type === 'excavation') {
    html += `
      <div style="background:rgba(255,159,10,0.06);border:1px solid rgba(255,159,10,0.2);border-radius:10px;padding:12px;margin-bottom:12px">
        <div style="font-size:10px;font-weight:700;color:var(--orange);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px">📐 Chainage & Dimensions</div>

        <div class="form-row">
          <div class="field-group"><label>Qty <span class="req">*</span></label><input type="number" id="f-qty" value="${p.qty||1}" min="1"></div>
          <div class="field-group"><label>Thrust Block Required?</label>
            <div class="radio-group">
              <div class="radio-opt${(p.thrustBlock||'No')==='No'?' selected':''}" onclick="selectRadio('f-thrustBlock','No',this)">No</div>
              <div class="radio-opt${p.thrustBlock==='Yes'?' selected':''}" onclick="selectRadio('f-thrustBlock','Yes',this)">Yes</div>
            </div>
            <input type="hidden" id="f-thrustBlock" value="${p.thrustBlock||'No'}">
          </div>
        </div>
      </div>`;
  }

  // ── 7. CONCRETE WORK (structure) ───────────────────────────
  if (type === 'structure') {
    const strProj = document.getElementById('f-project')?.value || '';
    const allR    = getReports().filter(r => r.project === strProj);

    // Build options with source date embedded
    const fittingOpts = allR
      .filter(r => r.type === 'fitting' && r.thrustBlock === 'Yes')
      .map(r => {
        const label = `Thrust Block — Ch:${r.chainage}m${r.location ? ' (' + r.location + ')' : ''}`;
        return `<option value="${label}" data-date="${r.date||''}"${p.location===label?' selected':''}>${label}</option>`;
      }).join('');
    const encasingOpts = allR
      .filter(r => r.type === 'pipe')
      .flatMap(r => (r.encasings||[]).length
        ? r.encasings.map(e => {
            const label = `${e.type} — Ch:${e.from}–${e.to}m`;
            return `<option value="${label}" data-date="${r.date||''}"${p.location===label?' selected':''}>${label}</option>`;
          })
        : (r.encasing&&r.encasing!=='Not Required' ? [{
            label: `${r.encasing} — Ch:${r.encasingFrom||r.from}–${r.encasingTo||r.to}m`,
            date: r.date||''
          }] : []).map(({label,date}) =>
            `<option value="${label}" data-date="${date}"${p.location===label?' selected':''}>${label}</option>`)
      ).join('');

    const strLocs = [...allR.filter(r=>r.type==='fitting'&&r.thrustBlock==='Yes').map(r=>`Thrust Block — Ch:${r.chainage}m${r.location?' ('+r.location+')':''}`),
      ...allR.filter(r=>r.type==='pipe').flatMap(r=>(r.encasings||[]).length?r.encasings.map(e=>`${e.type} — Ch:${e.from}–${e.to}m`):(r.encasing&&r.encasing!=='Not Required'?[`${r.encasing} — Ch:${r.encasingFrom||r.from}–${r.encasingTo||r.to}m`]:[])) ];
    const strHasOther = p.location && !strLocs.includes(p.location);

    html += `
      <div style="background:rgba(191,90,242,0.06);border:1px solid rgba(191,90,242,0.2);border-radius:10px;padding:12px;margin-bottom:12px">
        <div style="font-size:10px;font-weight:700;color:var(--purple);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px">📍 Location & Type</div>
        <div class="field-group">
          <label>Location (from Fitting / Pipe Laying records) <span class="req">*</span></label>
          <select id="f-location-sel" onchange="onConcreteLocChange(this)">
            ${strLocs.length ? '' : '<option value="">— No thrust block / encasing records yet —</option>'}
            ${fittingOpts}${encasingOpts}
            <option value="__other__"${strHasOther?' selected':''}>— Other (type below) —</option>
          </select>
        </div>
        <div id="f-location-other-wrap" style="display:${strHasOther?'block':'none'}">
          <div class="field-group mt-2">
            <input type="text" id="f-location-other" value="${strHasOther?p.location:''}" placeholder="e.g. Ch:450m near road crossing" oninput="document.getElementById('f-location').value=this.value">
          </div>
        </div>
        <input type="hidden" id="f-location" value="${p.location||''}">
        <input type="hidden" id="f-prereq-date" value="${p.prereqDate||''}">
      </div>
      <div style="background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:12px">
        <div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px">📐 Concrete Dimensions</div>
        <div class="form-row">
          <div class="field-group"><label>Length (m)</label><input type="number" id="f-concrL" step="0.01" value="${p.concrL||''}" oninput="autoCalcConcrVol()" placeholder="0.00"></div>
          <div class="field-group"><label>Width (m)</label><input type="number" id="f-concrW" step="0.01" value="${p.concrW||''}" oninput="autoCalcConcrVol()" placeholder="0.00"></div>
          <div class="field-group"><label>Height (m)</label><input type="number" id="f-concrH" step="0.01" value="${p.concrH||''}" oninput="autoCalcConcrVol()" placeholder="0.00"></div>
        </div>
        <div class="field-group"><label>Total Volume (m³) — Auto (L×W×H)</label>
          <input type="number" id="f-totalVol" value="${p.totalVol||''}" readonly style="opacity:0.6;background:rgba(191,90,242,0.06);border-color:rgba(191,90,242,0.3)" placeholder="Auto">
        </div>
        <div class="field-group"><label>Pipe Dia (m) — for pipe vol. deduction</label>
          <input type="number" id="f-concrPipeDia" step="0.001" value="${p.concrPipeDia||''}" oninput="autoCalcConcrVol()" placeholder="e.g. 0.600 (leave blank if not applicable)">
        </div>
        <div class="field-group"><label>Vol. of Pipe (m³) — Auto (0.785×D²×L)</label>
          <input type="number" id="f-pipeVolConc" value="${p.pipeVolConc||''}" readonly style="opacity:0.6;background:rgba(255,69,58,0.06);border-color:rgba(255,69,58,0.2)" placeholder="Auto">
        </div>
        <div class="field-group"><label>Net Volume (m³) — Auto (Total − Pipe)</label>
          <input type="number" id="f-netVolConc" value="${p.netVolConc||''}" readonly style="opacity:0.6;background:rgba(48,209,88,0.08);border-color:rgba(48,209,88,0.3);font-weight:700" placeholder="Auto">
        </div>
      </div>`;
  }

  // ── CIVIL TYPES (unchanged) ─────────────────────────────────
  if (type.startsWith('civil_')) {
    html += `
      <div class="field-group"><label>Description <span class="req">*</span></label>
        <textarea id="f-description" rows="3" placeholder="Describe the work…">${p.description||''}</textarea>
      </div>
      <div class="form-row">
        <div class="field-group"><label>Location / Chainage</label><input type="text" id="f-location" value="${p.location||''}" placeholder="e.g. Ch:1200m or Grid A3"></div>
        <div class="field-group"><label>Status</label>
          <select id="f-status">${['In Progress','Completed','Pending','On Hold'].map(v=>`<option${p.status===v?' selected':''}>${v}</option>`).join('')}</select>

    if (type === 'civil_material') {
      html += `
        <div class="form-row">

          <div class="field-group"><label>Unskilled Workers</label><input type="number" id="f-unskilled" value="${p.unskilled||''}" placeholder="0"></div>
        </div>`;
    }
  }
  return html;
}

function autoCalc() {
  const from = parseFloat(document.getElementById('f-from')?.value) || 0;
  const to   = parseFloat(document.getElementById('f-to')?.value)   || 0;
  const el   = document.getElementById('f-meters');
  if (el) el.value = to > from ? (to - from).toFixed(0) : '';
  autoCalcVolume();
  autoCalcRefillVol();
}

function autoCalcVolume() {
  const meters = parseFloat(document.getElementById('f-meters')?.value) || 0;
  const width  = parseFloat(document.getElementById('f-width')?.value)  || 0;
  const depth  = parseFloat(document.getElementById('f-depth')?.value)  || 0;
  const el     = document.getElementById('f-volume');
  if (el) el.value = (meters > 0 && width > 0 && depth > 0) ? (meters * width * depth).toFixed(2) : '';
}

function autoCalcRefillVol() {
  const meters  = parseFloat(document.getElementById('f-meters')?.value)  || 0;
  const width   = parseFloat(document.getElementById('f-width')?.value)   || 0;
  const depth   = parseFloat(document.getElementById('f-depth')?.value)   || 0;
  const pipeDia = parseFloat(document.getElementById('f-pipeDia')?.value) || 0;
  const trenchVol = meters * width * depth;
  const pipeVol   = 0.785 * pipeDia * pipeDia * meters;
  const netVol    = trenchVol - pipeVol;
  const tEl = document.getElementById('f-trenchVol');
  const pEl = document.getElementById('f-pipeVol');
  const vEl = document.getElementById('f-volume');
  if (tEl) tEl.value = trenchVol > 0 ? trenchVol.toFixed(3) : '';
  if (pEl) pEl.value = pipeVol   > 0 ? pipeVol.toFixed(3)   : '';
  if (vEl) vEl.value = netVol    > 0 ? netVol.toFixed(3)    : '';
}

function autoCalcConcrVol() {
  const L   = parseFloat(document.getElementById('f-concrL')?.value) || 0;
  const W   = parseFloat(document.getElementById('f-concrW')?.value) || 0;
  const H   = parseFloat(document.getElementById('f-concrH')?.value) || 0;
  const dia = parseFloat(document.getElementById('f-concrPipeDia')?.value) || 0;
  const totalVol  = L * W * H;
  const pipeVol   = dia > 0 ? 0.785 * dia * dia * L : 0;
  const netVol    = Math.max(0, totalVol - pipeVol);
  const tEl = document.getElementById('f-totalVol');
  const pEl = document.getElementById('f-pipeVolConc');
  const nEl = document.getElementById('f-netVolConc');
  if (tEl) tEl.value = totalVol > 0 ? totalVol.toFixed(3) : '';
  if (pEl) pEl.value = pipeVol  > 0 ? pipeVol.toFixed(3)  : '';
  if (nEl) nEl.value = totalVol > 0 ? netVol.toFixed(3)   : '';
}

function compressPhoto(dataUrl, targetKB=50) {
  return new Promise(resolve => {
    if (!dataUrl?.startsWith('data:image')) { resolve(dataUrl); return; }
    const img = new Image();
    img.onload = () => {
      let w=img.width, h=img.height, max=640;
      if (w>max) { h=Math.round(h*max/w); w=max; }
      if (h>max) { w=Math.round(w*max/h); h=max; }
      const c=document.createElement('canvas'); c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      let lo=0.05,hi=0.7,res=c.toDataURL('image/jpeg',0.3);
      for(let i=0;i<8;i++){const m=(lo+hi)/2,a=c.toDataURL('image/jpeg',m);if(a.length*0.75/1024<=targetKB){lo=m;res=a;}else hi=m;}
      resolve(res);
    };
    img.onerror=()=>resolve(dataUrl);
    img.src=dataUrl;
  });
}

// ── DEPENDENCY VALIDATION ─────────────────────────────────────
function checkChainageDependency(type, project, route, from, to, date, excludeId) {
  const allReports = getReports().filter(r => String(r.id) !== String(excludeId||''));

  // Range guard — only for range-based types
  if (type === 'pipe' || type === 'refill') {
    if (to <= from) return null;
  }

  // For pipe laying: check excavation covers from–to and date is valid
  if (type === 'pipe') {
    const excReports = allReports.filter(r =>
      r.type === 'excavation' &&
      r.project === project &&
      (route ? r.route === route : true)
    );

    if (!excReports.length) {
      return {
        title: 'Excavation Not Done',
        msg: `No excavation report found for Ch:${from}m – Ch:${to}m on this route. Excavation must be completed before pipe laying.`,
        prereq: 'Excavation',
        missing: `Ch:${from}–${to}m`
      };
    }

    const uncovered = findUncoveredRange(from, to, excReports);
    if (uncovered) {
      return {
        title: 'Excavation Not Done for This Range',
        msg: `Pipe laying cannot be submitted for Ch:${uncovered.from}m – Ch:${uncovered.to}m. Excavation has not been done for this stretch yet.`,
        prereq: 'Excavation',
        missing: `Ch:${uncovered.from}–${uncovered.to}m`
      };
    }

    const latestExcDate = getLatestDateForRange(from, to, excReports);
    if (latestExcDate && date < latestExcDate) {
      return {
        title: 'Date Before Excavation',
        msg: `Pipe laying date (${fmtDate(date)}) cannot be before the excavation date (${fmtDate(latestExcDate)}) for this stretch.`,
        prereq: 'Excavation',
        missing: `Exc. done on ${fmtDate(latestExcDate)}`
      };
    }
  }

  // For refilling: check pipe laying covers from–to and date is valid
  if (type === 'refill') {
    const pipeReports = allReports.filter(r =>
      r.type === 'pipe' &&
      r.project === project &&
      (route ? r.route === route : true)
    );

    if (!pipeReports.length) {
      return {
        title: 'Pipe Laying Not Done',
        msg: `No pipe laying report found for Ch:${from}m – Ch:${to}m on this route. Pipe must be laid before refilling.`,
        prereq: 'Pipe Laying',
        missing: `Ch:${from}–${to}m`
      };
    }

    const uncovered = findUncoveredRange(from, to, pipeReports);
    if (uncovered) {
      return {
        title: 'Pipe Laying Not Done for This Range',
        msg: `Refilling cannot be submitted for Ch:${uncovered.from}m – Ch:${uncovered.to}m. Pipe laying has not been done for this stretch yet.`,
        prereq: 'Pipe Laying',
        missing: `Ch:${uncovered.from}–${uncovered.to}m`
      };
    }

    const latestPipeDate = getLatestDateForRange(from, to, pipeReports);
    if (latestPipeDate && date < latestPipeDate) {
      return {
        title: 'Date Before Pipe Laying',
        msg: `Refilling date (${fmtDate(date)}) cannot be before the pipe laying date (${fmtDate(latestPipeDate)}) for this stretch.`,
        prereq: 'Pipe Laying',
        missing: `Pipe laid on ${fmtDate(latestPipeDate)}`
      };
    }
  }

  // For valve: check pipe laying exists at chainage and date is valid
  if (type === 'valve' || type === 'fitting') {
    const ch = from; // chainage passed as 'from'
    if (!ch) return null;
    const pipeReports = allReports.filter(r =>
      r.type === 'pipe' &&
      r.project === project &&
      (route ? r.route === route : true)
    );
    if (!pipeReports.length) {
      return {
        title: 'Pipe Laying Not Done',
        msg: `No pipe laying found on this route. Pipe must be laid before ${type === 'valve' ? 'valve installation' : 'fitting'}.`,
        prereq: 'Pipe Laying',
        missing: `Ch:${ch}m`
      };
    }
    const coveringPipe = pipeReports.find(r =>
      (parseFloat(r.from)||0) <= ch && (parseFloat(r.to)||0) >= ch
    );
    if (!coveringPipe) {
      return {
        title: `Pipe Not Laid at Ch:${ch}m`,
        msg: `No pipe laying covers Ch:${ch}m. Pipe must be laid at this chainage before ${type === 'valve' ? 'valve installation' : 'fitting'}.`,
        prereq: 'Pipe Laying',
        missing: `Ch:${ch}m not covered`
      };
    }
    if (date < coveringPipe.date) {
      return {
        title: 'Date Before Pipe Laying',
        msg: `${type === 'valve' ? 'Valve' : 'Fitting'} date (${fmtDate(date)}) cannot be before pipe laying date (${fmtDate(coveringPipe.date)}) at Ch:${ch}m.`,
        prereq: 'Pipe Laying',
        missing: `Pipe laid on ${fmtDate(coveringPipe.date)}`
      };
    }
  }

  return null; // all good
}

// Check if [from, to] is fully covered by the given reports
function findUncoveredRange(from, to, reports) {
  // Guard: invalid range
  if (!from && !to) return null;
  if (to <= from)   return null;

  const covered = reports
    .map(r => ({ f: parseFloat(r.from)||0, t: parseFloat(r.to)||0 }))
    .filter(r => r.t > r.f && r.f < to && r.t > from)
    .sort((a,b) => a.f - b.f);

  if (!covered.length) return { from: Math.round(from), to: Math.round(to) };

  let cursor = from;
  for (const seg of covered) {
    if (seg.f > cursor + 0.001) { // small tolerance for float
      return { from: Math.round(cursor), to: Math.round(seg.f) };
    }
    if (seg.t > cursor) cursor = seg.t;
    if (cursor >= to) return null;
  }
  if (cursor < to - 0.001) return { from: Math.round(cursor), to: Math.round(to) };
  return null;
}

// Get the latest (most recent) date among reports that overlap [from, to]
function getLatestDateForRange(from, to, reports) {
  const overlapping = reports.filter(r => {
    const rf = parseFloat(r.from)||0;
    const rt = parseFloat(r.to)||0;
    return rt > from && rf < to;
  });
  if (!overlapping.length) return null;
  return overlapping.map(r => r.date).sort().reverse()[0];
}

function fmtDate(d) {
  if (!d) return '—';
  const [y,m,day] = d.split('-');
  return `${day}/${m}/${y}`;
}

function showDependencyError(err) {
  const modal = document.getElementById('confirmModal');
  document.getElementById('confirmTitle').innerHTML =
    `<span style="color:var(--red)">⛔ ${err.title}</span>`;
  document.getElementById('confirmMsg').innerHTML =
    `<div style="margin-bottom:12px">${err.msg}</div>
     <div style="background:rgba(255,69,58,0.08);border:1px solid rgba(255,69,58,0.25);border-radius:8px;padding:10px;font-size:12px">
       <div style="font-weight:700;color:var(--red);margin-bottom:4px">Prerequisite: ${err.prereq}</div>
       <div style="color:var(--muted)">Missing: ${err.missing}</div>
     </div>`;
  const btnWrap = modal.querySelector('.flex.gap-3');
  window._confirmBtnBackup = btnWrap.innerHTML;
  btnWrap.innerHTML = `<button class="btn btn-primary flex-1" onclick="closeDependencyError()">OK — Got It</button>`;
  modal.classList.remove('hidden');
}

function closeDependencyError() {
  const modal = document.getElementById('confirmModal');
  modal.classList.add('hidden');
  if (window._confirmBtnBackup) {
    modal.querySelector('.flex.gap-3').innerHTML = window._confirmBtnBackup;
    window._confirmBtnBackup = null;
  }
}

// ── SUBMIT REPORT ─────────────────────────────────────────────
async function submitReport(type) {
  const project = document.getElementById('f-project')?.value;
  const route   = document.getElementById('f-route')?.value;
  const date    = document.getElementById('f-date')?.value;

  if (!project) { showToast('⚠️ Select a project'); return; }
  if (!date)    { showToast('⚠️ Select a date'); return; }
  if (date > new Date().toISOString().slice(0,10)) { showToast('⚠️ Future date not allowed'); return; }

  const g = id => document.getElementById(id)?.value || '';
  const gf= id => parseFloat(document.getElementById(id)?.value) || 0;

  // ── DEPENDENCY CHECKS ────────────────────────────────────────
  if (type === 'pipe' || type === 'refill') {
    const from = gf('f-from');
    const to   = gf('f-to');
    if (to <= from) { showToast('⚠️ Enter valid chainage range (To > From)'); return; }
    const err = checkChainageDependency(type, project, route, from, to, date, _editId);
    if (err) { showDependencyError(err); return; }
  }
  if (type === 'valve' || type === 'fitting') {
    const ch = gf('f-chainage');
    if (!ch) { showToast('⚠️ Enter chainage first'); return; }
    const err = checkChainageDependency(type, project, route, ch, ch, date, _editId);
    if (err) { showDependencyError(err); return; }
  }
  if (type === 'chamber') {
    const loc = g('f-location');
    if (!loc) { showToast('⚠️ Select a valve location'); return; }
    const valveDate = g('f-valve-date');
    if (valveDate && date < valveDate) {
      showDependencyError({
        title: 'Date Before Valve Installation',
        msg: `Chamber date (${fmtDate(date)}) cannot be before the valve installation date (${fmtDate(valveDate)}).`,
        prereq: 'Valve Installation',
        missing: `Valve fitted on ${fmtDate(valveDate)}`
      });
      return;
    }
  }
  if (type === 'structure') {
    const loc = g('f-location');
    if (!loc || loc === '') { showToast('⚠️ Select a location'); return; }
    const prereqDate = g('f-prereq-date');
    if (prereqDate && date < prereqDate) {
      const isFitting = loc.startsWith('Thrust Block');
      showDependencyError({
        title: `Date Before ${isFitting ? 'Fitting' : 'Pipe Laying'}`,
        msg: `Concrete date (${fmtDate(date)}) cannot be before the ${isFitting ? 'fitting' : 'pipe laying'} date (${fmtDate(prereqDate)}) at this location.`,
        prereq: isFitting ? 'Fitting (Thrust Block)' : 'Pipe Laying (Encasing)',
        missing: `${isFitting ? 'Fitting' : 'Pipe laying'} done on ${fmtDate(prereqDate)}`
      });
      return;
    }
  }

  // ── DOWNSTREAM EDIT CHECKS (editing excav/pipe must not break dependents) ──
  if (_editId && (type === 'excavation' || type === 'pipe')) {
    const oldR = getReports().find(r => String(r.id) === String(_editId));
    if (oldR) {
      const newFrom = gf('f-from');
      const newTo   = gf('f-to');
      const err = checkEditDependency(oldR, newFrom, newTo, date);
      if (err) {
        showDependencyError(err);
        return;
      }
    }
  }

  const data = {
    id:         _editId || Date.now(),
    type,
    module:     type.startsWith('civil_') ? 'civil' : 'pipeline',
    project,
    route:      route || '',
    date,
    supervisor: currentUser,
    supervisorName: getUsers()[currentUser]?.name || currentUser,
    timestamp:  new Date().toISOString(),
    remarks:    g('f-remarks'),
    photos:     (type === 'excavation' || type === 'pipe' || type === 'refill') ? [] : getFormPhotos(),
    photosStart: (type === 'excavation' || type === 'pipe' || type === 'refill') ? getExcavPhotos('start') : [],
    photosEnd:   (type === 'excavation' || type === 'pipe' || type === 'refill') ? getExcavPhotos('end')   : [],
  };

  // Type fields
  if (['excavation','pipe','refill','structure'].includes(type)) {
    data.from   = gf('f-from');
    data.to     = gf('f-to');
    data.meters = gf('f-meters') || (data.to - data.from);
  }
  if (type==='excavation') {
    data.width=gf('f-width'); data.depth=gf('f-depth'); data.soil=g('f-soil');
    data.volume=gf('f-volume') || (data.width * data.depth * data.meters);
  }
  if (type==='pipe') {
    data.pipeSpec    = g('f-pipeSpec');
    data.encasings   = getEncasings();
    data.encasing    = data.encasings.length ? data.encasings.map(e=>e.type).join(', ') : 'Not Required';
    data.encasingFrom= data.encasings[0]?.from || 0;
    data.encasingTo  = data.encasings[0]?.to   || 0;
    data.photosStart = getExcavPhotos('start');
    data.photosEnd   = getExcavPhotos('end');
    data.photos      = [];
  }
  if (type==='refill') {
    data.width      = gf('f-width');
    data.depth      = gf('f-depth');
    data.road       = g('f-road');
    data.pipeDia    = gf('f-pipeDia');
    data.trenchVol  = gf('f-trenchVol');
    data.pipeVol    = gf('f-pipeVol');
    data.volume     = gf('f-volume');
    data.photosStart= getExcavPhotos('start');
    data.photosEnd  = getExcavPhotos('end');
    data.photos     = [];
  }
  if (type==='valve') {
    data.chainage      = gf('f-chainage');
    data.location      = g('f-location');
    data.valType       = g('f-valType');
    data.size          = g('f-size');
    data.chamberReq    = g('f-chamberReq');
  }
  if (type==='chamber') {
    data.chainage   = gf('f-chainage');
    data.location   = g('f-location');
    data.valveDate  = g('f-valve-date');
    data.chamType   = g('f-chamType');
    data.chamL      = gf('f-chamL');
    data.chamW      = gf('f-chamW');
    data.chamH      = gf('f-chamH');
    data.slab       = g('f-slab');
    data.slabStatus = g('f-slabStatus');
  }
  if (type==='fitting') {
    data.chainage    = gf('f-chainage');
    data.location    = g('f-location');
    data.fitType     = g('f-fitType');
    data.size        = g('f-size');
    data.qty         = gf('f-qty') || 1;
    data.thrustBlock = g('f-thrustBlock');
  }
  if (type==='structure') {
    data.strType      = g('f-strType');
    data.location     = g('f-location');
    data.prereqDate   = g('f-prereq-date');
    data.concrL       = gf('f-concrL');
    data.concrW       = gf('f-concrW');
    data.concrH       = gf('f-concrH');
    data.concrPipeDia = gf('f-concrPipeDia');
    data.totalVol     = gf('f-totalVol');
    data.pipeVolConc  = gf('f-pipeVolConc');
    data.netVolConc   = gf('f-netVolConc');
  }
  if (type.startsWith('civil_')) {
    const desc = g('f-description');
    if (!desc) { showToast('⚠️ Description is required'); return; }
    data.description = desc;
    data.location    = g('f-location');
    data.status      = g('f-status');
    if (type==='civil_material') { data.material=g('f-material'); data.qty=g('f-qty'); }
    if (type==='civil_labour')   { data.skilled=gf('f-skilled'); data.unskilled=gf('f-unskilled'); }
  }

  // Save locally
  const reports = getReports();
  if (_editId) {
    const idx = reports.findIndex(r => String(r.id) === String(_editId));
    if (idx > -1) { data.id = _editId; reports[idx] = data; }
  } else {
    reports.push(data);
  }
  saveReports(reports);

  closeFormModal();
  showToast(_editId ? '✅ Report updated' : '✅ Report submitted');
  renderCurrentTab();

  // Save to Appwrite in background
  setSyncStatus('syncing');
  saveReportToAW(data).then(ok => {
    setSyncStatus(ok ? 'synced' : 'offline');
    if (!ok) showToast('⚠️ Saved locally — will sync when online');
    else saveReports(getReports()); // update _awId
  });
}

// ── REPORTS TAB ───────────────────────────────────────────────
function renderReportsTab() {
  const vp = getVisibleProjects();
  let reports = getReports().filter(r => vp.includes(r.project));

  // Filter by module
  if (currentModule === 'pipeline') reports = reports.filter(r => !r.module || r.module === 'pipeline');
  else reports = reports.filter(r => r.module === 'civil');

  reports.sort((a,b) => (b.timestamp||'').localeCompare(a.timestamp||''));

  let html = `
    <div class="section-header">
      <div class="section-title">All Reports</div>
      <div class="chip active">${reports.length} total</div>
    </div>`;

  // Project filter
  if (vp.length > 1) {
    html += `<div class="field-group"><select onchange="filterByProject(this.value)" id="rptProjFilter">
      <option value="">All Projects</option>
      ${vp.map(p=>`<option>${p}</option>`).join('')}
    </select></div>`;
  }

  if (!reports.length) {
    return html + `<div class="empty-state"><div class="icon">📋</div><p>No reports yet. Submit your first report!</p></div>`;
  }

  reports.forEach(r => { html += reportItemHTML(r, true); });
  return html;
}

    details += row('Chainage', `Ch:${r.from}–${r.to}m`);

    details += row('Chainage', `Ch:${r.from}–${r.to}m`);
    details += row('Length', fmtM(r.meters));
    details += row('Pipe Spec', r.pipeSpec);
    if ((r.encasings||[]).length) {
      r.encasings.forEach(e => { details += row('Encasing', `${e.type} Ch:${e.from}–${e.to}m`); });
    } else if (r.encasing && r.encasing !== 'Not Required') {

    }
  }
  if (r.type === 'refill') {
    details += row('Chainage', `Ch:${r.from}–${r.to}m`);
    details += row('Length', fmtM(r.meters));
    details += row('Width × Depth', r.width && r.depth ? `${r.width}m × ${r.depth}m` : '');
    details += row('Pipe Dia', r.pipeDia ? `${r.pipeDia}m` : '');
    details += row('Trench Vol', r.trenchVol ? `${r.trenchVol} m³` : '');
    details += row('Pipe Vol', r.pipeVol ? `${r.pipeVol} m³` : '');

  if (r.type === 'valve') {
    details += row('Chainage', r.chainage ? `Ch:${r.chainage}m` : '');
    details += row('Location', r.location);
    details += row('Valve Type', r.valType);

  }
  if (r.type === 'chamber') {
    details += row('Chainage', r.chainage ? `Ch:${r.chainage}m` : '');
    details += row('Location', r.location);

    details += row('L × W × H', (r.chamL||r.chamW||r.chamH) ? `${r.chamL||0}mm × ${r.chamW||0}mm × ${r.chamH||0}mm` : '');

    details += row('Size', r.size);

    details += row('Thrust Block', r.thrustBlock);
  }
  if (r.type === 'structure') {
    details += row('Location', r.location);
    details += row('L × W × H', (r.concrL||r.concrW||r.concrH) ? `${r.concrL||0}m × ${r.concrW||0}m × ${r.concrH||0}m` : '');
    details += row('Total Volume', r.totalVol ? `${r.totalVol} m³` : '');
    details += row('Pipe Vol Deducted', r.pipeVolConc ? `${r.pipeVolConc} m³` : '');
    details += row('Net Volume', r.netVolConc ? `${r.netVolConc} m³` : '');

  if (r.type && r.type.startsWith('civil_')) {
    details += row('Description', r.description);

  const allPhotos = [
    ...(r.photosStart||[]).map(p=>({src:p.src||p, label:'📍 Start'})),
    ...(r.photosEnd||[]).map(p=>({src:p.src||p, label:'🏁 End'})),

  ];

  return `

      <div class="report-item-header">

      ${allPhotos.length ? `
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:6px">
          ${allPhotos.map(p=>`
            <div style="position:relative">
              <img src="${p.src}" style="width:72px;height:72px;object-fit:cover;border-radius:8px;border:1px solid var(--border)">
              <div style="position:absolute;bottom:2px;left:2px;font-size:8px;background:rgba(0,0,0,0.6);color:#fff;padding:1px 4px;border-radius:3px">${p.label}</div>
            </div>`).join('')}
        </div>` : ''}
      ${actions}
    </div>`;
}
}

// Check if REMOVING a report would break downstream reports
// Returns error object or null
function checkDeleteDependency(r) {
  const allReports = getReports();

  if (r.type === 'excavation') {
    // Check if any pipe report depends on this excavation stretch
    const pipeReports = allReports.filter(p =>
      p.type === 'pipe' &&
      p.project === r.project &&
      p.route === r.route &&
      String(p.id) !== String(r.id)
    );
    // Simulate removal: would any pipe report's range become uncovered?
    const remainingExcav = allReports.filter(e =>
      e.type === 'excavation' &&
      e.project === r.project &&
      e.route === r.route &&
      String(e.id) !== String(r.id)
    );
    for (const pipe of pipeReports) {
      const pFrom = parseFloat(pipe.from)||0;
      const pTo   = parseFloat(pipe.to)||0;
      const gap   = findUncoveredRange(pFrom, pTo, remainingExcav);
      if (gap) {
        return {
          title: 'Cannot Delete — Pipe Laying Depends on This',
          msg: `Pipe laying report for Ch:${pipe.from}–${pipe.to}m (dated ${fmtDate(pipe.date)}) depends on this excavation. Deleting this excavation would leave Ch:${gap.from}–${gap.to}m without excavation coverage.`,
          dependent: 'Pipe Laying',
          hint: 'Delete the pipe laying report first, then delete this excavation.'
        };
      }
    }
  }

  if (r.type === 'pipe') {
    // Check if any refill report depends on this pipe stretch
    const refillReports = allReports.filter(rf =>
      rf.type === 'refill' &&
      rf.project === r.project &&
      rf.route === r.route &&
      String(rf.id) !== String(r.id)
    );
    const remainingPipe = allReports.filter(p =>
      p.type === 'pipe' &&
      p.project === r.project &&
      p.route === r.route &&
      String(p.id) !== String(r.id)
    );
    for (const refill of refillReports) {
      const rfFrom = parseFloat(refill.from)||0;
      const rfTo   = parseFloat(refill.to)||0;
      const gap    = findUncoveredRange(rfFrom, rfTo, remainingPipe);
      if (gap) {
        return {
          title: 'Cannot Delete — Refilling Depends on This',
          msg: `Refilling report for Ch:${refill.from}–${refill.to}m (dated ${fmtDate(refill.date)}) depends on this pipe laying. Deleting this would leave Ch:${gap.from}–${gap.to}m without pipe laying coverage.`,
          dependent: 'Refilling',
          hint: 'Delete the refilling report first, then delete this pipe laying report.'
        };
      }
    }
    // Check valve/fitting at this chainage
    const depCh = allReports.filter(d =>
      (d.type === 'valve' || d.type === 'fitting') &&
      d.project === r.project &&
      d.route === r.route
    );
    const rFrom = parseFloat(r.from)||0, rTo = parseFloat(r.to)||0;
    for (const d of depCh) {
      const ch = parseFloat(d.chainage)||0;
      if (ch >= rFrom && ch <= rTo) {
        const stillCovered = remainingPipe.some(p =>
          (parseFloat(p.from)||0) <= ch && (parseFloat(p.to)||0) >= ch
        );
        if (!stillCovered) {
          return {
            title: `Cannot Delete — ${d.type==='valve'?'Valve':'Fitting'} Depends on This`,
            msg: `A ${d.type} at Ch:${ch}m depends on this pipe laying. Delete the ${d.type} report first.`,
            dependent: d.type==='valve'?'Valve':'Fitting',
            hint: `Delete the ${d.type} at Ch:${ch}m first.`
          };
        }
      }
    }
  }

  return null;
}

// Check if EDITING a report (changing chainage/date) would break downstream
// oldR = original report, newFrom/newTo/newDate = proposed new values
function checkEditDependency(oldR, newFrom, newTo, newDate) {
  const allReports = getReports();

  // Editing excavation: check downstream pipe reports still covered
  if (oldR.type === 'excavation') {
    const remainingExcav = allReports.filter(e =>
      e.type === 'excavation' &&
      e.project === oldR.project &&
      e.route === oldR.route &&
      String(e.id) !== String(oldR.id)
    ).concat([{ from: newFrom, to: newTo, date: newDate }]);

    const pipeReports = allReports.filter(p =>
      p.type === 'pipe' &&
      p.project === oldR.project &&
      p.route === oldR.route
    );
    for (const pipe of pipeReports) {
      const pFrom = parseFloat(pipe.from)||0;
      const pTo   = parseFloat(pipe.to)||0;
      const gap   = findUncoveredRange(pFrom, pTo, remainingExcav);
      if (gap) {
        return {
          title: 'Edit Would Break Pipe Laying',
          msg: `Pipe laying report for Ch:${pipe.from}–${pipe.to}m depends on this excavation. Your edit would leave Ch:${gap.from}–${gap.to}m uncovered by excavation.`,
          prereq: 'Excavation', missing: `Ch:${gap.from}–${gap.to}m`
        };
      }
      // Date check: pipe date must remain ≥ excavation date
      const latestExcDate = getLatestDateForRange(pFrom, pTo, remainingExcav);
      if (latestExcDate && pipe.date < latestExcDate) {
        return {
          title: 'Edit Would Break Pipe Laying Date',
          msg: `Pipe laying report dated ${fmtDate(pipe.date)} would be before the updated excavation date (${fmtDate(latestExcDate)}) for Ch:${pipe.from}–${pipe.to}m.`,
          prereq: 'Excavation', missing: `Exc. date ${fmtDate(latestExcDate)}`
        };
      }
    }
  }

  // Editing pipe: check downstream refill reports still covered
  if (oldR.type === 'pipe') {
    const remainingPipe = allReports.filter(p =>
      p.type === 'pipe' &&
      p.project === oldR.project &&
      p.route === oldR.route &&
      String(p.id) !== String(oldR.id)
    ).concat([{ from: newFrom, to: newTo, date: newDate }]);

    const refillReports = allReports.filter(rf =>
      rf.type === 'refill' &&
      rf.project === oldR.project &&
      rf.route === oldR.route
    );
    for (const refill of refillReports) {
      const rfFrom = parseFloat(refill.from)||0;
      const rfTo   = parseFloat(refill.to)||0;
      const gap    = findUncoveredRange(rfFrom, rfTo, remainingPipe);
      if (gap) {
        return {
          title: 'Edit Would Break Refilling',
          msg: `Refilling report for Ch:${refill.from}–${refill.to}m depends on this pipe laying. Your edit would leave Ch:${gap.from}–${gap.to}m without pipe coverage.`,
          prereq: 'Pipe Laying', missing: `Ch:${gap.from}–${gap.to}m`
        };
      }
      const latestPipeDate = getLatestDateForRange(rfFrom, rfTo, remainingPipe);
      if (latestPipeDate && refill.date < latestPipeDate) {
        return {
          title: 'Edit Would Break Refilling Date',
          msg: `Refilling report dated ${fmtDate(refill.date)} would be before the updated pipe laying date (${fmtDate(latestPipeDate)}) for Ch:${refill.from}–${refill.to}m.`,
          prereq: 'Pipe Laying', missing: `Pipe date ${fmtDate(latestPipeDate)}`
        };
      }
    }
  }

  return null;
}

function editReport(id) {
  const r = getReports().find(r => String(r.id) === String(id));
  if (!r) return;
  openReportForm(r.type, r);
}

function deleteReport(id) {
  const reports = getReports();
  const r = reports.find(r => String(r.id) === String(id));
  if (!r) return;

  // Check downstream dependency before confirming
  const depErr = checkDeleteDependency(r);
  if (depErr) {
    const modal = document.getElementById('confirmModal');
    document.getElementById('confirmTitle').innerHTML =
      `<span style="color:var(--red)">⛔ ${depErr.title}</span>`;
    document.getElementById('confirmMsg').innerHTML =
      `<div style="margin-bottom:12px">${depErr.msg}</div>
       <div style="background:rgba(255,69,58,0.08);border:1px solid rgba(255,69,58,0.25);border-radius:8px;padding:10px;font-size:12px">
         <div style="font-weight:700;color:var(--red);margin-bottom:4px">Dependent: ${depErr.dependent}</div>
         <div style="color:var(--muted)">${depErr.hint}</div>
       </div>`;
    const btnWrap = modal.querySelector('.flex.gap-3');
    window._confirmBtnBackup = btnWrap.innerHTML;
    btnWrap.innerHTML = `<button class="btn btn-primary flex-1" onclick="closeDependencyError()">OK — Understood</button>`;
    modal.classList.remove('hidden');
    return;
  }

  showConfirm('Delete Report', 'Delete this report? This cannot be undone.', async () => {
    const updated = getReports().filter(r => String(r.id) !== String(id));
    saveReports(updated);
    renderCurrentTab();
    showToast('🗑️ Deleted');
    if (r) {
      setSyncStatus('syncing');
      const ok = await deleteReportFromAW(r);
      setSyncStatus(ok ? 'synced' : 'offline');
    }
  });
}

// ── TRACKER TAB ───────────────────────────────────────────────
function showTrackerTip(e, key, len) {
  const bar  = e.currentTarget;
  const rect = bar.getBoundingClientRect();
  const pct  = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  const ch   = Math.round(pct * len);
  const tip  = document.getElementById('tip_' + key);
  if (!tip) return;

  // Position tooltip near cursor
  const tipLeft = Math.max(10, Math.min(90, pct * 100));
  tip.style.left = tipLeft + '%';
  tip.style.display = 'block';

  // Check if in a gap
  let gaps = [];
  try { gaps = JSON.parse(bar.dataset.gaps || '[]'); } catch(e) {}
  const inGap = gaps.find(g => ch >= g.from && ch <= g.to);

  // Check if in a done segment
  const fills = [...bar.querySelectorAll('div[style*="position:absolute"]')]
    .filter(d => !d.id); // exclude tooltip div
  const pctPos = pct * 100;
  let isDone = false;
  fills.forEach(f => {
    const left  = parseFloat(f.style.left)  || 0;
    const width = parseFloat(f.style.width) || 0;
    if (pctPos >= left && pctPos <= left + width &&
        !f.style.background?.includes('repeating')) isDone = true;
  });

  if (inGap) {
    tip.innerHTML =
      `<div style="font-weight:700;color:var(--red)">⚠️ Gap at Ch: ${ch}m</div>` +
      `<div style="color:var(--red);font-size:10px">Not done: ${fmtM(inGap.from)}–${fmtM(inGap.to)}</div>` +
      `<div style="color:var(--muted);font-size:10px">Missing: ${fmtM(inGap.to - inGap.from)}</div>`;
  } else {
    tip.innerHTML =
      `<div style="font-weight:700;color:var(--text)">Ch: ${fmtM(ch)}</div>` +
      `<div style="color:${isDone?'var(--green)':'var(--muted)'};">${isDone ? '✅ Done' : '— Not started'}</div>` +
      `<div style="color:var(--muted);font-size:10px">${fmtM(ch)} of ${fmtM(len)}</div>`;
  }
}

function hideTrackerTip(key) {
  const tip = document.getElementById('tip_' + key);
  if (tip) tip.style.display = 'none';
}

function showMarkerTip(el, text) {
  let tip = el.querySelector('.mtip');
  if (!tip) {
    tip = document.createElement('div');
    tip.className = 'mtip';
    tip.style.cssText = 'position:absolute;bottom:28px;left:50%;transform:translateX(-50%);background:#1a1a2e;border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:11px;white-space:nowrap;z-index:200;pointer-events:none';
    el.style.position = 'relative';
    el.appendChild(tip);
  }
  tip.textContent = text;
  tip.style.display = 'block';
}

function hideMarkerTip(el) {
  const tip = el.querySelector('.mtip');
  if (tip) tip.style.display = 'none';
}

// Returns all gap segments in [0, len] where prereqReps cover but targetReps don't
function findAllGaps(prereqReps, targetReps, len) {
  const gaps = [];
  if (!prereqReps.length) return gaps;
  const prereqSegs = prereqReps
    .map(r=>({f:parseFloat(r.from)||0, t:parseFloat(r.to)||0}))
    .filter(s=>s.t>s.f).sort((a,b)=>a.f-b.f);
  const merged = [];
  for (const s of prereqSegs) {
    if (!merged.length || s.f > merged[merged.length-1].t + 0.001) merged.push({...s});
    else merged[merged.length-1].t = Math.max(merged[merged.length-1].t, s.t);
  }
  for (const seg of merged) {
    const gap = findUncoveredRange(seg.f, seg.t, targetReps);
    if (gap) gaps.push({from: Math.round(gap.from), to: Math.round(gap.to)});
  }
  return gaps;
}

// Gaps across full route [0, len] regardless of prereq
function findAllGapsFullRoute(targetReps, len) {
  const gaps = [];
  const segs = targetReps
    .map(r=>({f:parseFloat(r.from)||0, t:parseFloat(r.to)||0}))
    .filter(s=>s.t>s.f).sort((a,b)=>a.f-b.f);
  const merged = [];
  for (const s of segs) {
    if (!merged.length || s.f > merged[merged.length-1].t + 0.001) merged.push({...s});
    else merged[merged.length-1].t = Math.max(merged[merged.length-1].t, s.t);
  }
  let cursor = 0;
  for (const s of merged) {
    if (s.f > cursor + 0.001) gaps.push({from: Math.round(cursor), to: Math.round(s.f)});
    cursor = s.t;
  }
  if (cursor < len - 0.001) gaps.push({from: Math.round(cursor), to: Math.round(len)});
  return gaps;
}

function renderSpecialsList() {
  const proj = document.getElementById('specialsProjSel')?.value || getVisibleProjects()[0] || '';
  const specials = getSpecials();
  const items = specials[proj] || [];
  const el = document.getElementById('specialsList');

  if (!items.length) { el.innerHTML = '<div class="text-sm text-muted">No specials yet.</div>'; return; }
  const reports = getReports().filter(r => r.project === proj && r.type === 'fitting');
  el.innerHTML = items.map((s,i) => {
    const used = reports.reduce((sum,r) => r.special===s.name ? sum+(parseInt(r.qty)||1) : sum, 0);
    const left = (s.total||0) - used;
    const pct  = s.total ? Math.min(100, Math.round(used/s.total*100)) : 0;
    const color= pct>=100?'var(--red)':pct>=75?'var(--orange)':'var(--green)';
    return `
      <div class="card mb-2">
        <div class="flex justify-between items-center">
          <div class="font-bold" style="font-size:13px">⭐ ${s.name}</div>
          <button class="btn btn-danger btn-sm" onclick="deleteSpecial(${i})">✕</button>

        <div class="progress-bar mt-1"><div class="progress-fill" style="width:${pct}%;background:${color}"></div></div>
      </div>`;
  }).join('');
}

function addSpecial() {
  const name = document.getElementById('sp-name').value.trim();
  const total= parseInt(document.getElementById('sp-total').value) || 0;
  const proj = document.getElementById('specialsProjSel')?.value || getVisibleProjects()[0] || '';

  if (!specials[proj]) specials[proj] = [];
  specials[proj].push({ name, total });
  saveSpecials(specials);
  pushConfig();
  document.getElementById('sp-name').value = '';
  document.getElementById('sp-total').value = '';
  renderSpecialsList();
  showToast('✅ Special added');
}

function deleteSpecial(idx) {
  const proj = document.getElementById('specialsProjSel')?.value || getVisibleProjects()[0] || '';

}
