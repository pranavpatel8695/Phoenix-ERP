<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Phoenix ERP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f14;
  --surface: #1a1a24;
  --surface2: #22222e;
  --border: rgba(255,255,255,0.08);
  --text: #f0f0f5;
  --muted: #888899;
  --red: #FF453A;
  --orange: #FF9F0A;
  --green: #30D158;
  --blue: #0A84FF;
  --purple: #BF5AF2;
  --yellow: #FFD60A;
  --cyan: #5AC8FA;
  --accent: #E8192C;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Serif',Georgia,serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
/* ── UTILS ── */
.hidden{display:none!important;}
.flex{display:flex;} .flex-col{flex-direction:column;} .gap-2{gap:8px;} .gap-3{gap:12px;} .gap-4{gap:16px;}
.items-center{align-items:center;} .justify-between{justify-content:space-between;} .flex-1{flex:1;}
.w-full{width:100%;} .text-center{text-align:center;}
.rounded{border-radius:8px;} .rounded-lg{border-radius:12px;} .rounded-xl{border-radius:16px;}
.p-2{padding:8px;} .p-3{padding:12px;} .p-4{padding:16px;}
.mt-2{margin-top:8px;} .mt-3{margin-top:12px;} .mt-4{margin-top:16px;}
.mb-2{margin-bottom:8px;} .mb-3{margin-bottom:12px;}
.text-sm{font-size:12px;} .text-xs{font-size:11px;} .font-bold{font-weight:700;}
.text-muted{color:var(--muted);}
.text-green{color:var(--green);} .text-red{color:var(--red);} .text-blue{color:var(--blue);}
.text-orange{color:var(--orange);} .text-purple{color:var(--purple);}
/* ── CARD ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;}
.card-title{font-size:14px;font-weight:700;margin-bottom:12px;color:var(--text);}
/* ── BUTTONS ── */
.btn{padding:10px 16px;border-radius:10px;border:none;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:opacity 0.15s;}
.btn:hover{opacity:0.85;}
.btn-primary{background:var(--blue);color:#fff;}
.btn-danger{background:var(--red);color:#fff;}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
.btn-ghost{background:transparent;color:var(--blue);border:1px solid rgba(10,132,255,0.3);}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:8px;}
/* ── FORM ── */
.field-group{margin-bottom:14px;}
.field-group label{display:block;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;}
.field-group input,.field-group select,.field-group textarea{width:100%;padding:11px 14px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:inherit;font-size:13px;}
.field-group input:focus,.field-group select:focus,.field-group textarea:focus{outline:none;border-color:var(--blue);}
.field-group select option{background:var(--surface2);}
.radio-group{display:flex;gap:8px;flex-wrap:wrap;}
.radio-opt{padding:8px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;transition:all 0.15s;}
.radio-opt.selected,.radio-opt:hover{border-color:var(--blue);color:var(--blue);background:rgba(10,132,255,0.1);}
.form-row{display:flex;gap:10px;}
.form-row .field-group{flex:1;}
.req{color:var(--red);}
/* ── TOPBAR ── */
#topbar{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--surface);border-bottom:1px solid var(--border);height:56px;display:flex;align-items:center;padding:0 16px;gap:10px;}
.topbar-logo{font-size:16px;font-weight:700;color:var(--text);}
.topbar-logo span{color:var(--accent);}
.topbar-sub{font-size:9px;color:var(--muted);font-weight:400;line-height:1.2;}
.role-badge{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;}
.role-badge.admin{background:rgba(255,214,10,0.15);color:var(--yellow);border:1px solid rgba(255,214,10,0.3);}
.role-badge.pm{background:rgba(48,209,88,0.15);color:var(--green);border:1px solid rgba(48,209,88,0.3);}
.role-badge.supervisor,.role-badge.senior_engineer,.role-badge.junior_engineer,.role-badge.work_assistant,.role-badge.store_manager{background:rgba(10,132,255,0.15);color:var(--blue);border:1px solid rgba(10,132,255,0.3);}
#syncStatus{font-size:10px;padding:3px 8px;border-radius:6px;cursor:pointer;border:1px solid transparent;}
#syncStatus.synced{color:var(--green);background:rgba(48,209,88,0.1);border-color:rgba(48,209,88,0.2);}
#syncStatus.syncing{color:var(--orange);background:rgba(255,159,10,0.1);border-color:rgba(255,159,10,0.2);}
#syncStatus.offline{color:var(--red);background:rgba(255,69,58,0.1);border-color:rgba(255,69,58,0.2);}
.avatar-btn{width:32px;height:32px;border-radius:50%;background:var(--blue);color:#fff;font-size:12px;font-weight:700;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;}
/* ── BOTTOM NAV ── */
#bottomNav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--surface);border-top:1px solid var(--border);display:flex;padding:8px 0 max(8px,env(safe-area-inset-bottom));}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px;cursor:pointer;color:var(--muted);font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:0.3px;transition:color 0.15s;}
.nav-item .nav-icon{font-size:20px;line-height:1;}
.nav-item.active{color:var(--blue);}
/* ── MAIN CONTENT ── */
#main{margin-top:56px;margin-bottom:72px;padding:16px;max-width:600px;margin-left:auto;margin-right:auto;}
/* ── LOGIN ── */
#loginScreen{position:fixed;inset:0;background:var(--bg);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;}
.login-card{width:100%;max-width:380px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:32px 24px;}
.login-logo{text-align:center;margin-bottom:28px;}
.login-logo h1{font-size:28px;font-weight:700;color:var(--text);}
.login-logo h1 span{color:var(--accent);}
.login-logo p{font-size:12px;color:var(--muted);margin-top:4px;}
/* ── MODULE CARDS ── */
.module-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.module-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;cursor:pointer;transition:border-color 0.2s,transform 0.1s;}
.module-card:hover{border-color:var(--blue);transform:translateY(-1px);}
.module-card .icon{font-size:28px;margin-bottom:8px;}
.module-card .name{font-size:13px;font-weight:700;color:var(--text);}
.module-card .count{font-size:11px;color:var(--muted);margin-top:2px;}
/* ── STAT CARDS ── */
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px;}
.stat-card{background:var(--surface2);border-radius:12px;padding:12px;text-align:center;}
.stat-card .val{font-size:22px;font-weight:800;line-height:1;}
.stat-card .lbl{font-size:10px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:0.3px;}
/* ── REPORT LIST ── */
.report-item{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;}
.report-item-header{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.type-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.report-type-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;}
.report-info{font-size:12px;color:var(--muted);}
.report-date{font-size:11px;color:var(--muted);}
.report-actions{display:flex;gap:6px;margin-top:10px;}
/* ── SECTION HEADER ── */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.section-title{font-size:16px;font-weight:700;}
/* ── TOAST ── */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:#333;color:#fff;padding:10px 18px;border-radius:20px;font-size:13px;opacity:0;transition:all 0.3s;z-index:999;white-space:nowrap;pointer-events:none;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:300;display:flex;align-items:flex-end;justify-content:center;}
#confirmModal{z-index:500;}
.modal-sheet{background:var(--surface);border-radius:20px 20px 0 0;padding:24px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 20px;}
/* ── TABS ── */
.tab-bar{display:flex;background:var(--surface2);border-radius:10px;padding:3px;margin-bottom:16px;}
.tab-item{flex:1;padding:7px;text-align:center;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;color:var(--muted);transition:all 0.2s;}
.tab-item.active{background:var(--surface);color:var(--text);}
/* ── BADGE ── */
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;}
.badge-green{background:rgba(48,209,88,0.15);color:var(--green);}
.badge-orange{background:rgba(255,159,10,0.15);color:var(--orange);}
.badge-red{background:rgba(255,69,58,0.15);color:var(--red);}
.badge-blue{background:rgba(10,132,255,0.15);color:var(--blue);}
.badge-purple{background:rgba(191,90,242,0.15);color:var(--purple);}
/* ── PROGRESS BAR ── */
.progress-bar{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;margin-top:6px;}
.progress-fill{height:100%;border-radius:3px;transition:width 0.5s;}
/* ── PHOTO ── */
.photo-zone{border:2px dashed var(--border);border-radius:12px;padding:20px;text-align:center;cursor:pointer;color:var(--muted);font-size:13px;transition:border-color 0.2s;}
.photo-zone:hover{border-color:var(--blue);color:var(--blue);}
.photo-zone .pi{font-size:28px;margin-bottom:6px;}
.photo-prev-grid{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
.photo-thumb{position:relative;width:72px;height:72px;border-radius:8px;overflow:hidden;}
.photo-thumb img{width:100%;height:100%;object-fit:cover;}
.photo-thumb .rm{position:absolute;top:2px;right:2px;background:rgba(0,0,0,0.6);color:#fff;border:none;border-radius:50%;width:18px;height:18px;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
/* ── CHAINAGE BAR ── */
.ch-bar-wrap{margin-bottom:16px;}
.ch-bar-label{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:4px;}
.ch-bar{height:10px;background:var(--surface2);border-radius:5px;position:relative;overflow:hidden;}
.ch-seg{position:absolute;height:100%;}
/* ── LOADER ── */
#loader{position:fixed;inset:0;background:var(--bg);z-index:400;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
.loader-spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loader-text{font-size:13px;color:var(--muted);}
/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
/* ── EMPTY STATE ── */
.empty-state{text-align:center;padding:40px 20px;color:var(--muted);}
.empty-state .icon{font-size:48px;margin-bottom:12px;}
.empty-state p{font-size:13px;}
/* ── SETTINGS ── */
.settings-section{margin-bottom:20px;}
.settings-section-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px;}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border);}
.settings-row:last-child{border-bottom:none;}
.settings-row-label{font-size:13px;font-weight:600;}
.settings-row-sub{font-size:11px;color:var(--muted);}
/* ── ACCOUNT CARD ── */
.account-card{background:var(--surface2);border-radius:12px;padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:12px;}
.account-avatar{width:40px;height:40px;border-radius:50%;background:var(--blue);color:#fff;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.account-info{flex:1;}
.account-name{font-size:13px;font-weight:700;}
.account-user{font-size:11px;color:var(--muted);}
/* ── MISC ── */
.divider{height:1px;background:var(--border);margin:16px 0;}
.chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;background:var(--surface2);color:var(--muted);border:1px solid var(--border);}
.chip.active{background:rgba(10,132,255,0.1);color:var(--blue);border-color:rgba(10,132,255,0.3);}
</style>
</head>
<body>

<!-- LOADER -->
<div id="loader">
  <div class="loader-spinner"></div>
  <div class="loader-text">Loading Phoenix ERP…</div>
</div>

<!-- LOGIN -->
<div id="loginScreen" class="hidden">
  <div class="login-card">
    <div class="login-logo">
      <h1>Phoenix<span> ERP</span></h1>
      <p>Site Reporting System</p>
    </div>
    <div class="field-group">
      <label>Username</label>
      <input type="text" id="loginUser" placeholder="Enter username" autocomplete="username">
    </div>
    <div class="field-group">
      <label>Password</label>
      <input type="password" id="loginPass" placeholder="Enter password" autocomplete="current-password"
        onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn btn-primary w-full" onclick="doLogin()">Sign In</button>
    <div id="loginError" class="hidden text-sm text-red text-center mt-3"></div>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <!-- TOPBAR -->
  <div id="topbar">
    <div style="flex:1">
      <div class="topbar-logo">Phoenix<span> ERP</span></div>
      <div class="topbar-sub" id="topbarSub">Site Reporting System</div>
    </div>
    <span id="roleBadgeEl" class="role-badge"></span>
    <span id="syncStatus" class="synced" onclick="doSync()">☁️ Synced</span>
    <button class="avatar-btn" id="avatarBtn" onclick="showUserMenu()">A</button>
  </div>

  <!-- MAIN CONTENT -->
  <div id="main">
    <!-- Each tab content injected here -->
  </div>

  <!-- BOTTOM NAV -->
  <div id="bottomNav">
    <div class="nav-item active" data-tab="home" onclick="switchTab('home')">
      <div class="nav-icon">📊</div>Dashboard
    </div>
    <div class="nav-item" data-tab="submit" onclick="switchTab('submit')" id="navSubmit">
      <div class="nav-icon">📝</div>Submit
    </div>
    <div class="nav-item" data-tab="reports" onclick="switchTab('reports')">
      <div class="nav-icon">📋</div>Reports
    </div>
    <div class="nav-item" data-tab="tracker" onclick="switchTab('tracker')" id="navTracker">
      <div class="nav-icon">📏</div>Tracker
    </div>
    <div class="nav-item" data-tab="settings" onclick="switchTab('settings')" id="navSettings">
      <div class="nav-icon">⚙️</div>Settings
    </div>
    <div class="nav-item" data-tab="users" onclick="switchTab('users')" id="navUsers">
      <div class="nav-icon">👥</div>Users
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- PHOTO LIGHTBOX -->
<div id="photoLightbox" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:9999;flex-direction:column;align-items:center;justify-content:center" onclick="closePhotoLightbox()">
  <div style="position:absolute;top:16px;right:16px;font-size:28px;color:#fff;cursor:pointer;line-height:1" onclick="closePhotoLightbox()">✕</div>
  <div style="position:absolute;top:16px;left:50%;transform:translateX(-50%);color:#fff;font-size:12px;opacity:0.7" id="lightbox-counter"></div>
  <img id="lightbox-img" src="" style="max-width:95vw;max-height:85vh;object-fit:contain;border-radius:8px" onclick="event.stopPropagation()">
  <div style="display:flex;gap:24px;margin-top:16px">
    <button id="lightbox-prev" onclick="event.stopPropagation();lightboxNav(-1)" style="background:rgba(255,255,255,0.15);color:#fff;border:none;border-radius:50%;width:44px;height:44px;font-size:20px;cursor:pointer">‹</button>
    <button id="lightbox-next" onclick="event.stopPropagation();lightboxNav(1)" style="background:rgba(255,255,255,0.15);color:#fff;border:none;border-radius:50%;width:44px;height:44px;font-size:20px;cursor:pointer">›</button>
  </div>
</div>

<!-- USER MENU MODAL -->
<div id="userMenuModal" class="modal-overlay hidden" onclick="if(event.target===this)this.classList.add('hidden')">
  <div class="modal-sheet" style="max-height:50vh">
    <div class="modal-handle"></div>
    <div id="userMenuContent"></div>
  </div>
</div>

<!-- CONFIRM MODAL -->
<div id="confirmModal" class="modal-overlay hidden">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div id="confirmTitle" class="section-title mb-3"></div>
    <div id="confirmMsg" class="text-sm text-muted mb-4"></div>
    <div class="flex gap-3">
      <button class="btn btn-secondary flex-1" onclick="document.getElementById('confirmModal').classList.add('hidden')">Cancel</button>
      <button class="btn btn-danger flex-1" id="confirmYesBtn">Delete</button>
    </div>
  </div>
</div>

<!-- FORM MODAL -->
<div id="formModal" class="modal-overlay hidden" onclick="if(event.target===this)closeFormModal()">
  <div class="modal-sheet" id="formModalSheet">
    <div class="modal-handle"></div>
    <div id="formModalContent"></div>
  </div>
</div>

<script>
// ============================================================
// PHOENIX ERP — Clean Architecture
// ============================================================

// Global error handler — prevent infinite loading screen
window.onerror = function(msg, src, line, col, err) {
  console.error('Phoenix ERP Error:', msg, 'at', src, line, col);
  const loader = document.getElementById('loader');
  const login  = document.getElementById('loginScreen');
  const app    = document.getElementById('app');
  if (loader) loader.style.display = 'none';
  if (app && !app.classList.contains('hidden')) return false;
  if (login) login.classList.remove('hidden');
  return false;
};

// ── CONFIG ──────────────────────────────────────────────────
const AW = {
  endpoint: 'https://phoenixsite.duckdns.org/v1',
  project:  '69bf775300049155a9d9',
  database: '69bf7846002d6b0b65f6',
  collections: {
    reports: 'reports',
    config:  'config'
  }
};
const APP_VERSION = '3.0';

// ── STATE ───────────────────────────────────────────────────
let currentUser = null;
let currentRole = null; // 'admin' | 'pm' | 'supervisor'
let currentModule = 'pipeline'; // 'pipeline' | 'civil' | 'attendance'
let activeTab = 'home';
let _syncing = false;
let _editId = null;

// ── LOCAL STORAGE HELPERS ───────────────────────────────────
const LS = {
  get: (k, def=[]) => { try { return JSON.parse(localStorage.getItem(k)) ?? def; } catch(e) { return def; } },
  set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) { console.error('LS.set failed:', k, e); if(e.name==='QuotaExceededError') showToast('⚠️ Storage full! Clear old data.'); } },
  del: (k) => localStorage.removeItem(k)
};

const getUsers       = () => LS.get('phx_users', { admin: { role:'admin', pass:'admin', name:'Admin' } });
const saveUsers = v => {
  // Safety check: never save fewer users than currently stored (except via explicit delete)
  try {
    const current = JSON.parse(localStorage.getItem('phx_users') || '{}');
    const currentNonAdmin = Object.keys(current).filter(u => u !== 'admin');
    const newNonAdmin = Object.keys(v).filter(u => u !== 'admin');
    const missing = currentNonAdmin.filter(u => !v[u]);
    const deleted = LS.get('phx_deleted_users', []);
    const unexpectedMissing = missing.filter(u => !deleted.includes(u));
    if (unexpectedMissing.length > 0) {
      // Show toast so user can report this
      showToast('⚠️ User sync issue detected — auto-fixing');
      console.error('saveUsers blocked deletion of:', unexpectedMissing, new Error().stack);
      // Restore missing users
      unexpectedMissing.forEach(u => { v[u] = current[u]; });
    }
  } catch(e) {}
  LS.set('phx_users', v);
};
// Returns display label for a user object
function getUserLabel(u) {
  if (!u) return 'Engineer';
  if (u.role === 'admin') return 'Admin';
  if (u.role === 'pm') return 'Project Manager';
  if (u.role === 'senior_engineer') return 'Senior Engineer';
  if (u.role === 'junior_engineer') return 'Junior Engineer';
  if (u.role === 'work_assistant') return 'Work Assistant';
  if (u.role === 'store_manager') return 'Store Manager';
  return u.designation || 'Engineer'; // backward compat
}
// All engineer-level roles (same access as old 'supervisor')

  const all = getProjects();

  const users = getUsers();

// ── APPWRITE API ─────────────────────────────────────────────
async function aw(method, path, data) {
  const url = AW.endpoint + path;
  const opts = {
    method,
    headers: {
      'X-Appwrite-Project': AW.project,
      'Content-Type': 'application/json'
    }
  };
  if (data) opts.body = JSON.stringify(data);
  try {
    const res = await fetch(url, opts);
    if (res.status === 204) return true;
    const json = await res.json();
    if (!res.ok) return null;
    return json;
  } catch(e) {
    return null;
  }
}

// ── PHOTO STORAGE (separate from reports to avoid 5MB limit) ──
function savePhotosForReport(id, photosStart, photosEnd, photos) {
  try {
    const key = 'phx_photos_' + String(id);
    const hasAny = photosStart?.length || photosEnd?.length || photos?.length;
    if (!hasAny) { localStorage.removeItem(key); return; }
    localStorage.setItem(key, JSON.stringify({ photosStart: photosStart||[], photosEnd: photosEnd||[], photos: photos||[] }));
  } catch(e) { console.warn('Photo save failed (storage full?):', e); }
}
function getPhotosForReport(id) {
  try {
    const key = 'phx_photos_' + String(id);
    const v = localStorage.getItem(key);
    if (!v) return null;
    const parsed = JSON.parse(v);
    return parsed || null;
  } catch(e) { return null; }
}
function deletePhotosForReport(id) {
  localStorage.removeItem('phx_photos_' + String(id));
}
function injectPhotosIntoReports(reports) {
  return reports.map(r => {
    const stored = getPhotosForReport(r.id);
    if (!stored) return r;
    return {
      ...r,
      photosStart: r.photosStart?.length ? r.photosStart : (stored.photosStart||[]),
      photosEnd:   r.photosEnd?.length   ? r.photosEnd   : (stored.photosEnd||[]),
      photos:      r.photos?.length      ? r.photos      : (stored.photos||[]),
    };
  });
}

async function doSync() {
  if (_syncing) return;
  _syncing = true;
  setSyncStatus('syncing');

  try {
    // 1. Pull config
    await pullConfig();

    // 2. Fetch all reports from Appwrite
    let docs = [], offset = 0;
    while (true) {
      const res = await aw('GET', `/databases/${AW.database}/collections/${AW.collections.reports}/documents?limit=100&offset=${offset}`);
      if (!res?.documents) break;
      docs = docs.concat(res.documents);
      if (res.documents.length < 100) break;
      offset += 100;
    }

    // 3. Parse docs
    console.log('[doSync] fetched', docs.length, 'docs from Appwrite');
    const remote = docs.map(d => {
      try {
        const base = d.data_json ? JSON.parse(d.data_json) : {};
        // Fill from individual fields
        ['type','project','route','date','supervisor','timestamp'].forEach(f => {
          if (d[f]) base[f] = d[f];
        });
        // Derive module from type if not in data_json
        if (!base.module) base.module = (base.type||'').startsWith('civil_') ? 'civil' : 'pipeline';
        if (d.from_ch !== undefined) base.from = d.from_ch;
        if (d.to_ch   !== undefined) base.to   = d.to_ch;
        ['meters','volume','width','depth','qty','chainage','estConc','actualConc','netVol'].forEach(f => {
          if (d[f] !== undefined) base[f] = d[f];
        });
        ['soil','size','material','encasing','road','valType','chamberReq',
         'chamType','chamStatus','slab','slabKept','fitType','thrustBlock',
         'special','strType','remarks'].forEach(f => {
          if (d[f]) base[f] = d[f];
        });
        ['encasings','valves','connections'].forEach(f => {
          if (d[f]) try { base[f] = JSON.parse(d[f]); } catch(e) {}
        });
        if (!base.id) base.id = d.$id;
        base._awId = d.$id;
        return base;
      } catch(e) { console.warn('[doSync] parse error:', e, d); return null; }
    }).filter(r => r && r.type);
    console.log('[doSync] parsed', remote.length, 'valid reports, projects:', [...new Set(remote.map(r=>r.project))]);
    console.log('[doSync] local has', getReports().length, 'reports');

    // 4. Merge: remote is source of truth, local-only kept only if newer than remote sync
    const deletedReports = LS.get('phx_deleted_reports', []);
    // Read local AFTER all fetches complete (not before) to avoid race condition with submissions
    const local = getReports();
    const localMap = local.reduce((m, r) => { m[String(r.id)] = r; return m; }, {});
    const remoteIds = new Set(remote.map(r => String(r.id)));

    // Reports in remote: take them with local photo restoration
    const mergedRemote = remote.map(r => {
      const loc = localMap[String(r.id)];
      const storedPhotos = getPhotosForReport(r.id);
      const photosStart = r.photosStart?.length ? r.photosStart : (loc?.photosStart||storedPhotos?.photosStart||[]);
      const photosEnd   = r.photosEnd?.length   ? r.photosEnd   : (loc?.photosEnd||storedPhotos?.photosEnd||[]);
      const photos      = r.photos?.length       ? r.photos      : (loc?.photos||storedPhotos?.photos||[]);
      if (photosStart.length || photosEnd.length || photos.length) {
        savePhotosForReport(r.id, photosStart, photosEnd, photos);
      }
      return { ...r, photosStart, photosEnd, photos };
    });

    // Local-only: keep ALL local reports not in remote UNLESS explicitly deleted
    // phx_deleted_reports (synced to Appwrite) is the only way to remove a report
    // DO NOT use _awId - it's unreliable (Appwrite may not return all docs)
    const localOnly = local.filter(r => {
      if (!r.id) return false;
      if (remoteIds.has(String(r.id))) return false;
      if (deletedReports.includes(String(r.id))) return false;
      return true; // keep everything else
    });

    const merged = Object.values(
      [...mergedRemote, ...localOnly].reduce((m, r) => { m[String(r.id)] = r; return m; }, {})
    );
    saveReports(merged);

    // 5. Upload local-only reports to Appwrite and persist _awId
    for (const r of localOnly) {
      try {
        await saveReportToAW(r);
        if (r._awId) {
          const reports = getReports();
          const idx = reports.findIndex(x => String(x.id) === String(r.id));
          if (idx >= 0) { reports[idx]._awId = r._awId; LS.set('phx_reports', reports); }
        }
      } catch(e) {}
    }

    setSyncStatus('synced');
    renderCurrentTab();

  } catch(e) {
    console.warn('Sync failed:', e);
    setSyncStatus('offline');
  } finally {
    _syncing = false;
  }
}

async function pullConfig(force=false) {
  // Fetch config, live data, and store photos in parallel
  const [configRes, liveRes, photosRes, reportPhotosRes] = await Promise.all([
    aw('GET', `/databases/${AW.database}/collections/${AW.collections.config}/documents/adminData`),
    aw('GET', `/databases/${AW.database}/collections/${AW.collections.config}/documents/liveData`),
    aw('GET', `/databases/${AW.database}/collections/${AW.collections.config}/documents/storePhotos`),
    aw('GET', `/databases/${AW.database}/collections/${AW.collections.config}/documents/reportPhotos`)
  ]);

  // Apply store photos to localStorage
  if (photosRes?.value) {
    try {
      const photos = JSON.parse(photosRes.value);
      Object.keys(photos).forEach(id => {
        if (photos[id]) { try { localStorage.setItem('phx_si_photo_'+id, photos[id]); } catch(e) {} }
      });
    } catch(e) {}
  }

  // Apply report photos to localStorage
  if (reportPhotosRes?.value) {
    try {
      const rPhotos = JSON.parse(reportPhotosRes.value);
      Object.keys(rPhotos).forEach(id => {
        const items = rPhotos[id];
        if (!Array.isArray(items)) return;
        const photosStart = items.filter(p=>p.zone==='start').map(p=>({src:p.src}));
        const photosEnd   = items.filter(p=>p.zone==='end').map(p=>({src:p.src}));
        const photos      = items.filter(p=>p.zone==='main').map(p=>({src:p.src}));
        // Always save - remote is source of truth for cross-device photos
        if (photosStart.length || photosEnd.length || photos.length) {
          savePhotosForReport(id, photosStart, photosEnd, photos);
        }
      });
    } catch(e) {}
  }

  const mergeArr = (getter,saver,arr,updateFields) => {
    if(!arr?.length) return;
    const loc=getter();
    const locMap = {};
    loc.forEach((x,i)=>{ locMap[x.id]=i; });
    arr.forEach(x=>{
      if(locMap[x.id]===undefined){ loc.push(x); }
      else if(updateFields) {
        updateFields.forEach(f=>{ if(x[f]!==undefined) loc[locMap[x.id]][f]=x[f]; });
      }
    });
    saver(loc);
  };

  // ── Process config document (users, projects, routes) ──
  if (configRes?.value) {
    try {
      const d = JSON.parse(configRes.value);
      if (d.projects?.length)                      saveProjects(d.projects);
      if (d.routes && Object.keys(d.routes).length) saveRoutes(d.routes);

      // Merge remote deletedReports into local
      if (d.deletedReports?.length) {
        const existing = LS.get('phx_deleted_reports', []);
        LS.set('phx_deleted_reports', [...new Set([...existing, ...d.deletedReports.map(String)])]);
      }
      if (d.assignments)                            saveAssignments(d.assignments);
      if (d.specials)                               saveSpecials(d.specials);
      if (d.valveSpecials)                          saveValveSpecials(d.valveSpecials);

      // Process deletedUsers first
      if (d.deletedUsers?.length) {
        const existing = LS.get('phx_deleted_users', []);
        // Add to deleted list if remote deleted them AND remote doesn't have them active (not re-created)
        const toDelete = d.deletedUsers.filter(u => !d.users?.[u]);
        LS.set('phx_deleted_users', [...new Set([...existing, ...toDelete])]);
      }

      // If remote has a user that we have in local deletedUsers, remove from deleted list
      // (means the user was re-created on another device)
      if (d.users) {
        const localDeleted = LS.get('phx_deleted_users', []);
        const reactivated = localDeleted.filter(u => d.users[u]);
        if (reactivated.length) {
          LS.set('phx_deleted_users', localDeleted.filter(u => !reactivated.includes(u)));
        }
      }

      if (d.users) {
        const local = getUsers();
        const adminPass = local.admin?.pass || 'admin';
        const deleted = LS.get('phx_deleted_users', []);

        // Start with ALL local users
        const merged = {};
        Object.keys(local).forEach(u => {
          if (!deleted.includes(u)) merged[u] = local[u];
        });

        // Add/update from remote, skip deleted
        Object.keys(d.users).forEach(u => {
          if (deleted.includes(u) || u === 'admin') return;
          const rem = d.users[u];
          if (!merged[u]) {
            merged[u] = rem;
          } else {
            const localProjects = merged[u].projects;
            merged[u] = { ...rem };
            if (!merged[u].projects?.length && localProjects?.length) {
              merged[u].projects = localProjects;
            }
          }
        });

        // Admin always gets local password
        merged.admin = { ...(d.users.admin || local.admin || {}), pass: adminPass };

        saveUsers(merged);
      }
    } catch(e) { console.warn('pullConfig configDoc error:', e); }
  }

  // ── Process live data document (attendance, store, machinery) ──
  // Fall back to adminData if liveData not yet created (backward compat)
  const liveSource = liveRes?.value ? liveRes : configRes;
  if (liveSource?.value) {
    try {
      const d = JSON.parse(liveSource.value);
      const deletedUsers = LS.get('phx_deleted_users', []);

      // Machinery: full replace from remote (source of truth)
      if (d.machinery?.length)    saveMachinery(d.machinery);
      if (d.machService?.length)  saveMachService(d.machService);

      // MachLogs/Issues: merge-add only (append new, update status fields)
      if (d.machLogs?.length) {
        const loc = getMachLogs();
        const ids = new Set(loc.map(x=>x.id));
        d.machLogs.forEach(x=>{ if(!ids.has(x.id)) loc.push(x); });
        saveMachLogs(loc);
      }
      if (d.machIssues?.length) {
        const loc = getMachIssues();
        const locMap = {};
        loc.forEach((x,i)=>{ locMap[x.id]=i; });
        d.machIssues.forEach(x=>{
          if(locMap[x.id]===undefined){ loc.push(x); }
          else {
            loc[locMap[x.id]].status      = x.status;
            loc[locMap[x.id]].resolution  = x.resolution;
            loc[locMap[x.id]].resolvedDate= x.resolvedDate;
          }
        });
        saveMachIssues(loc);
      }

      // Store items: full replace from remote, preserve local photos, remove zero-qty
      if (d.deletedStoreItems?.length) {
        const existing = LS.get('phx_deleted_store_items', []);
        LS.set('phx_deleted_store_items', [...new Set([...existing, ...d.deletedStoreItems])]);
      }
      const deletedStoreItems = LS.get('phx_deleted_store_items', []);

      if (Array.isArray(d.storeItems)) {
        // Build map of local photos to preserve
        const localPhotos = {};
        getStoreItems().forEach(i=>{ if(i.photo) localPhotos[i.id]=i.photo; });

        // Remote is source of truth for store items
        // Items in remote: take them (with photo restoration)
        // Items NOT in remote but in local: ONLY keep if they're newer than the remote push
        //   (i.e. added locally after last sync) - identified by not having _awId or being very new
        // Items in deletedStoreItems: always remove
        const remoteItemIds = new Set(d.storeItems.map(i=>i.id));

        let loc = d.storeItems
          .filter(i=>(parseFloat(i.qty)||0)>0)
          .filter(i=>!deletedStoreItems.includes(i.id))
          .map(i=>{
            const savedPhoto = i.photo || localStorage.getItem('phx_si_photo_'+i.id) || localPhotos[i.id] || '';
            if (savedPhoto) { try { localStorage.setItem('phx_si_photo_'+i.id, savedPhoto); } catch(e) {} }
            return {...i, photo: savedPhoto};
          });

        // Only keep local items that are NOT in remote if they were added AFTER the remote was last updated
        // This prevents deleted items (missing from remote) from being re-added
        const remoteUpdatedAt = d.updatedAt || 0;
        getStoreItems().forEach(i=>{
          if (!remoteItemIds.has(i.id) && !deletedStoreItems.includes(i.id)) {
            // Only keep if item was created after remote was last synced (truly new local item)
            const itemTime = new Date(i.timestamp||0).getTime();
            if (itemTime > remoteUpdatedAt) {
              loc.push(i);
            }
            // Otherwise: item missing from remote = was deleted on another device, don't re-add
          }
        });

        saveStoreItems(loc);
      }

      // StoreTxns: merge-add only (append new)
      if (d.storeTxns?.length) {
        const loc = getStoreTxns();
        const ids = new Set(loc.map(x=>x.id));
        d.storeTxns.forEach(x=>{ if(!ids.has(x.id)) loc.push(x); });
        saveStoreTxns(loc);
      }

      // Reports: merge from liveData (recent reports, cross-device sync)
      if (Array.isArray(d.reports) && d.reports.length) {
        const delReps = LS.get('phx_deleted_reports', []);
        if (d.deletedReports?.length) {
          const existing = LS.get('phx_deleted_reports', []);
          LS.set('phx_deleted_reports', [...new Set([...existing, ...d.deletedReports.map(String)])]);
        }
        const local = getReports();
        const localMap = {};
        local.forEach(r => { localMap[String(r.id)] = r; });
        let changed = false;
        d.reports.forEach(r => {
          if (!r.id || delReps.includes(String(r.id))) return;
          if (!localMap[String(r.id)]) {
            // New report from another device - add it with photo restoration
            const stored = getPhotosForReport(r.id);
            local.push({
              ...r,
              module: r.module || (r.type?.startsWith('civil_') ? 'civil' : 'pipeline'),
              photosStart: stored?.photosStart || [],
              photosEnd:   stored?.photosEnd   || [],
              photos:      stored?.photos      || [],
            });
            changed = true;
          }
        });
        if (changed) saveReports(local);
      }

      // Attendance: merge with full status update from remote
      {
        let loc = getAttendance().filter(a => !deletedUsers.includes(a.user));
        if (d.attendance?.length) {
          const locMap = {};
          loc.forEach((a,i)=>{ locMap[a.id]=i; });
          d.attendance.forEach(a=>{
            if (deletedUsers.includes(a.user)) return;
            if (locMap[a.id]===undefined) {
              loc.push(a);
            } else {
              // Full replace of the record from remote (source of truth for approvals)
              const local = loc[locMap[a.id]];
              loc[locMap[a.id]] = {
                ...a,
                // Preserve local fields not in remote
                pmName: a.pmName || local.pmName,
                userName: a.userName || local.userName,
              };
            }
          });
        }
        saveAttendance(loc);
      }
    } catch(e) { console.warn('pullConfig liveDoc error:', e); }
  }
}

let _pushing = false;

async function pushConfig() {
  _pushing = true;
  const deletedUsers = LS.get('phx_deleted_users', []);

  // Push local users (without deleted ones) — pullConfig already merged remote before this call
  const localUsers = getUsers();
  const cleanUsers = Object.fromEntries(
    Object.entries(localUsers)
      .filter(([u]) => !deletedUsers.includes(u))
      .map(([u, v]) => [u, {
        role: v.role,
        pass: v.pass,
        name: v.name,
        projects: v.projects || []
      }])
  );

  // Minimize routes - only store essential fields to save space
  const slimRoutes = {};
  const fullRoutes = getRoutes();
  Object.keys(fullRoutes).forEach(proj => {
    slimRoutes[proj] = (fullRoutes[proj]||[]).map(r=>({
      id:r.id, name:r.name, length:r.length,
      pipes: r.pipes, pipe: r.pipe
    }));
  });

  const configData = {
    projects:     getProjects(),
    routes:       slimRoutes,
    assignments:  getAssignments(),
    specials:     getSpecials(),
    valveSpecials: getValveSpecials(),
    users:        cleanUsers,
    deletedUsers,
    deletedReports: LS.get('phx_deleted_reports', []),
    updatedAt:    Date.now()
  };

  // Doc 2: Live/operational data (attendance, store, machinery)
  const deletedStoreItems = LS.get('phx_deleted_store_items', []);
  // Store items WITHOUT photos (photos go in separate doc)
  const storeItemsLean = getStoreItems()
    .filter(i => (parseFloat(i.qty)||0) > 0 && !deletedStoreItems.includes(i.id))
    .map(i => { const {photo,...rest}=i; return rest; });

  let attendance = getAttendance();
  let machLogs   = getMachLogs();
  let storeTxns  = getStoreTxns();

  const deletedReports = LS.get('phx_deleted_reports', []);
  // Include last 30 days of reports (stripped of photos) for cross-device sync via liveData
  const cutoffDate = new Date(Date.now() - 30*24*60*60*1000).toISOString().slice(0,10);
  const recentReportsLean = getReports()
    .filter(r => (r.date||'') >= cutoffDate && !deletedReports.includes(String(r.id)))
    .map(r => { const {photos, photosStart, photosEnd, ...rest} = r; return rest; });

  const liveData = {
    attendance,
    storeItems:  storeItemsLean,
    storeTxns,
    machinery:   getMachinery(),
    machLogs,
    machService: getMachService(),
    machIssues:  getMachIssues(),
    deletedStoreItems: LS.get('phx_deleted_store_items', []),
    reports:     recentReportsLean,
    deletedReports,
    updatedAt:   Date.now()
  };

  // Trim if needed before encoding
  const trimAndEncode = (data, key, arr, limit=60000) => {
    let v = JSON.stringify(data);
    let trimCount = 10;
    while (v.length > limit && trimCount > 0) {
      data[key] = arr.slice(-Math.floor(arr.length * 0.8));
      arr = data[key];
      v = JSON.stringify(data);
      trimCount--;
    }
    return v.slice(0, 65000);
  };

  // Ensure configData fits in 65KB - trim routes if needed (they can be large)
  let configVal = JSON.stringify(configData);
  if (configVal.length > 64000) {
    // Routes can be large - strip pipe specs to save space
    const slimRoutes = {};
    Object.keys(configData.routes||{}).forEach(proj => {
      slimRoutes[proj] = (configData.routes[proj]||[]).map(r=>({id:r.id,name:r.name,length:r.length}));
    });
    configData.routes = slimRoutes;
    configVal = JSON.stringify(configData);
  }
  if (configVal.length > 64000) {
    // Still too big - remove specials
    configData.specials = {};
    configData.valveSpecials = {};
    configVal = JSON.stringify(configData);
  }
  // NEVER truncate - truncated JSON is invalid and breaks everything
  // If still too big, at minimum always keep users + projects
  if (configVal.length > 64000) {
    configVal = JSON.stringify({
      projects: configData.projects,
      users:    configData.users,
      deletedUsers: configData.deletedUsers,
      routes:   {},
      assignments: configData.assignments,
      specials: {},
      valveSpecials: {},
      updatedAt: configData.updatedAt
    });
  }
  let liveVal = JSON.stringify(liveData);
  if (liveVal.length > 64000) {
    // Trim oldest reports first (keep last 14 days)
    const cutoff14 = new Date(Date.now() - 14*24*60*60*1000).toISOString().slice(0,10);
    liveData.reports = recentReportsLean.filter(r => (r.date||'') >= cutoff14);
    liveData.machLogs   = machLogs.slice(-20);
    liveData.storeTxns  = storeTxns.slice(-50);
    liveData.attendance = attendance.slice(-100);
    liveVal = JSON.stringify(liveData);
  }
  if (liveVal.length > 64000) {
    // Trim to last 7 days of reports
    const cutoff7 = new Date(Date.now() - 7*24*60*60*1000).toISOString().slice(0,10);
    liveData.reports = recentReportsLean.filter(r => (r.date||'') >= cutoff7);
    liveData.machLogs = [];
    liveVal = JSON.stringify(liveData);
  }
  if (liveVal.length > 64000) {
    // Last resort: no reports (doSync handles older ones)
    liveData.reports = [];
    liveVal = JSON.stringify(liveData);
  }

  const save = async (docId, val) => {
    try { JSON.parse(val); } catch(e) {
      console.error('Invalid JSON for', docId, e);
      return false;
    }
    const baseUrl = `${AW.endpoint}/databases/${AW.database}/collections/${AW.collections.config}/documents`;
    const headers = { 'X-Appwrite-Project': AW.project, 'Content-Type': 'application/json' };

    // PATCH: only update value field (key is set on creation and cannot change)
    let res = await fetch(`${baseUrl}/${docId}`, {
      method: 'PATCH',
      headers,
      body: JSON.stringify({ data: { value: val } })
    });

    if (!res.ok) {
      const errText = await res.text();
      // Document might not exist yet — create it
      res = await fetch(baseUrl, {
        method: 'POST',
        headers,
        body: JSON.stringify({
          documentId: docId,
          data: { key: docId, value: val },
          permissions: ['read("any")', 'update("any")', 'delete("any")']
        })
      });
      if (!res.ok) {
        const errText2 = await res.text();
        showToast('⚠️ Sync failed: ' + res.status);
        return false;
      }
    }
    return true;
  };

  try {
    // Build store photos map — compress for cross-device sync
    const storePhotosMap = {};
    const storePhotoPromises = getStoreItems()
      .filter(i => !deletedStoreItems.includes(i.id))
      .map(async i => {
        const photo = i.photo || localStorage.getItem('phx_si_photo_'+i.id) || '';
        if (photo) {
          const compressed = await compressPhoto(photo, 8);
          storePhotosMap[i.id] = compressed;
        }
      });
    await Promise.all(storePhotoPromises);
    const storePhotosVal = JSON.stringify(storePhotosMap);

    // Build report photos map — last 30 days, 40KB per photo (2 photos = 80KB + overhead fits in 64KB doc)
    const reportPhotosMap = {};
    const cutoff = new Date(Date.now() - 30*24*60*60*1000).toISOString().slice(0,10);
    const recentReports = getReports().filter(r => (r.date||'') >= cutoff);
    const reportPhotoPromises = recentReports.map(async r => {
      const stored = getPhotosForReport(r.id);
      const allPhotos = [
        ...(stored?.photosStart||[]).map(p=>({zone:'start',src:p?.src||p})),
        ...(stored?.photosEnd||[]).map(p=>({zone:'end',src:p?.src||p})),
        ...(stored?.photos||[]).map(p=>({zone:'main',src:p?.src||p})),
      ].filter(p=>p.src&&p.src.startsWith('data:'));
      if (allPhotos.length) {
        const compressed = await Promise.all(allPhotos.map(async p => ({
          zone: p.zone, src: await compressPhoto(p.src, 40)
        })));
        reportPhotosMap[r.id] = compressed;
      }
    });
    await Promise.all(reportPhotoPromises);
    let reportPhotosVal = JSON.stringify(reportPhotosMap);
    // If too large, reduce to last 14 days
    if (reportPhotosVal.length > 63000) {
      const cutoff2 = new Date(Date.now() - 14*24*60*60*1000).toISOString().slice(0,10);
      const trimmed = Object.fromEntries(
        Object.entries(reportPhotosMap).filter(([id]) => {
          const r = recentReports.find(r=>String(r.id)===String(id));
          return r && (r.date||'') >= cutoff2;
        })
      );
      reportPhotosVal = JSON.stringify(trimmed);
    }

    await Promise.all([
      save('adminData', configVal),
      save('liveData',  liveVal),
      storePhotosVal.length < 64000 ? save('storePhotos', storePhotosVal) : Promise.resolve(),
      reportPhotosVal.length < 64000 ? save('reportPhotos', reportPhotosVal) : Promise.resolve()
    ]);
    console.log('[pushConfig] saved. liveVal:', liveVal.length, 'chars, reports:', (JSON.parse(liveVal).reports||[]).length);
    // Only clear pending users flag after confirmed successful push
    const stillPending = LS.get('phx_pending_users', []);
    if (stillPending.length) {
      // Verify these users are in the data we just pushed
      const pushedUsernames = Object.keys(cleanUsers);
      const remaining = stillPending.filter(u => !pushedUsernames.includes(u));
      LS.set('phx_pending_users', remaining);
    }
  } finally {
    _pushing = false;
  }
}

async function saveReportToAW(r) {
  // Strip photos from report - they're synced via separate reportPhotos document
  const noPhotos = Object.assign({}, r, { photos: [], photosStart: [], photosEnd: [] });
  const doc = {
    type:       String(r.type||''),
    project:    String(r.project||''),
    route:      String(r.route||''),
    date:       String(r.date||''),
    supervisor: String(r.supervisor||''),
    timestamp:  String(r.timestamp||''),
    from_ch:    parseFloat(r.from)||0,
    to_ch:      parseFloat(r.to)||0,
    meters:     parseFloat(r.meters)||0,
    volume:     parseFloat(r.volume)||0,
    width:      parseFloat(r.width)||0,
    depth:      parseFloat(r.depth)||0,
    soil:       String(r.soil||''),
    size:       String(r.size||''),
    material:   String(r.material||''),
    encasing:   String(r.encasing||''),
    road:       String(r.road||''),
    chainage:   parseFloat(r.chainage)||0,
    valType:    String(r.valType||''),
    chamberReq: String(r.chamberReq||''),
    chamType:   String(r.chamType||''),
    chamStatus: String(r.chamStatus||''),
    slab:       String(r.slab||''),
    slabKept:   String(r.slabKept||''),
    fitType:    String(r.fitType||''),
    thrustBlock:String(r.thrustBlock||''),
    qty:        parseFloat(r.qty)||1,
    special:    String(r.special||''),
    strType:    String(r.strType||''),
    remarks:    String(r.remarks||''),
    estConc:    parseFloat(r.estConc)||0,
    actualConc: parseFloat(r.actualConc)||0,
    netVol:     parseFloat(r.netVol)||0,
    encasings:  JSON.stringify(r.encasings||[]),
    valves:     JSON.stringify(r.valves||[]),
    connections:JSON.stringify(r.connections||[]),
    data_json:  JSON.stringify(noPhotos).slice(0, 65000)
  };
  const docId = 'r' + String(r.id).replace(/[^a-zA-Z0-9]/g,'').replace(/^r+/,'').slice(0,30);
  let res = await aw('PATCH', `/databases/${AW.database}/collections/${AW.collections.reports}/documents/${docId}`, { data: doc });
  if (!res) res = await aw('POST', `/databases/${AW.database}/collections/${AW.collections.reports}/documents`, {
    documentId: docId, data: doc, permissions: ['read("any")','update("any")','delete("any")']
  });
  if (res) { r._awId = res.$id || docId; console.log('[saveReportToAW] saved OK, id:', r._awId); }
  else { console.error('[saveReportToAW] FAILED for report', r.id, r.type); }
  return !!res;
}

async function deleteReportFromAW(r) {
  const awId = r._awId || ('r' + String(r.id).replace(/[^a-zA-Z0-9]/g,'').replace(/^r+/,'').slice(0,30));
  let res = await aw('DELETE', `/databases/${AW.database}/collections/${AW.collections.reports}/documents/${awId}`);
  if (res !== null) return true;
  // Scan for matching doc
  const list = await aw('GET', `/databases/${AW.database}/collections/${AW.collections.reports}/documents?limit=100`);
  if (list?.documents) {
    const match = list.documents.find(d => {
      try { return String(JSON.parse(d.data_json||'{}').id) === String(r.id); } catch(e){ return false; }
    });
    if (match) return (await aw('DELETE', `/databases/${AW.database}/collections/${AW.collections.reports}/documents/${match.$id}`)) !== null;
  }
  return false;
}

// ── AUTH ─────────────────────────────────────────────────────
async function doLogin() {
  const user = document.getElementById('loginUser').value.trim().toLowerCase();
  const pass = document.getElementById('loginPass').value;
  const errEl = document.getElementById('loginError');
  errEl.classList.add('hidden');

  if (!user || !pass) { showLoginError('Enter username and password'); return; }

  // Check local first (handles newly created users before push completes)
  const localUsers = getUsers();
  if (localUsers[user] && localUsers[user].pass === pass) {
    showLoader('Signing in…');
    await loginSuccess(user, localUsers[user]);
    return;
  }

  // Not found locally — pull from Appwrite (handles users created on other devices)
  showLoader('Signing in…');
  try { await pullConfig(true); } catch(e) {}
  const freshUsers = getUsers();
  if (freshUsers[user] && freshUsers[user].pass === pass) {
    await loginSuccess(user, freshUsers[user]);
  } else {
    hideLoader();
    showLoginError('Incorrect username or password');
  }
}

function showLoginError(msg) {
  const el = document.getElementById('loginError');
  el.textContent = msg;
  el.classList.remove('hidden');
}

async function loginSuccess(user, userRecord) {
  currentUser = user;
  currentRole = userRecord.role;

  // Show app immediately from local data
  hideLoader();
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');

  // Update UI
  document.getElementById('roleBadgeEl').textContent =
    getUserLabel({role:currentRole, ...((getUsers()[currentUser])||{})});
  document.getElementById('roleBadgeEl').className = `role-badge ${currentRole}`;
  document.getElementById('avatarBtn').textContent = userRecord.name?.[0]?.toUpperCase() || user[0].toUpperCase();
  document.getElementById('topbarSub').textContent = userRecord.name || user;

  // Show/hide nav items
  document.getElementById('navSubmit').classList.toggle('hidden', false);
  document.getElementById('navTracker').classList.toggle('hidden', isEngineer(currentRole) && currentRole !== 'senior_engineer');
  document.getElementById('navSettings').classList.toggle('hidden', isEngineer(currentRole));
  document.getElementById('navUsers').classList.toggle('hidden', currentRole !== 'admin');
  document.getElementById('navAttendance')?.classList.toggle('hidden', false);

  switchTab('home');

  // Sync in background — refresh UI when done
  setSyncStatus('syncing');
  doSync().then(() => {
    renderCurrentTab();
    if (currentRole === 'admin') pushConfig();
  });
}

function doLogout() {
  currentUser = null; currentRole = null;
  document.getElementById('userMenuModal').classList.add('hidden');
  document.getElementById('app').classList.add('hidden');
  document.getElementById('loginScreen').classList.remove('hidden');
  document.getElementById('loginUser').value = '';
  document.getElementById('loginPass').value = '';
}

function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.tab === tab);
  });
  renderCurrentTab();
}

function renderCurrentTab() {
  const main = document.getElementById('main');
  switch(activeTab) {
    case 'home':     main.innerHTML = renderHome(); break;
    case 'submit':
      if (currentModule==='attendance') { main.innerHTML=renderAttendanceTab(); }
      else if (currentModule==='machinery') { main.innerHTML=renderMachineryTab(); }
      else if (currentModule==='store') {
        main.innerHTML=renderStoreTab();
        pullConfig().then(()=>{ if(activeTab==='submit'&&currentModule==='store') main.innerHTML=renderStoreTab(); });
      }
      else {
        main.innerHTML=renderSubmitTab();
      }
      break;
    case 'reports':
      if(currentModule==='attendance'){main.innerHTML=renderAttendanceTab();break;}
      if(currentModule==='machinery'){main.innerHTML=renderMachineryTab();break;}
      if(currentModule==='store'){
        main.innerHTML=renderStoreTab();
        pullConfig().then(()=>{ if(activeTab==='reports'&&currentModule==='store') main.innerHTML=renderStoreTab(); });
        break;
      }
      _rptTypeFilter='all';_rptProjFilter='';main.innerHTML=renderReportsTab();
      // Fast sync via pullConfig (reports now in liveData)
      pullConfig().then(()=>{ if(activeTab==='reports') { _rptTypeFilter='all';_rptProjFilter='';main.innerHTML=renderReportsTab(); } });
      break;
    case 'tracker':  main.innerHTML = renderTrackerTab(); break;
    case 'settings': main.innerHTML = renderSettingsTab(); break;
    case 'attendance': main.innerHTML = renderAttendanceTab(); pullConfig().then(()=>{ if(activeTab==='attendance'&&currentModule==='attendance') main.innerHTML=renderAttendanceTab(); }); break;
    case 'users':
      main.innerHTML = renderUsersTab();
      pullConfig(true).then(() => pushConfig()).then(() => { if (activeTab === 'users') main.innerHTML = renderUsersTab(); });
      break;
  }
  if (activeTab === 'settings') initSettings();
}

    const issues = getMachIssues().filter(i=>machIds.has(i.machineId));
    const today2 = new Date().toISOString().slice(0,10);
    const svcDue = getMachService().filter(s=>machIds.has(s.machineId)&&s.nextDue&&s.nextDue<=new Date(Date.now()+30*24*60*60*1000).toISOString().slice(0,10)).length;
    html += `
      <div class="section-header"><div class="section-title">Machinery Overview</div></div>
      <div class="stat-grid">
        <div class="stat-card"><div class="val text-orange">${mach.length}</div><div class="lbl">Total Machines</div></div>
        <div class="stat-card"><div class="val text-blue">${logs.filter(l=>l.date===today2).length}</div><div class="lbl">Logged Today</div></div>
        <div class="stat-card"><div class="val text-red">${issues.filter(i=>i.status==='open').length}</div><div class="lbl">Open Issues</div></div>
        <div class="stat-card"><div class="val text-orange">${svcDue}</div><div class="lbl">Service Due</div></div>
      </div>`;
  } else {
    // Store
    const vp3 = getVisibleProjects();
    const sItems = getStoreItems().filter(i=>vp3.includes(i.project));
    const sTxns  = getStoreTxns().filter(t=>vp3.includes(t.project));
    const lowStock = sItems.filter(i=>(parseFloat(i.qty)||0) <= (parseFloat(i.minQty)||0));
    html += `
      <div class="section-header"><div class="section-title">Store Overview</div></div>
      <div class="stat-grid">
        <div class="stat-card"><div class="val text-green">${sItems.length}</div><div class="lbl">Total Items</div></div>
        <div class="stat-card"><div class="val text-red">${lowStock.length}</div><div class="lbl">Low Stock</div></div>
        <div class="stat-card"><div class="val text-blue">${sTxns.filter(t=>t.date===localToday()).length}</div><div class="lbl">Today's Txns</div></div>
        <div class="stat-card"><div class="val text-orange">${sTxns.filter(t=>t.type==='issue').length}</div><div class="lbl">Total Issues</div></div>
      </div>`;
  }

  // Recent activity
  const recent = [...allReports].sort((a,b) => (b.timestamp||'').localeCompare(a.timestamp||'')).slice(0,5);
  if (recent.length) {
    html += `<div class="section-header mt-2"><div class="section-title">Recent Activity</div></div>`;
    recent.forEach(r => { html += reportItemHTML(r, false); });
  }

  return html;
}

function fmtM(m) {
  if (!m) return '0m';
  if (m >= 1000) return (m/1000).toFixed(2) + 'km';
  return Math.round(m) + 'm';
}

    { id:'chamber',    icon:'🏛️', label:'Chamber',     color:'var(--orange)' },
    { id:'fitting',    icon:'🔗', label:'Fitting',     color:'var(--cyan)' },

    { id:'civil_quality', icon:'✅', label:'Quality Check', color:'var(--green)' },
    { id:'civil_material',icon:'📦', label:'Material',     color:'var(--purple)' },

  const types = currentModule === 'pipeline' ? pipeTypes : civilTypes;

  let html = `
    <div class="section-header">
      <div class="section-title">Submit Report</div>
      <div class="chip active">${moduleLabel}</div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px">`;

  types.forEach(t => {

// ── REPORT FORM ───────────────────────────────────────────────
function openReportForm(type, editData=null) {
  _editId = editData ? editData.id : null;
  const modal = document.getElementById('formModal');
  const content = document.getElementById('formModalContent');
  content.innerHTML = buildReportForm(type, editData || {});
  modal.classList.remove('hidden');
}

function closeFormModal() {
  document.getElementById('formModal').classList.add('hidden');
  _editId = null;
}

function buildReportForm(type, prefill={}) {
  const vp = getVisibleProjects();
  const projOpts = vp.map(p => `<option value="${p}"${prefill.project===p?' selected':''}>${p}</option>`).join('');

  const typeLabels = {
    excavation:'⛏️ Excavation',pipe:'🔩 Pipe Laying',refill:'🪣 Refilling',
    valve:'🔧 Valve',chamber:'🏛️ Chamber',fitting:'🔗 Fitting',structure:'🏗️ Concrete',
    civil_dpr:'📄 DPR Entry',civil_drawing:'📐 Drawing',civil_quality:'✅ Quality Check',
    civil_material:'📦 Material',civil_labour:'👷 Labour',civil_other:'📝 Other'
  };

  let html = `
    <div class="flex justify-between items-center mb-4">
      <div class="section-title">${typeLabels[type]||type}</div>
      <button class="btn btn-secondary btn-sm" onclick="closeFormModal()">✕ Close</button>
    </div>
    <div class="field-group">
      <label>Project <span class="req">*</span></label>
      <select id="f-project" onchange="updateFormRoutes()">${projOpts}</select>
    </div>
    <div class="field-group">
      <label>Route <span class="req">*</span></label>
      <select id="f-route" onchange="updatePipeSpecDisplay()"></select>
    </div>
    <div class="field-group">
      <label>Date <span class="req">*</span></label>
      <input type="date" id="f-date" value="${prefill.date||new Date().toISOString().slice(0,10)}" max="${new Date().toISOString().slice(0,10)}">
    </div>`;

  // Type-specific fields
  html += buildTypeFields(type, prefill);

  html += `
    ${(type !== 'excavation' && type !== 'pipe' && type !== 'refill') ? `
    <div class="field-group">
      <label>Photo</label>
      <div class="photo-zone" onclick="document.getElementById('f-photo').click()">
        <div class="pi">📷</div>
        Tap to add photo
        <input type="file" id="f-photo" accept="image/*" style="display:none" onchange="handlePhotoUpload(this)">
      </div>
      <div class="photo-prev-grid" id="f-photo-prev"></div>
    </div>` : ''}
    <div class="field-group">
      <label>Remarks</label>
      <textarea id="f-remarks" rows="2" placeholder="Optional notes…">${prefill.remarks||''}</textarea>
    </div>
    <div class="flex gap-3">
      <button class="btn btn-secondary flex-1" onclick="closeFormModal()">Cancel</button>
      <button class="btn btn-primary flex-1" onclick="submitReport('${type}')">${_editId?'Update':'Submit'} ✓</button>
    </div>`;

  setTimeout(() => {
    updateFormRoutes(prefill.route);
    if (type === 'excavation') {
      if (prefill.photosStart?.length) prefill.photosStart.forEach(p => addExcavPhotoPreview(p.src||p, 'start'));
      if (prefill.photosEnd?.length)   prefill.photosEnd.forEach(p => addExcavPhotoPreview(p.src||p, 'end'));
      autoCalcVolume();
    } else if (type === 'pipe') {
      if (prefill.photosStart?.length) prefill.photosStart.forEach(p => addExcavPhotoPreview(p.src||p, 'start'));
      if (prefill.photosEnd?.length)   prefill.photosEnd.forEach(p => addExcavPhotoPreview(p.src||p, 'end'));
    } else if (type === 'refill') {
      if (prefill.photosStart?.length) prefill.photosStart.forEach(p => addExcavPhotoPreview(p.src||p, 'start'));
      if (prefill.photosEnd?.length)   prefill.photosEnd.forEach(p => addExcavPhotoPreview(p.src||p, 'end'));
      autoCalcRefillVol();
    } else if (type === 'chamber') {
      const sel = document.getElementById('f-location-sel');
      if (sel) onChamberLocChange(sel);
    } else if (type === 'structure') {
      const sel = document.getElementById('f-location-sel');
      if (sel) onConcreteLocChange(sel);
      autoCalcConcrVol();
      // Restore prereq date if editing
      if (prefill.prereqDate) {
        const h = document.getElementById('f-prereq-date');
        if (h) h.value = prefill.prereqDate;
      }
    } else if (prefill.photos?.length) {
      prefill.photos.forEach(p => addPhotoPreview(p.src||p));
    }
  }, 50);

  return html;
}

      <div style="background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:12px">
        <div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px">🛣️ Road Restoration</div>
        <div class="field-group"><label>Restoration Type</label>
          <select id="f-road">${['Not Required','Paver Block Restoration','Asphalt Restoration','Concrete Restoration','Murrum & Soil','Temporary Restoration'].map(r=>`<option${p.road===r?' selected':''}>${r}</option>`).join('')}</select>
        </div>
      </div>
      <div style="background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:12px">
        <div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px">📷 Site Photos</div>
        <div class="form-row" style="gap:12px">
          <div style="flex:1">
            <div style="font-size:11px;font-weight:700;color:var(--green);margin-bottom:6px">📍 Starting Chainage</div>
            <div class="photo-zone" style="padding:14px 8px" onclick="document.getElementById('f-photo-refill-start').click()">
              <div class="pi" style="font-size:22px">📷</div>
              <div style="font-size:11px">Tap to add</div>
              <input type="file" id="f-photo-refill-start" accept="image/*" style="display:none" onchange="handleExcavPhotoUpload(this,'start')">
            </div>
            <div class="photo-prev-grid" id="f-photo-prev-start" style="margin-top:6px"></div>
          </div>
          <div style="flex:1">
            <div style="font-size:11px;font-weight:700;color:var(--blue);margin-bottom:6px">🏁 Ending Chainage</div>
            <div class="photo-zone" style="padding:14px 8px" onclick="document.getElementById('f-photo-refill-end').click()">
              <div class="pi" style="font-size:22px">📷</div>
              <div style="font-size:11px">Tap to add</div>
              <input type="file" id="f-photo-refill-end" accept="image/*" style="display:none" onchange="handleExcavPhotoUpload(this,'end')">
            </div>
            <div class="photo-prev-grid" id="f-photo-prev-end" style="margin-top:6px"></div>
          </div>
        </div>
      </div>`;
  }

  // ── 4. VALVE ───────────────────────────────────────────────
  if (type === 'valve') {
    html += `
      <div style="background:rgba(255,69,58,0.06);border:1px solid rgba(255,69,58,0.2);border-radius:10px;padding:12px;margin-bottom:12px">
        <div style="font-size:10px;font-weight:700;color:var(--red);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px">📍 Location</div>
        <div class="field-group"><label>Chainage (m) <span class="req">*</span></label><input type="number" id="f-chainage" value="${p.chainage||''}" placeholder="e.g. 1200"></div>
        <div class="field-group"><label>Location Description</label><input type="text" id="f-location" value="${p.location||''}" placeholder="e.g. Near Dabhoda Village crossroad"></div>
      </div>
      <div style="background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:12px">
        <div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px">🔧 Valve Details</div>
        ${(() => {
          const vProj = p.project || getVisibleProjects()[0] || '';
          const valveItems = (getValveSpecials()[vProj] || []);
          const selectedVal = p.valType || '';
          if (valveItems.length) {
            return `<div class="field-group"><label>Valve Type & Size <span class="req">*</span></label>
              <select id="f-valType">
                <option value="">— Select Valve —</option>
                ${valveItems.map(s=>`<option value="${s.name}"${selectedVal===s.name?' selected':''}>${s.name}</option>`).join('')}
              </select>
            </div>`;
          } else {
            return `<div style="background:rgba(255,159,10,0.08);border:1px solid rgba(255,159,10,0.3);border-radius:8px;padding:10px;font-size:12px;color:var(--orange);margin-bottom:10px">
              ⚠️ No valves defined for this project. Add them in Settings → Valves.
            </div>
            <div class="field-group"><label>Valve Type & Size <span class="req">*</span></label>
              <input type="text" id="f-valType" value="${p.valType||''}" placeholder="e.g. Sluice Valve 600mm">
            </div>`;
          }
        })()}
        <input type="hidden" id="f-size" value="${p.size||''}">
        <div class="field-group"><label>Quantity (Nos) <span class="req">*</span></label>
          <input type="number" id="f-val-qty" value="${p.qty||1}" min="1" placeholder="e.g. 1">
        </div>
        <div class="field-group"><label>Chamber Required?</label>
          <div class="radio-group">
            <div class="radio-opt${(p.chamberReq||'No')==='No'?' selected':''}" onclick="selectRadio('f-chamberReq','No',this)">No</div>
            <div class="radio-opt${p.chamberReq==='Yes'?' selected':''}" onclick="selectRadio('f-chamberReq','Yes',this)">Yes</div>
          </div>
          <input type="hidden" id="f-chamberReq" value="${p.chamberReq||'No'}">
        </div>
      </div>`;
  }

  // ── 5. CHAMBER ─────────────────────────────────────────────
  if (type === 'chamber') {
    const chamProj = p.project || getVisibleProjects()[0] || '';
    const valveReps = getReports()
      .filter(r => r.type === 'valve' && r.project === chamProj && r.chamberReq === 'Yes');
    // Store date in option data attribute for dependency check
    const chamLocOpts = valveReps.map(r => {
      const label = `Ch:${r.chainage}m${r.location ? ' — ' + r.location : ''}`;
      return `<option value="${label}" data-date="${r.date||''}"${p.location===label?' selected':''}>${label}</option>`;
    }).join('');
    const chamLocs = valveReps.map(r => `Ch:${r.chainage}m${r.location ? ' — ' + r.location : ''}`);
    const chamHasOther = p.location && !chamLocs.includes(p.location);

    html += `
      <div style="background:rgba(255,159,10,0.06);border:1px solid rgba(255,159,10,0.2);border-radius:10px;padding:12px;margin-bottom:12px">
        <div style="font-size:10px;font-weight:700;color:var(--orange);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px">📍 Location</div>
        <div class="field-group">
          <label>Valve Location (Chamber Required = Yes) <span class="req">*</span></label>
          <select id="f-location-sel" onchange="onChamberLocChange(this)">
            ${chamLocs.length ? '' : '<option value="">— No valves with chamber required yet —</option>'}
            ${chamLocOpts}
            <option value="__other__"${chamHasOther?' selected':''}>— Other (type below) —</option>
          </select>
        </div>
        <input type="hidden" id="f-valve-date" value="${p.valveDate||''}">
        <div id="f-location-other-wrap" style="display:${chamHasOther?'block':'none'}">
          <div class="field-group mt-2">
            <label>Custom Location</label>
            <input type="text" id="f-location-other" value="${chamHasOther?p.location:''}" placeholder="e.g. Near Dharoi village junction" oninput="document.getElementById('f-location').value=this.value">
          </div>
        </div>
        <input type="hidden" id="f-location" value="${p.location||''}">
        <div class="field-group mt-2"><label>Chainage (m) — Auto from selection</label>
          <input type="number" id="f-chainage" value="${p.chainage||''}" readonly style="opacity:0.6" placeholder="Auto-filled">
        </div>
      </div>
      <div style="background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:12px">
        <div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px">🏛️ Chamber Details</div>
        <div class="field-group"><label>Chamber Type <span class="req">*</span></label>
          <select id="f-chamType">${['RCC','Brick Masonry'].map(v=>`<option${p.chamType===v?' selected':''}>${v}</option>`).join('')}</select>
        </div>
        <div class="form-row">
          <div class="field-group"><label>Length (mm)</label><input type="number" id="f-chamL" value="${p.chamL||''}" placeholder="e.g. 1200"></div>
          <div class="field-group"><label>Width (mm)</label><input type="number" id="f-chamW" value="${p.chamW||''}" placeholder="e.g. 900"></div>
          <div class="field-group"><label>Height (mm)</label><input type="number" id="f-chamH" value="${p.chamH||''}" placeholder="e.g. 1500"></div>
        </div>
        <div class="field-group"><label>Slab</label>
          <div class="radio-group">
            <div class="radio-opt${(p.slab||'Insitu')==='Insitu'?' selected':''}" onclick="selectChamberSlab('Insitu',this)">Insitu</div>
            <div class="radio-opt${p.slab==='Precast'?' selected':''}" onclick="selectChamberSlab('Precast',this)">Precast</div>

        </div>
        <div id="f-slab-precast-wrap" style="display:${p.slab==='Precast'?'block':'none'}">

              <div class="radio-opt${p.slabStatus==='Not Kept'?' selected':''}" onclick="selectRadio('f-slabStatus','Not Kept',this)">Not Kept</div>

            <input type="hidden" id="f-slabStatus" value="${p.slabStatus||'Kept'}">
          </div>
